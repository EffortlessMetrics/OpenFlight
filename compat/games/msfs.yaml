schema_version: "1"

game:
  name: "Microsoft Flight Simulator"
  id: msfs
  developer: "Asobo Studio"

integration:
  mechanism: SimConnect
  crate: flight-simconnect
  sdk_version: ">=0.22"       # Minimum tested SimConnect SDK version (0.22.x for 2020, 0.23.x for 2024)

supported_versions:
  - "2020 (SU12+)"    # SimConnect SDK 0.22.x  (MSFS SDK v0.20.4+)
  - "2024 (all)"      # SimConnect SDK 0.23.x

version_notes:
  msfs_2020:
    simconnect_sdk: "0.22.x"
    notes: >
      Shipped with MSFS SDK v0.20.4+. Standard SimVars and client events are
      fully supported. SimConnect_SetInputEvent is not available; B-var/H-var
      control injection requires a SDK upgrade.
  msfs_2024:
    simconnect_sdk: "0.23.x"
    notes: >
      Introduces new SimVars for military jets and improved helicopter systems.
      Some legacy SimVars deprecated in 2024: AUTOPILOT HEADING LOCK DIR is
      superseded by AUTOPILOT HEADING LOCK DIRECTION. The B-var/H-var
      (SimConnect_SetInputEvent) API is present but blocked by the same
      INPUT_EVENTS_STUBBED issue until the SDK dependency is upgraded.

features:
  telemetry_read: true
  control_injection:
    standard_events: true
    input_events: false        # Requires SimConnect_SetInputEvent (pending SDK upgrade)
  force_feedback_translation: true
  aircraft_detection: true

test_coverage:
  trace_replay: true
  integration_tests: false
  fuzz_coverage: true    # crates/flight-simconnect/fuzz/fuzz_targets/fuzz_simconnect_fixture.rs
  hil: false

support_tier: 1

known_issues:
  - id: INPUT_EVENTS_STUBBED
    description: >
      SimConnect_SetInputEvent is not available in the currently vendored sys crate.
      flight-simconnect::EventManager::transmit_input_event() returns
      EventError::NotSupported. Affects both MSFS 2020 and 2024 for modern aircraft
      using B-var/H-var controls. Requires an SDK upgrade to fully support.
    workaround: "Use standard client events (AXIS_ELEVATOR_SET etc.) for legacy aircraft."
  - id: MSFS2024_DEPRECATED_SIMVARS
    description: >
      MSFS 2024 (SDK 0.23.x) deprecated several SimVars that were present in 2020.
      Notable: AUTOPILOT HEADING LOCK DIR → AUTOPILOT HEADING LOCK DIRECTION.
      OpenFlight reads the legacy names; broken behaviour may occur on 2024-only aircraft
      that omit the compatibility aliases.
    workaround: "Profile writers can map both old and new SimVar names via the writers diff table."
