schema_version: "1"

game:
  name: "X-Plane 12"
  id: xplane
  developer: "Laminar Research"

integration:
  mechanism: "UDP DataRef + Web API"
  crate: flight-xplane
  protocol_version: "XPlane11+"   # UDP Data Output (DREF) protocol

supported_versions:
  - "X-Plane 11 (11.55+)"
  - "X-Plane 12 (all)"

version_notes:
  xplane11:
    notes: >
      Uses classic UDP Data Output (DREF) protocol. Datarefs such as
      sim/flightmodel/position/vh_ind_fpm (vertical speed in ft/min) and
      sim/flightmodel/position/indicated_airspeed are stable across 11.55+.
  xplane12:
    notes: >
      X-Plane 12 reorganised several position and performance datarefs.
      Key changes vs XP11:
        • sim/flightmodel/position/vh_ind_fpm — still present but the
          preferred path in XP12 is sim/flightmodel2/position/vh_ind_fpm2.
        • sim/flightmodel/position/local_ax/ay/az replaced by
          sim/flightmodel2/position/Nrot_{roll,pitch,yaw}.
        • sim/cockpit2/gauges/indicators/airspeed_kts_pilot supersedes
          sim/flightmodel/position/indicated_airspeed for cockpit reads.
      OpenFlight's DataRef subscription table uses the XP11 names as primary
      keys and falls back to XP12 equivalents at runtime where the adapter
      detects version ≥ 1200 from the VERS dataref.

features:
  telemetry_read: true
  control_injection:
    dataref_write: true
    commands: true
  force_feedback_translation: false   # No native FFB API in X-Plane
  aircraft_detection: true

test_coverage:
  trace_replay: false     # Planned
  integration_tests: true # adapter::tests — snapshot pipeline + stale timeout
  fuzz_coverage: true     # crates/flight-xplane/fuzz/fuzz_targets/ (fuzz_xplane_plugin_msg, fuzz_xplane_dataref, fuzz_udp)
  hil: false

support_tier: 1

known_issues:
  - id: PLUGIN_INTERFACE_OPTIONAL
    description: >
      The plugin interface (flight-xplane::plugin) is optional and disabled by default
      (enable_plugin = false in XPlaneAdapterConfig). UDP-only mode is the default
      and fully tested.
  - id: CONNECTION_TIMEOUT_2S
    description: >
      If no UDP packets are received for 2 seconds, the adapter publishes a stale
      snapshot with validity.safe_for_ffb = false and transitions to Disconnected.
