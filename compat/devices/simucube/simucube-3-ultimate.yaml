# Simucube 3 Ultimate
# SPDX-License-Identifier: MIT OR Apache-2.0
# SPDX-FileCopyrightText: Copyright (c) 2024 Flight Hub Team
#
# Granite Devices Simucube 3 Ultimate — third-generation direct-drive wheel base
# in the flagship Ultimate tier (2024). Highest peak torque in the SC3 series.
# USB HID plus QR2 wireless steering wheel system.
# VID 0x16D0 is Granite Devices' MCS USB vendor ID. PID unconfirmed.
schema_version: "1"

device:
  name: "Simucube 3 Ultimate"
  vendor: "Granite Devices (Simucube)"
  usb:
    vendor_id: 0x16D0   # Granite Devices — confirmed in USB ID database (SC2 and SC3)
    product_id: 0x0D72  # Estimated — PID_UNCONFIRMED for SC3 Ultimate; verify with lsusb
  hid:
    usage_page: 0x01    # Generic Desktop
    usage: 0x04         # Joystick

capabilities:
  axes:
    count: 3
    names: [steering, pedal_combined, ffb_torque]
    resolution_bits: 24
  buttons: 0
  hats: 0
  force_feedback: true

polling:
  expected_rate_hz: 1000
  max_jitter_ms: 0.5

quirks:
  - id: PID_UNCONFIRMED
    description: "PID 0x0D72 is a placeholder for SC3 Ultimate; SC2 Ultimate uses 0x0D62."
  - id: ABSOLUTE_ENCODER
    description: >
      24-bit absolute encoder; steering position persists across power cycles.
  - id: QR2_WIRELESS
    description: >
      Uses Simucube QR2 wireless Quick Release system; wheel buttons/axes
      appear as composite USB HID device via the base.
  - id: TRUEDRIVE_REQUIRED
    description: >
      Full FFB configuration requires Granite Devices True Drive software.
  - id: HIGH_TORQUE_SAFETY
    description: >
      Highest peak torque in SC3 series. E-stop mandatory. OpenFlight must not
      override True Drive safety torque limits or attenuation profiles.

support:
  tier: 3
  test_coverage:
    simulated: false
    hil: false
  notes: >
    Simucube 3 Ultimate (2024). Flagship SC3; highest torque. VID 0x16D0
    confirmed for Granite Devices; PID requires field verification.
    Last reviewed: 2026-02.
