# SPDX-FileCopyrightText: Copyright (c) 2024 Flight Hub Team
#
# VID 0x0EB7, PID 0xE2CB — community estimate from community sources.
# Note: VID 0x0EB7 is registered to Fanatec GmbH. This community-reported
# VID/PID for Heusinkveld Shift Paddles may reflect misidentification.
# The Heusinkveld Shift Paddles are magnetic paddle shifters for sim racing
# and can be repurposed as weapon release / countermeasures triggers in
# flight sim setups.

schema_version: "1"

device:
  name: "Heusinkveld Shift Paddles"
  vendor: "Heusinkveld Engineering"
  usb:
    vendor_id: 0x0EB7    # Community estimate — PID estimated from community sources
    product_id: 0xE2CB   # Community estimate; PID_UNCONFIRMED
  hid:
    usage_page: 0x01
    usage: 0x04

capabilities:
  axes:
    count: 0
    names: []
    resolution_bits: 0
  buttons: 2
  hats: 0
  force_feedback: false

polling:
  expected_rate_hz: 1000
  max_jitter_ms: 1

quirks:
  - id: PID_UNCONFIRMED
    description: >
      VID 0x0EB7 / PID 0xE2CB are community estimates. VID 0x0EB7 is registered
      to Fanatec GmbH; this attribution for Heusinkveld may be incorrect.
      Confirm from lsusb on real hardware.
  - id: BUTTONS_ONLY
    description: >
      The Shift Paddles report two discrete button events only — left paddle
      and right paddle. No analog axes. In flight sim, typically mapped to gear
      up/down, flaps, or weapon system functions.
  - id: MAGNETIC_TRIGGERS
    description: >
      Hall-effect magnetic sensors provide fast, consistent activation with
      no mechanical wear. Low latency suitable for time-critical inputs.

support:
  tier: 3
  test_coverage:
    simulated: false
    hil: false
  notes: >
    Heusinkveld Shift Paddles — community VID 0x0EB7 / PID 0xE2CB estimate.
    Note: VID 0x0EB7 is Fanatec; attribution may be incorrect. Magnetic
    2-button paddle set for sim racing / flight sim. Last reviewed: 2026-07.
