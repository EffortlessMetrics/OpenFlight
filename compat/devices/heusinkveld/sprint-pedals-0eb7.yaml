#
# VID 0x0EB7, PID 0xE2C6 — community estimate from community sources.
# Note: VID 0x0EB7 is registered to Fanatec GmbH. This community-reported
# VID/PID for Heusinkveld Sprint Pedals may reflect a misidentification,
# shared silicon, or community database error. The primary Sprint Pedals
# manifest (VID 0x04D8 / PID 0xF6D0) is in sprint-pedals.yaml. Added per
# community request; verify from lsusb before use.

schema_version: "1"

device:
  name: "Heusinkveld Sprint Pedals"
  vendor: "Heusinkveld Engineering"
  usb:
    vendor_id: 0x0EB7    # Community estimate — PID estimated from community sources
    product_id: 0xE2C6   # Community estimate — Sprint Pedals; see sprint-pedals.yaml
  hid:
    usage_page: 0x01
    usage: 0x04

capabilities:
  axes:
    count: 3
    names: [throttle, brake, clutch]
    resolution_bits: 12
  buttons: 0
  hats: 0
  force_feedback: false

polling:
  expected_rate_hz: 125
  max_jitter_ms: 4

quirks:
  - id: PID_UNCONFIRMED
    description: >
      VID 0x0EB7 / PID 0xE2C6 are community estimates. Note that VID 0x0EB7
      is registered to Fanatec GmbH; this attribution for Heusinkveld Sprint
      Pedals is unverified. Primary Sprint Pedals manifest: sprint-pedals.yaml
      (VID 0x04D8 / PID 0xF6D0). Confirm from lsusb on real hardware.
  - id: LOAD_CELL_BRAKE
    description: >
      Sprint Pedals use load-cell sensors on the brake axis for pressure-based
      input. Response curve is configurable via Heusinkveld setup software.

support:
  tier: 3
  test_coverage:
    simulated: false
    hil: false
  notes: >
    Heusinkveld Sprint Pedals — community VID 0x0EB7 / PID 0xE2C6 variant.
    Primary manifest: sprint-pedals.yaml. Note: VID 0x0EB7 is Fanatec; this
    estimate may be incorrect. Verify from lsusb. Last reviewed: 2026-07.
