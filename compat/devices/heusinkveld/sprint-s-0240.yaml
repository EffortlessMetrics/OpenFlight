# Heusinkveld Sprint S Sim Pedals (Fanatec USB VID 0x0EB7, PID 0x0240)
# SPDX-License-Identifier: MIT OR Apache-2.0
# SPDX-FileCopyrightText: Copyright (c) 2024 Flight Hub Team
#
# VID 0x0EB7 (Fanatec GmbH USB vendor ID, shared by some Heusinkveld hardware).
# Heusinkveld uses both VID 0x04D8 (Microchip) and VID 0x0EB7 for different
# product lines. The primary Sprint S manifest (sprint_s_pedals.yaml) uses
# VID 0x04D8, PID 0xE2C7. PID 0x0240 with VID 0x0EB7 is a community estimate
# for a variant or production run that enumerates under the 0x0EB7 VID.
# Confirm PID with lsusb capture from target hardware.
schema_version: "1"

device:
  name: "Heusinkveld Sprint S Sim Pedals"
  vendor: "Heusinkveld Engineering"
  usb:
    vendor_id: 0x0EB7       # Fanatec VID — shared with some Heusinkveld products
    product_id: 0x0240      # Community estimate — Sprint S 0x0EB7 variant
  hid:
    usage_page: 0x01        # Generic Desktop
    usage: 0x04             # Joystick

capabilities:
  axes:
    count: 3
    names: [throttle, brake, clutch]
    resolution_bits: 12
  buttons: 0
  hats: 0
  force_feedback: false

polling:
  expected_rate_hz: 1000
  max_jitter_ms: 1

quirks:
  - id: PID_UNCONFIRMED
    description: >
      PID 0x0240 with VID 0x0EB7 is a community estimate for a Sprint S
      variant. The primary Sprint S manifest is sprint_s_pedals.yaml
      (VID 0x04D8, PID 0xE2C7). Confirm with lsusb on real hardware.
  - id: LOAD_CELL_BRAKE
    description: >
      Brake axis uses a load cell sensor (force-based) rather than a
      potentiometer. Apply load-cell calibration profile for optimal feel.
  - id: HIGH_POLL_RATE
    description: >
      Reports at 1000 Hz for minimal input latency in both racing and
      flight sim use cases.
  - id: VID_SHARED_WITH_FANATEC
    description: >
      VID 0x0EB7 is shared between Fanatec and some Heusinkveld products.
      Ensure device name or HID descriptor is verified when matching profiles
      to avoid false matches against Fanatec hardware.

support:
  tier: 2
  test_coverage:
    simulated: false
    hil: false
  notes: >
    Heusinkveld Sprint S pedals (VID 0x0EB7 variant). PID 0x0240 community
    estimate. Load-cell brake, 1000 Hz poll. Primary manifest: sprint_s_pedals.yaml.
    Wave-49 addition. Last reviewed: 2026-07.
