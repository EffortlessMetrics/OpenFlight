# Gravis Ultrapod II
# SPDX-License-Identifier: MIT OR Apache-2.0
# SPDX-FileCopyrightText: Copyright (c) 2024 Flight Hub Team
#
# VID 0x0428 confirmed: Advanced Gravis Computer Technology Ltd (Kensington).
# PID 0x8004 is a community estimate following the Gravis USB PID sequence
# (0x8003 = BlackHawk Digital). The Ultrapod II was a compact 4-button joypad
# marketed for multimedia and gaming control circa 2001–2004. Both gameport
# and USB variants were produced; the USB version is rare.

schema_version: "1"

device:
  name: "Gravis Ultrapod II"
  vendor: "Gravis / Kensington"
  usb:
    vendor_id: 0x0428   # Gravis / Kensington (confirmed)
    product_id: 0x8004  # Community estimate — Ultrapod II; verify with lsusb
  hid:
    usage_page: 0x01    # Generic Desktop
    usage: 0x05         # Gamepad

capabilities:
  axes:
    count: 2
    names: [x, y]
    resolution_bits: 8
  buttons: 4
  hats: 1
  force_feedback: false

polling:
  expected_rate_hz: 125
  max_jitter_ms: 8

quirks:
  - id: PID_UNCONFIRMED
    description: >
      PID 0x8004 is a community estimate based on the Gravis USB PID sequence.
      The USB version of the Ultrapod II is uncommon; most units shipped with a
      gameport connector. Verify from lsusb on actual USB hardware.
  - id: LEGACY_8BIT_AXES
    description: >
      8-bit axis resolution typical of early-2000s budget controllers.
      Apply a small noise filter at low deflection.

support:
  tier: 3
  test_coverage:
    simulated: false
    hil: false
  notes: >
    Gravis Ultrapod II compact controller (circa 2001–2004). VID 0x0428
    confirmed (Gravis / Kensington); PID 0x8004 community estimate.
    Primarily a gameport device; USB version was limited production.
    Last reviewed: 2026-06.
