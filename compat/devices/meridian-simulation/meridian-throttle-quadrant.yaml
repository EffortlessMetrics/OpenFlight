# SPDX-FileCopyrightText: Copyright (c) 2024 Flight Hub Team
#
# Meridian Simulation (UK) throttle quadrant — single- or twin-engine
# lever set for home cockpit builds. VID/PID unconfirmed.

schema_version: "1"

device:
  name: "Meridian Simulation Throttle Quadrant"
  vendor: "Meridian Simulation"
  usb:
    vendor_id: 0x04D8       # Placeholder — VID_UNCONFIRMED
    product_id: 0x0501      # Placeholder — PID_UNCONFIRMED
  hid:
    usage_page: 0x01
    usage: 0x04

capabilities:
  axes:
    count: 3
    names: [throttle, mixture, propeller]
    resolution_bits: 10
  buttons: 6
  hats: 0
  force_feedback: false

polling:
  expected_rate_hz: 60
  max_jitter_ms: 10

quirks:
  - id: VID_UNCONFIRMED
    description: "VID/PID unconfirmed. Meridian Simulation is a small batch UK manufacturer."
  - id: THROTTLE_NOT_CENTERED
    description: "Lever axes are unipolar [0, max]."

support:
  tier: 3
  test_coverage:
    simulated: false
    hil: false
  notes: >
    Meridian Simulation throttle quadrant. VID/PID unconfirmed. UK small-batch
    manufacturer for home cockpit builders. Last reviewed: 2026-06.
