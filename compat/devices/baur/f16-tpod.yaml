  - id: PANEL_DEVICE
    description: >
      Targeting pod control panel with cursor slew axes and function buttons.
      Designed for the DCS F-16C Viper LITENING/HARM targeting pod workflow.
support:
  tier: 3
  test_coverage:
    simulated: false
    hil: false
  notes: >
    BAUR F-16 TPOD Panel — VID 0x1209 / PID 0x2092 (est).
    F-16 Targeting POD control panel replica. DCS F-16C Viper use.
