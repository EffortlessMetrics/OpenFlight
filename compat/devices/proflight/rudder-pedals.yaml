#
# ProFlight Rudder Pedals — a UK-market entry-level rudder pedal set.
# Uses VID 0x1209 (pid.codes open VID). PID 0x2111 is a community estimate.
# Wave-60 addition.
schema_version: "1"

device:
  name: "ProFlight Rudder Pedals"
  vendor: "ProFlight"
  usb:
    vendor_id: 0x1209       # pid.codes open VID
    product_id: 0x2111      # Community estimate — confirm with lsusb
  hid:
    usage_page: 0x01        # Generic Desktop
    usage: 0x04             # Joystick

capabilities:
  axes:
    count: 3
    names: [rudder, left_brake, right_brake]
    resolution_bits: 10
  buttons: 0
  hats: 0
  force_feedback: false

polling:
  expected_rate_hz: 125
  max_jitter_ms: 8

quirks:
  - id: PID_UNCONFIRMED
    description: >
      VID 0x1209 / PID 0x2111 are community estimates for the ProFlight Rudder
      Pedals. Confirm with lsusb on real hardware.

support:
  tier: 3
  test_coverage:
    simulated: false
    hil: false
  notes: >
    ProFlight Rudder Pedals — UK entry-level rudder pedals. VID 0x1209 /
    PID 0x2111 community estimate. Wave-60 addition. Last reviewed: 2026-07.

tested_games:
  - msfs
  - xplane
