# VID/PID from Linux kernel drivers/hid/hid-ids.h (USB_DEVICE_ID_CH_FIGHTERSTICK)
schema_version: "1"

device:
  name: "CH Fighterstick"
  vendor: "CH Products"
  usb:
    vendor_id: 0x068E
    product_id: 0x00F3
  hid:
    usage_page: 0x01
    usage: 0x04

capabilities:
  axes:
    count: 4
    names: [x, y, z, rz]
    resolution_bits: 10
  buttons: 32
  hats: 1
  force_feedback: false

polling:
  expected_rate_hz: 125
  max_jitter_ms: 4

quirks:
  - id: OS_MEDIATED_HID
    description: "CH Products devices use OS-mediated HID parsing (no raw report ID). Report format is OS-decoded via the HID descriptor."
  - id: CALIBRATION_SOFTWARE
    description: "CH Control Manager software may be required for full axis calibration on Windows."

support:
  tier: 2
  test_coverage:
    simulated: false
    hil: false
  notes: "VID/PID confirmed from Linux kernel hid-ids.h. No raw-byte parser (OS-mediated HID). No HIL validation."
