# VID/PID from Linux kernel drivers/hid/hid-ids.h (USB_DEVICE_ID_CH_PRO_THROTTLE)
schema_version: "1"

device:
  name: "CH Pro Throttle"
  vendor: "CH Products"
  usb:
    vendor_id: 0x068E
    product_id: 0x00F1
  hid:
    usage_page: 0x01
    usage: 0x04

capabilities:
  axes:
    count: 5
    names: [x, y, z, rz, slider]
    resolution_bits: 8
  buttons: 32
  hats: 1
  force_feedback: false

polling:
  expected_rate_hz: 125
  max_jitter_ms: 4

quirks:
  - id: OS_MEDIATED_HID
    description: "CH Products devices use OS-mediated HID parsing (no raw report ID)."
  - id: MINI_STICK_SPRING_RETURN
    description: "X/Y (mini-stick) are spring-return; throttle lever and rotaries are friction/positional."

support:
  tier: 2
  test_coverage:
    simulated: false
    hil: false
  notes: "VID/PID confirmed from Linux kernel hid-ids.h. Frequently paired with CH Fighterstick or CH Combat Stick."
