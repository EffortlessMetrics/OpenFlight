# VID/PID from Linux kernel drivers/hid/hid-ids.h (USB_DEVICE_ID_CH_PRO_PEDALS)
schema_version: "1"

device:
  name: "CH Pro Pedals"
  vendor: "CH Products"
  usb:
    vendor_id: 0x068E
    product_id: 0x00F2
  hid:
    usage_page: 0x01
    usage: 0x04

capabilities:
  axes:
    count: 3
    names: [x, y, rz]
    resolution_bits: 10
  buttons: 0
  hats: 0
  force_feedback: false

polling:
  expected_rate_hz: 125
  max_jitter_ms: 4

quirks:
  - id: OS_MEDIATED_HID
    description: "CH Products devices use OS-mediated HID parsing (no raw report ID)."
  - id: DIFFERENTIAL_PEDALS
    description: "X = left pedal, Y = right pedal, Rz = combined differential rudder axis."

support:
  tier: 2
  test_coverage:
    simulated: false
    hil: false
  notes: "VID/PID confirmed from Linux kernel hid-ids.h. Independent left/right pedals + combined axis."
