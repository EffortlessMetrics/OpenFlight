# CH Pro Pedals USB (PID 0x00F3 variant)
# SPDX-License-Identifier: MIT OR Apache-2.0
# SPDX-FileCopyrightText: Copyright (c) 2024 Flight Hub Team
#
# VID 0x068E confirmed: CH Products (Measurement Systems Inc.).
# PID 0x00F3 is a community estimate for the CH Pro Pedals USB; the primary
# manifest (PID 0x00F2, confirmed via linux kernel hid-ids.h) is in
# pro-pedals.yaml. PID 0x00F3 may represent a different USB firmware version
# or regional variant of the same hardware.

schema_version: "1"

device:
  name: "CH Pro Pedals USB"
  vendor: "CH Products"
  usb:
    vendor_id: 0x068E    # CH Products (Measurement Systems Inc.) — confirmed
    product_id: 0x00F3   # Community estimate — variant; see also 0x00F2 in pro-pedals.yaml
  hid:
    usage_page: 0x01
    usage: 0x04

capabilities:
  axes:
    count: 3
    names: [x, y, rz]     # Left pedal, right pedal, combined differential rudder
    resolution_bits: 10
  buttons: 0
  hats: 0
  force_feedback: false

polling:
  expected_rate_hz: 125
  max_jitter_ms: 4

quirks:
  - id: PID_UNCONFIRMED
    description: >
      PID 0x00F3 is a community estimate. The primary confirmed CH Pro Pedals
      PID is 0x00F2 (pro-pedals.yaml, confirmed via linux kernel hid-ids.h).
      PID 0x00F3 may represent a firmware or hardware revision variant.
  - id: OS_MEDIATED_HID
    description: >
      CH Products devices use OS-mediated HID parsing (no raw report ID).
  - id: DIFFERENTIAL_PEDALS
    description: >
      X = left pedal, Y = right pedal, Rz = combined differential rudder axis.
      In flight sim, map X and Y to independent toe brakes and Rz to rudder.

support:
  tier: 2
  test_coverage:
    simulated: false
    hil: false
  notes: >
    CH Pro Pedals USB — PID 0x00F3 variant. Primary manifest: pro-pedals.yaml
    (PID 0x00F2, confirmed). VID 0x068E confirmed for CH Products. PID 0x00F3
    is a community estimate for a possible hardware variant. Last reviewed: 2026-07.
