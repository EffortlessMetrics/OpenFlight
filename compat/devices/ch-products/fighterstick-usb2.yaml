    description: "VID 0x068E confirmed CH Products. PID 0x00F4 community estimate for USB2 revision."
  - id: LEGACY_DEVICE
    description: "Updated USB2 firmware revision of the classic Fighterstick."

support:
  tier: 3
  test_coverage:
    simulated: false
    hil: false
  notes: >
    CH Products Fighterstick USB2 revision. Updated firmware. VID/PID unconfirmed.
    Last reviewed: 2026-07.
