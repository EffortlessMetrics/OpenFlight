# VID/PID from Linux kernel drivers/hid/hid-ids.h (USB_DEVICE_ID_CH_ECLIPSE_YOKE)
schema_version: "1"

device:
  name: "CH Flight Sim Eclipse Yoke"
  vendor: "CH Products"
  usb:
    vendor_id: 0x068E
    product_id: 0x0051
  hid:
    usage_page: 0x01
    usage: 0x04

capabilities:
  axes:
    count: 6
    names: [x, y, z, rx, ry, slider]
    resolution_bits: 10
  buttons: 32
  hats: 1
  force_feedback: false

polling:
  expected_rate_hz: 125
  max_jitter_ms: 4

quirks:
  - id: OS_MEDIATED_HID
    description: "CH Products devices use OS-mediated HID parsing (no raw report ID)."
  - id: YOKE_X_Y
    description: "X/Y axes are the yoke (roll/pitch). Z is the throttle knob."

support:
  tier: 2
  test_coverage:
    simulated: false
    hil: false
  notes: "VID/PID confirmed from Linux kernel hid-ids.h. Yoke form factor for GA/transport simulation."
