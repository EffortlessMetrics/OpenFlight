quirks:
  - id: PID_UNCONFIRMED
    description: >
      VID 0x068E confirmed (CH Products). PID 0x0050 estimated for Gamecard III. Verify with lsusb.

support:
  tier: 3
  test_coverage:
    simulated: false
    hil: false
  notes: >
    CH Products Gamecard III — gameport-to-USB adapter for legacy joysticks. Reports 4 analog axes and 4 buttons.
    Wave-99 addition. Last reviewed: 2026-07.
