# CH Products USB Game Stick
# SPDX-License-Identifier: MIT OR Apache-2.0
# SPDX-FileCopyrightText: Copyright (c) 2024 Flight Hub Team
#
# VID 0x068E (CH Products). PID 0x00F3 is a community estimate for the
# CH Products USB Game Stick — a budget joystick in the CH lineup, distinct
# from the Combat Stick (pro-grade) and the FightStick Pro. The USB Game Stick
# is a 3-axis design with a twist rudder and an integrated throttle wheel.
schema_version: "1"

device:
  name: "CH Products USB Game Stick"
  vendor: "CH Products"
  usb:
    vendor_id: 0x068E    # CH Products (CH Hangar)
    product_id: 0x00F3   # Community estimate — confirm with lsusb
  hid:
    usage_page: 0x01
    usage: 0x04

capabilities:
  axes:
    count: 4
    names: [x, y, rz, z]    # Stick X/Y, twist rudder, throttle wheel
    resolution_bits: 10
  buttons: 8
  hats: 1
  force_feedback: false

polling:
  expected_rate_hz: 125
  max_jitter_ms: 4

quirks:
  - id: PID_UNCONFIRMED
    description: >
      PID 0x00F3 is a community estimate. Confirm with lsusb before enabling
      production device matching. Distinct from CH Combat Stick and Pro Throttle.
  - id: OS_MEDIATED_HID
    description: "CH Products devices use OS-mediated HID parsing (no raw report ID)."
  - id: THROTTLE_ON_BASE
    description: >
      Z axis is an integrated throttle wheel on the base of the stick.
      Map Z unipolar [0, 1] to engine throttle in the profile.

support:
  tier: 3
  test_coverage:
    simulated: false
    hil: false
  notes: >
    CH Products USB Game Stick — budget entry-level joystick. PID unconfirmed.
    VID 0x068E = CH Products. Distinct from Combat Stick and FightStick Pro.
    Last reviewed: 2026-06.
