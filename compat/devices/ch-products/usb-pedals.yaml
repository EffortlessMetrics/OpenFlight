# CH Products USB Rudder Pedals
# SPDX-License-Identifier: MIT OR Apache-2.0
# SPDX-FileCopyrightText: Copyright (c) 2024 Flight Hub Team
#
# VID 0x068E (CH Products). PID 0x00F6 is a community estimate for the
# CH Products USB Rudder Pedals — the entry-level pedal set distinct from
# the Pro Pedals (0x00F2, pro-pedals.yaml). The USB Rudder Pedals are a
# simpler two-axis design without the independent left/right toe-brake axes
# of the Pro Pedals.
schema_version: "1"

device:
  name: "CH Products USB Rudder Pedals"
  vendor: "CH Products"
  usb:
    vendor_id: 0x068E    # CH Products (CH Hangar)
    product_id: 0x00F6   # Community estimate — confirm with lsusb
  hid:
    usage_page: 0x01
    usage: 0x04

capabilities:
  axes:
    count: 1
    names: [rz]          # Combined rudder axis only
    resolution_bits: 10
  buttons: 0
  hats: 0
  force_feedback: false

polling:
  expected_rate_hz: 125
  max_jitter_ms: 4

quirks:
  - id: PID_UNCONFIRMED
    description: >
      PID 0x00F6 is a community estimate. Confirm with lsusb. Distinct from
      CH Pro Pedals (0x00F2) which has 3 axes including independent toe brakes.
  - id: OS_MEDIATED_HID
    description: "CH Products devices use OS-mediated HID parsing (no raw report ID)."
  - id: SINGLE_AXIS_RUDDER
    description: >
      Budget pedal set with a single combined rudder axis. No independent
      left/right toe-brake axes. Map Rz to rudder in the OpenFlight profile.

support:
  tier: 3
  test_coverage:
    simulated: false
    hil: false
  notes: >
    CH Products USB Rudder Pedals — entry-level single-axis rudder pedals.
    Distinct from CH Pro Pedals (pro-pedals.yaml). PID unconfirmed.
    VID 0x068E = CH Products. Last reviewed: 2026-06.
