# Turtle Beach VelocityOne Flightdeck (Alt PID 0x8802)
# SPDX-License-Identifier: MIT OR Apache-2.0
# SPDX-FileCopyrightText: Copyright (c) 2024 Flight Hub Team
#
# Wave-41 addition. VID 0x10F5 (Turtle Beach Corporation).
# PID 0x8802 is a community estimate for the VelocityOne Flightdeck.
# The primary manifest (velocityone-flightdeck.yaml) uses PID 0x1050.
# PID 0x8802 appears in some community USB scan reports. Only one PID
# will match on real hardware. Verify with lsusb or USBView.
schema_version: "1"

device:
  name: "Turtle Beach VelocityOne Flightdeck (Alt PID)"
  vendor: "Turtle Beach Corporation"
  usb:
    vendor_id: 0x10F5
    product_id: 0x8802      # Community estimate — see also velocityone-flightdeck.yaml (0x1050)
  hid:
    usage_page: 0x01
    usage: 0x04

capabilities:
  axes:
    count: 6
    names: [roll, pitch, rudder, throttle, prop_rpm, mixture]
    resolution_bits: 12
  buttons: 63
  hats: 1
  force_feedback: false

polling:
  expected_rate_hz: 125
  max_jitter_ms: 4

quirks:
  - id: PID_UNCONFIRMED
    description: >
      PID 0x8802 is a community estimate. Primary manifest uses PID 0x1050
      (velocityone-flightdeck.yaml). Only one PID will match; verify on hardware.
  - id: COMBINED_YOKE_THROTTLE
    description: >
      The Flightdeck is a single combined USB HID device exposing both yoke axes
      (roll, pitch, rudder) and throttle-quadrant axes in one report.
  - id: GEAR_LEVER_AS_BUTTON
    description: >
      Landing gear lever is reported as discrete buttons (up/down), not as an axis.

support:
  tier: 3
  test_coverage:
    simulated: false
    hil: false
  notes: >
    Turtle Beach VelocityOne Flightdeck alternate PID 0x8802 estimate.
    Primary manifest uses PID 0x1050. VID 0x10F5 confirmed.
    Wave-41 addition. Last reviewed: 2026-07.
