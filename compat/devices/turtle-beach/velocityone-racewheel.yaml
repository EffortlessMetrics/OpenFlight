# Turtle Beach VelocityOne Race Wheel
# SPDX-License-Identifier: MIT OR Apache-2.0
# SPDX-FileCopyrightText: Copyright (c) 2024 Flight Hub Team
#
# The Turtle Beach VelocityOne Race Wheel is an entry-level racing wheel
# for Xbox/PC. Sometimes used in combined racing + flight sim setups.
# Companion to the VelocityOne Flight series (velocityone-flightstick.yaml, etc.).
# VID 0x10F5 confirmed: Turtle Beach Corp.
# PID 0x7012 is a community estimate — confirm with lsusb.
schema_version: "1"

device:
  name: "Turtle Beach VelocityOne Race Wheel"
  vendor: "Turtle Beach"
  usb:
    vendor_id: 0x10F5
    product_id: 0x7012   # Community estimate — confirm with lsusb
  hid:
    usage_page: 0x01
    usage: 0x04

capabilities:
  axes:
    count: 5
    names: [x, y, z, rz, slider]
    resolution_bits: 16
  buttons: 14
  hats: 1
  force_feedback: true
  ffb:
    effects: [spring, damper, constant, periodic]
    max_update_rate_hz: 500
    torque_limit_nm: null   # Unconfirmed

polling:
  expected_rate_hz: 500
  max_jitter_ms: 4

quirks:
  - id: PID_UNCONFIRMED
    description: >
      PID 0x7012 is a community estimate for the VelocityOne Race Wheel.
      VID 0x10F5 = Turtle Beach. Confirm with lsusb on real hardware.
  - id: WHEEL_AXIS_RANGE
    description: >
      Steering wheel X axis spans full HID range. Flight use requires axis
      scaling profile to restrict effective yoke travel to appropriate range.

support:
  tier: 3
  test_coverage:
    simulated: false
    hil: false
  notes: >
    Turtle Beach VelocityOne Race Wheel. VID 0x10F5 = Turtle Beach.
    PID 0x7012 unconfirmed. VelocityOne Flight: velocityone-flightstick.yaml.
    Last reviewed: 2026-06.
