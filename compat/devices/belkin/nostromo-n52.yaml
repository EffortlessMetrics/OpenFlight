# VID 0x04F2 (Chicony/OEM), PID 0x0602 — community-reported estimate.
schema_version: "1"

device:
  name: "Belkin Nostromo n52 SpeedPad"
  vendor: "Belkin"
  usb:
    vendor_id: 0x04F2
    product_id: 0x0602
  hid:
    usage_page: 0x01
    usage: 0x05

capabilities:
  axes:
    count: 1
    names: [scroll]
    resolution_bits: 8
  buttons: 14
  hats: 1
  force_feedback: false

polling:
  expected_rate_hz: 125
  max_jitter_ms: 4

quirks:
  - id: PID_UNCONFIRMED
    description: >
      VID/PID 0x04F2:0x0602 are community-reported estimates. Confirm with lsusb.
  - id: KEYPAD_CONTROLLER
    description: >
      The n52 is primarily a gaming keypad. Axis input is from the D-pad scroll
      wheel only. Most inputs are button events.

support:
  tier: 3
  test_coverage:
    simulated: false
    hil: false
  notes: >
    Belkin Nostromo n52 gaming keypad — 14 programmable buttons, d-pad, scroll
    wheel. Useful as a secondary input device for panel/knob simulation.
    Tier 3. Last reviewed: 2026-02.
