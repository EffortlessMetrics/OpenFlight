# ButtKicker Gamer2 Tactile Transducer Amplifier
# SPDX-License-Identifier: MIT OR Apache-2.0
# SPDX-FileCopyrightText: Copyright (c) 2024 Flight Hub Team
#
# The ButtKicker Gamer2 is a tactile transducer amplifier kit used in
# simulation rigs to provide bass-frequency haptic feedback. The amplifier
# drives a tactile transducer (ButtKicker actuator) mounted under the seat
# or floor. Audio input is via 3.5mm or RCA line-level; USB is present on
# some revisions for power delivery or firmware only — not HID input.
schema_version: "1"

device:
  name: "ButtKicker Gamer2"
  vendor: "ButtKicker (Guitammer)"
  usb:
    vendor_id: 0x0000   # Placeholder — VID_UNCONFIRMED; USB presence varies by revision
    product_id: 0x0000  # Placeholder — PID_UNCONFIRMED
  hid:
    usage_page: 0x01    # Generic Desktop
    usage: 0x00         # Undefined — USB for power/firmware only, not HID

capabilities:
  axes:
    count: 0
    names: []
    resolution_bits: ~
  buttons: 0
  hats: 0
  force_feedback: false   # Output-only audio transducer, not HID force-feedback

polling:
  expected_rate_hz: ~
  max_jitter_ms: ~

quirks:
  - id: NOT_USB_HID
    description: >
      The Gamer2 is an audio-driven tactile transducer amplifier, not a USB
      HID device. It receives bass frequencies (5-200 Hz) from a standard
      audio output (3.5mm or RCA). No USB enumeration occurs.
  - id: AUDIO_DRIVEN_OUTPUT
    description: >
      Haptic output is driven by a line-level audio signal routed to the
      amplifier's RCA/3.5mm input. OpenFlight does not directly control
      the ButtKicker; audio routing must be handled by the OS or a companion
      application (e.g., SimShaker, SimHub).
  - id: NO_HID_INPUT
    description: >
      The Gamer2 generates no HID input events. It is tracked for sim-rig
      accessory compatibility documentation only.

transducer:
  frequency_response_hz: [5, 200]
  power_peak_watts: 400
  impedance_ohms: 4
  connection: audio_line_level

support:
  tier: 3
  test_coverage:
    simulated: false
    hil: false
  notes: >
    ButtKicker Gamer2 tactile transducer amplifier. Audio-driven haptic output;
    not a USB HID input device. Tracked for accessory/rig compatibility.
    Last reviewed: 2026-02.
