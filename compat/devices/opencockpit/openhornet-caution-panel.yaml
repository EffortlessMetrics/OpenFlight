# OpenHornet Caution Advisory Panel
# SPDX-License-Identifier: MIT OR Apache-2.0
# SPDX-FileCopyrightText: Copyright (c) 2024 Flight Hub Team
#
# OpenHornet is a community open-source full-scale F/A-18C cockpit project.
# The Caution Advisory Panel (CAP) displays aircraft system warnings via
# illuminated indicator tiles. It is an output-only panel driven by HID
# output reports from DCS-BIOS or OpenFlight LED control.
# Firmware typically runs on Arduino/AVR; VID/PID are board-dependent.

schema_version: "1"

device:
  name: "OpenHornet Caution Advisory Panel"
  vendor: "OpenHornet Project (DIY)"
  usb:
    vendor_id: 0x2341   # Arduino SA (placeholder — board-dependent)
    product_id: 0x8043  # OpenHornet CAP firmware — PID_UNCONFIRMED
  hid:
    usage_page: 0x01
    usage: 0x00

capabilities:
  axes:
    count: 0
    names: []
    resolution_bits: 0
  buttons: 0
  hats: 0
  leds: 32              # Caution and advisory indicator tiles (varies by build)
  force_feedback: false

polling:
  expected_rate_hz: 20
  max_jitter_ms: 20

quirks:
  - id: VID_UNCONFIRMED
    description: >
      OpenHornet CAP uses various Arduino-compatible boards. VID 0x2341
      (Arduino SA) and PID 0x8043 are placeholders. Actual VID/PID depend
      on firmware build. Match by USB string descriptor "OpenHornet CAP".
  - id: OUTPUT_ONLY
    description: >
      The Caution Advisory Panel is an output-only device. It drives LED
      indicator tiles via HID output reports. No button or axis input is
      generated by this panel.
  - id: LED_COUNT_VARIABLE
    description: >
      The number of illuminated tiles varies between OpenHornet CAP
      hardware revisions (typically 20–32 LEDs). Check the specific
      firmware revision for exact LED count.
  - id: MULTI_PANEL_SYSTEM
    description: >
      A full OpenHornet pit includes 10–20 separate USB panels. This panel
      enumerates independently. See openhornet-ufc.yaml, openhornet-odu.yaml.

support:
  tier: 3
  test_coverage:
    simulated: false
    hil: false
  notes: >
    OpenHornet Caution Advisory Panel. Output-only LED indicator panel.
    Board/firmware dependent VID/PID. See github.com/OpenHornet.
    Last reviewed: 2026-06.
