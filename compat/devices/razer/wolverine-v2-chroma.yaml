# Razer Wolverine V2 Chroma
# SPDX-License-Identifier: MIT OR Apache-2.0
# SPDX-FileCopyrightText: Copyright (c) 2024 Flight Hub Team
#
# VID 0x1532 confirmed: Razer Inc.
# PID 0x0A29: confirmed from linux-hardware.org probes for Wolverine V2
# Chroma. Xbox-licensed wired controller with Chroma RGB and mecha-tactile
# buttons. Used in sim cockpit setups.

schema_version: "1"

device:
  name: "Razer Wolverine V2 Chroma"
  vendor: "Razer Inc."
  usb:
    vendor_id: 0x1532   # Razer Inc. (confirmed)
    product_id: 0x0A29  # Wolverine V2 Chroma — confirmed from linux-hardware.org
  hid:
    usage_page: 0x01
    usage: 0x05

capabilities:
  axes:
    count: 6
    names: [left_x, left_y, right_x, right_y, left_trigger, right_trigger]
    resolution_bits: 10
  buttons: 20
  hats: 1
  force_feedback: true

polling:
  expected_rate_hz: 1000
  max_jitter_ms: 1

quirks:
  - id: VENDOR_HID_PROTOCOL
    description: "Chroma RGB controlled via vendor HID protocol. Separate from axis/button HID."
  - id: MECHA_TACTILE_BUTTONS
    description: >
      Mecha-tactile face buttons provide a distinct click feel. Actuation point
      is slightly shorter than standard Xbox buttons.

support:
  tier: 2
  test_coverage:
    simulated: true
    hil: false
  notes: >
    Razer Wolverine V2 Chroma. VID 0x1532, PID 0x0A29 confirmed.
    1000Hz polling. Mecha-tactile ABXY. Last reviewed: 2026-06.
