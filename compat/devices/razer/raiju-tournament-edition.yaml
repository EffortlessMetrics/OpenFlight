# VID 0x1532 confirmed: Razer Inc (registered USB vendor).
# PID 0x0B04: confirmed from Razer open-source driver references and
# linux-hardware.org probes for Raiju Tournament Edition.

schema_version: "1"

device:
  name: "Razer Raiju Tournament Edition"
  vendor: "Razer Inc."
  usb:
    vendor_id: 0x1532   # Razer Inc. (confirmed)
    product_id: 0x0B04  # Raiju Tournament Edition — confirmed
  hid:
    usage_page: 0x01
    usage: 0x05

capabilities:
  axes:
    count: 6
    names: [left_x, left_y, right_x, right_y, left_trigger, right_trigger]
    resolution_bits: 8
  buttons: 19
  hats: 1
  force_feedback: true

polling:
  expected_rate_hz: 1000
  max_jitter_ms: 1

quirks:
  - id: VENDOR_HID_PROTOCOL
    description: "Razer vendor protocol for hair-trigger locks and button remapping."
  - id: HAIR_TRIGGER_LOCKS
    description: >
      Physical trigger locks reduce trigger travel. When locked, axis range
      is approximately 30% of full travel; profile curve should compensate.

support:
  tier: 2
  test_coverage:
    simulated: true
    hil: false
  notes: >
    Razer Raiju Tournament Edition. VID 0x1532, PID 0x0B04 confirmed.
    1000Hz polling. Last reviewed: 2026-06.
