# WinWing Orion 3 Throttle Base + TGRIP-F16 (non-EX grip)
# SPDX-License-Identifier: MIT OR Apache-2.0
# SPDX-FileCopyrightText: Copyright (c) 2024 Flight Hub Team
#
# PID 0xBD68 is community-reported for the Orion 3 generation throttle base
# paired with the classic TGRIP-F16 grip (non-EX). Not yet confirmed via
# linux-hardware.org or USB descriptor capture.
# Compare: Orion 2 + TGRIP-F16 uses PID 0xBE68 (orion2-f16-throttle.yaml)
#          Orion 3 + TGRIP-F16EX uses PID 0xBD48 (orion3-f16ex-throttle.yaml)

schema_version: "1"

device:
  name: "WinWing Orion 3 Throttle Base + TGRIP-F16"
  vendor: "WinWing"
  usb:
    vendor_id: 0x4098
    product_id: 0xBD68    # Community-reported; Orion 2 + TGRIP-F16 uses 0xBE68,
                           # Orion 3 F-16EX throttle uses 0xBD48.
                           # Verify with lsusb / USBView before enabling device matching.
  hid:
    usage_page: 0x01    # Generic Desktop
    usage: 0x05         # Gamepad (WinWing reports as Gamepad)

capabilities:
  axes:
    count: 4
    names: [throttle, z, rx, ry]
    resolution_bits: 12
  buttons: 40
  hats: 0
  encoders: 3
  force_feedback: false

polling:
  expected_rate_hz: 125
  max_jitter_ms: 3

quirks:
  - id: PID_UNCONFIRMED
    description: >
      PID 0xBD68 is community-reported and has not been confirmed from
      linux-hardware.org probes or a USB descriptor capture. Update this
      manifest when a confirmed PID becomes available.
  - id: ENCODER_AS_BUTTON
    description: >
      Rotary encoders generate HID button events (increment/decrement).
      OpenFlight maps encoder steps to axis positions or discrete commands
      based on the active profile.

support:
  tier: 2
  test_coverage:
    simulated: false
    hil: false
  notes: >
    Orion 3 generation throttle base paired with the classic TGRIP-F16 single-
    engine throttle grip (not the F-16EX variant). Single throttle lever with
    four axes and three rotary encoders. PID 0xBD68 is community-reported —
    confirm with lsusb or USB descriptor capture when hardware is available.
    The Orion 2 generation equivalent uses PID 0xBE68 (see
    orion2-f16-throttle.yaml); the Orion 3 F-16EX throttle uses PID 0xBD48
    (see orion3-f16ex-throttle.yaml).
