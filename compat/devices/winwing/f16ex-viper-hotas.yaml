# WinWing F-16EX Viper HOTAS (PID 0xB71F)
# SPDX-License-Identifier: MIT OR Apache-2.0
# SPDX-FileCopyrightText: Copyright (c) 2024 Flight Hub Team
#
# Wave-41 addition. VID 0x4098 (WinWing).
# PID 0xB71F is a community estimate for the WinWing F-16EX Viper HOTAS
# bundle. Existing Orion2 F16EX manifests use PIDs 0xBEA8 (stick) and
# 0xBE68 (throttle). PID 0xB71F appears in community PID tables as a
# combined or alternate SKU. Verify with SimAppPro or lsusb.
schema_version: "1"

device:
  name: "WinWing F-16EX Viper HOTAS"
  vendor: "WinWing"
  usb:
    vendor_id: 0x4098
    product_id: 0xB71F      # Community estimate — verify with SimAppPro or lsusb
  hid:
    usage_page: 0x01
    usage: 0x04

capabilities:
  axes:
    count: 6
    names: [x, y, z, rx, ry, rz]
    resolution_bits: 12
  buttons: 36
  hats: 1
  force_feedback: false

polling:
  expected_rate_hz: 125
  max_jitter_ms: 3

quirks:
  - id: PID_UNCONFIRMED
    description: >
      PID 0xB71F is a community estimate. Orion2 F16EX stick uses 0xBEA8,
      throttle uses 0xBE68. Verify with SimAppPro or lsusb.
  - id: F16_SIDESTICK_LAYOUT
    description: >
      F-16EX replica layout with central sidestick geometry. The Viper
      sidestick has no twist axis; rudder is handled by a separate pedal unit.

support:
  tier: 3
  test_coverage:
    simulated: false
    hil: false
  notes: >
    WinWing F-16EX Viper HOTAS PID 0xB71F community estimate. VID 0x4098.
    See also orion2-f16ex-stick.yaml and orion2-f16ex-throttle.yaml.
    Wave-41 addition. Last reviewed: 2026-07.
