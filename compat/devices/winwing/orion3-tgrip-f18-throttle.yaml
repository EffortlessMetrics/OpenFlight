# WinWing Orion 3 Throttle Base + F-18 TGRIP
# SPDX-License-Identifier: MIT OR Apache-2.0
# SPDX-FileCopyrightText: Copyright (c) 2024 Flight Hub Team
#
# PID 0xBD60 — community estimate.
# The F-18 TGRIP is the split-throttle F/A-18C grip variant for the Orion 3
# throttle base. The F-16 TGRIP on Orion 3 base uses PID 0xBD48
# (see orion3-f16ex-throttle.yaml).
# Not yet confirmed via linux-hardware.org or USB descriptor capture.

schema_version: "1"

device:
  name: "WinWing Orion 3 Throttle Base + F-18 TGRIP"
  vendor: "WinWing"
  usb:
    vendor_id: 0x4098
    product_id: 0xBD60    # Community estimate — Orion 3 F-16EX throttle uses 0xBD48
  hid:
    usage_page: 0x01    # Generic Desktop
    usage: 0x05         # Gamepad (WinWing reports as Gamepad)

capabilities:
  axes:
    count: 6
    names: [left_throttle, right_throttle, z, rx, ry, rz]
    resolution_bits: 12
  buttons: 50
  hats: 0
  encoders: 5
  force_feedback: false

polling:
  expected_rate_hz: 125
  max_jitter_ms: 3

quirks:
  - id: PID_UNCONFIRMED
    description: >
      PID 0xBD60 is a community estimate. The Orion 3 F-16EX throttle uses
      0xBD48; the F-18 split-throttle TGRIP is estimated adjacent.
      Not confirmed from linux-hardware.org or USB descriptor capture.
      Update this manifest when a confirmed PID becomes available.
  - id: SPLIT_THROTTLE
    description: >
      Left and right throttle levers are reported as separate axes replicating
      the F/A-18C Hornet twin-engine throttle. OpenFlight exposes both as
      independent axes and provides an optional combined virtual axis.
  - id: ENCODER_AS_BUTTON
    description: >
      Rotary encoders generate HID button events (increment/decrement).
      OpenFlight maps encoder steps to axis positions or discrete commands
      based on the active profile.

support:
  tier: 3
  test_coverage:
    simulated: false
    hil: false
  notes: >
    Orion 3 Throttle Base paired with the F/A-18C split-throttle grip (TGRIP-F18).
    Provides twin-engine split throttle replication for Hornet simulation.
    Distinct from the Orion 3 F-16EX single-engine throttle (PID 0xBD48).
    For the Orion 2 F/A-18C Throttle, see orion2-throttle.yaml (PID 0xBE62).
    PID 0xBD60 is a community estimate — confirm with lsusb before deployment.
