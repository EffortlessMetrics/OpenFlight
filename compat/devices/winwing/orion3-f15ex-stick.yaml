# WinWing Orion 3 F-15EX Stick (Eagle grip on Orion 3 Base)
# SPDX-License-Identifier: MIT OR Apache-2.0
# SPDX-FileCopyrightText: Copyright (c) 2024 Flight Hub Team
#
# PID 0xBD38 is community-reported for the Orion 3 generation F-15EX stick.
# Not yet confirmed via linux-hardware.org or USB descriptor capture.

schema_version: "1"

device:
  name: "WinWing Orion 3 F-15EX Stick"
  vendor: "WinWing"
  usb:
    vendor_id: 0x4098
    product_id: 0xBD38    # Community-reported; Orion 3 F-16EX throttle uses 0xBD48
  hid:
    usage_page: 0x01    # Generic Desktop
    usage: 0x05         # Gamepad (WinWing reports as Gamepad)

capabilities:
  axes:
    count: 2
    names: [x, y]
    resolution_bits: 12
  buttons: 20
  hats: 2
  force_feedback: false

polling:
  expected_rate_hz: 125
  max_jitter_ms: 3

quirks:
  - id: PID_UNCONFIRMED
    description: >
      PID 0xBD38 is community-reported and has not been confirmed from
      linux-hardware.org probes or a USB descriptor capture. Update this
      manifest when a confirmed PID becomes available.

support:
  tier: 2
  test_coverage:
    simulated: false
    hil: false
  notes: >
    Orion 3 generation F-15EX stick (Eagle grip). PID 0xBD38 is
    community-reported — confirm with lsusb or USB descriptor capture
    when hardware is available. Typically paired with the Super Taurus
    F-15EX dual-engine throttle (PID 0xBD64, see super-taurus-throttle.yaml).
    Distinct from the Orion 2 F-16EX stick (PID 0xBEA8). The F-15EX
    grip is a single right-hand grip; no Z-axis twist variant is known.
