# WinWing SKYWALKER Stick
# SPDX-License-Identifier: MIT OR Apache-2.0
# SPDX-FileCopyrightText: Copyright (c) 2024 Flight Hub Team
#
# PID 0xBEF2 is community-reported; the SKYWALKER Metal Rudder Pedals use
# 0xBEF0. Not yet confirmed via linux-hardware.org or USB descriptor capture.

schema_version: "1"

device:
  name: "WinWing SKYWALKER Stick"
  vendor: "WinWing"
  usb:
    vendor_id: 0x4098
    product_id: 0xBEF2    # Community-reported; SKYWALKER rudder pedals use 0xBEF0
  hid:
    usage_page: 0x01    # Generic Desktop
    usage: 0x05         # Gamepad (WinWing reports as Gamepad)

capabilities:
  axes:
    count: 3
    names: [x, y, z]
    resolution_bits: 12
  buttons: 15
  hats: 1
  force_feedback: false

polling:
  expected_rate_hz: 125
  max_jitter_ms: 3

quirks:
  - id: PID_UNCONFIRMED
    description: >
      PID 0xBEF2 is community-reported and has not been confirmed from
      linux-hardware.org probes or a USB descriptor capture. Update this
      manifest when a confirmed PID becomes available.

support:
  tier: 2
  test_coverage:
    simulated: false
    hil: false
  notes: >
    SKYWALKER joystick with twist (Z) axis and one hat switch. PID 0xBEF2 is
    community-reported — confirm with lsusb or USB descriptor capture when
    hardware is available. Typically paired with the SKYWALKER Metal Rudder
    Pedals (PID 0xBEF0).
