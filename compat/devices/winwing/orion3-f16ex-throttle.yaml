# WinWing Orion 3 F-16EX Throttle
# SPDX-License-Identifier: MIT OR Apache-2.0
# SPDX-FileCopyrightText: Copyright (c) 2024 Flight Hub Team
#
# PID 0xBD48 is community-reported for the Orion 3 generation F-16EX throttle.
# Not yet confirmed via linux-hardware.org or USB descriptor capture.

schema_version: "1"

device:
  name: "WinWing Orion 3 F-16EX Throttle"
  vendor: "WinWing"
  usb:
    vendor_id: 0x4098
    product_id: 0xBD48    # Community-reported; Orion 2 F-16 throttle uses 0xBE68
  hid:
    usage_page: 0x01    # Generic Desktop
    usage: 0x05         # Gamepad (WinWing reports as Gamepad)

capabilities:
  axes:
    count: 4
    names: [throttle, antitorque, thumbwheel_1, thumbwheel_2]
    resolution_bits: 12
  buttons: 32
  hats: 0
  encoders: 2
  force_feedback: false

polling:
  expected_rate_hz: 125
  max_jitter_ms: 3

quirks:
  - id: PID_UNCONFIRMED
    description: >
      PID 0xBD48 is community-reported and has not been confirmed from
      linux-hardware.org probes or a USB descriptor capture. Update this
      manifest when a confirmed PID becomes available.
  - id: ENCODER_AS_BUTTON
    description: >
      Rotary encoders generate HID button events (increment/decrement).
      OpenFlight maps encoder steps to axis positions or discrete commands
      based on the active profile.

support:
  tier: 2
  test_coverage:
    simulated: false
    hil: false
  notes: >
    Orion 3 generation F-16EX single-engine throttle. PID 0xBD48 is
    community-reported — confirm with lsusb or USB descriptor capture
    when hardware is available. Typically paired with the Orion 3 F-16EX
    stick. Orion 2 F-16 throttle uses PID 0xBE68.
