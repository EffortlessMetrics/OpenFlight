# WinWing Orion 2 Base (PID 0x0206)
# SPDX-License-Identifier: MIT OR Apache-2.0
# SPDX-FileCopyrightText: Copyright (c) 2024 Flight Hub Team
#
# VID 0x4098 confirmed: WinWing (Shenzhen WinWing Simulation Technology).
# PID 0x0206 is a community estimate for the Orion 2 Base unit.
# The alternate base variant is covered by orion2-base.yaml (PID 0xBE50).
schema_version: "1"

device:
  name: "WinWing Orion 2 Base"
  vendor: "WinWing"
  usb:
    vendor_id: 0x4098
    product_id: 0x0206      # Community estimate — confirm with SimAppPro or lsusb
  hid:
    usage_page: 0x01        # Generic Desktop
    usage: 0x05             # Gamepad

capabilities:
  axes:
    count: 3
    names: [x, y, z]
    resolution_bits: 12
  buttons: 16
  hats: 1
  force_feedback: false

polling:
  expected_rate_hz: 125
  max_jitter_ms: 3

quirks:
  - id: PID_UNCONFIRMED
    description: >
      PID 0x0206 is a community estimate for the Orion 2 Base. The primary
      confirmed variant uses PID 0xBE50 (orion2-base.yaml). Verify with
      SimAppPro USB enumeration or lsusb on real hardware.

support:
  tier: 3
  test_coverage:
    simulated: false
    hil: false
  notes: >
    WinWing Orion 2 Base — alternate PID 0x0206 community estimate.
    VID 0x4098 (WinWing). See also orion2-base.yaml (PID 0xBE50).
    Wave-47 addition. Last reviewed: 2026-07.
