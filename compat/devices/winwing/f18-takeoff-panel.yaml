schema_version: "1"

# Confirmed: VID 0x4098, PID 0xBE04 — linux-hardware.org (1 probe on ASUSTek
# TUF Gaming, USB string "F18 TAKEOFF PANEL", vendor "Winwing").
device:
  name: "WinWing F/A-18 Takeoff Panel"
  vendor: "WinWing"
  usb:
    vendor_id: 0x4098
    product_id: 0xBE04
  hid:
    usage_page: 0x01    # Generic Desktop
    usage: 0x05         # Gamepad (WinWing reports as Gamepad)

capabilities:
  axes:
    count: 0
    names: []
    resolution_bits: 0
  buttons: 20
  hats: 0
  force_feedback: false

polling:
  expected_rate_hz: 125
  max_jitter_ms: 5

support:
  tier: 3
  test_coverage:
    simulated: false
    hil: false
  notes: >
    F/A-18 replica takeoff panel covering pre-takeoff switches: flaps, speed
    brake, launch bar, and catapult controls. PID 0xBE04 confirmed from
    linux-hardware.org (1 probe). A second-generation variant is PID 0xBF05.
