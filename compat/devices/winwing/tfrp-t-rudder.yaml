# WinWing TFRP-T Rudder Pedals (with toe brakes)
# SPDX-License-Identifier: MIT OR Apache-2.0
# SPDX-FileCopyrightText: Copyright (c) 2024 Flight Hub Team
#
# PID 0xBE66 is community-reported for the updated TFRP-T model.
# The original TFRP uses PID 0xBE64. Not yet confirmed via linux-hardware.org.

schema_version: "1"

device:
  name: "WinWing TFRP-T Rudder Pedals"
  vendor: "WinWing"
  usb:
    vendor_id: 0x4098
    product_id: 0xBE66    # Community-reported; original TFRP uses 0xBE64
  hid:
    usage_page: 0x01    # Generic Desktop
    usage: 0x05         # Gamepad (WinWing reports as Gamepad)

capabilities:
  axes:
    count: 3
    names: [rudder, left_toe_brake, right_toe_brake]
    resolution_bits: 12
  buttons: 0
  hats: 0
  force_feedback: false

polling:
  expected_rate_hz: 125
  max_jitter_ms: 3

quirks:
  - id: PID_UNCONFIRMED
    description: >
      PID 0xBE66 is community-reported and has not been confirmed from
      linux-hardware.org probes or a USB descriptor capture. Update this
      manifest when a confirmed PID becomes available.

support:
  tier: 2
  test_coverage:
    simulated: false
    hil: false
  notes: >
    Updated TFRP-T model with progressive toe brakes. Axis layout is identical
    to the original TFRP (PID 0xBE64) and the SKYWALKER Metal Rudder Pedals
    (PID 0xBEF0): rudder yaw + independent left/right toe brakes.
    PID 0xBE66 community-reported — confirm with lsusb when hardware is available.
