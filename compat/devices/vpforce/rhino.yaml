schema_version: "1"

device:
  name: "VPforce Rhino FFB Joystick"
  vendor: "VPforce"
  usb:
    vendor_id: 0x0483       # STMicroelectronics (device MCU vendor)
    product_id: 0xA1C0      # Rhino v2; v3 uses 0xA1C1
    product_id_alt: 0xA1C1  # Rhino v3
  hid:
    usage_page: 0x01        # Generic Desktop
    usage: 0x04             # Joystick

capabilities:
  axes:
    count: 6
    names: [x, y, z, rx, ry, rz]
    resolution_bits: 16
  buttons: 32
  hats: 0
  force_feedback: true
  ffb:
    effects: [spring, damper, sine, square, triangle, sawtooth_up, sawtooth_down, constant]
    max_update_rate_hz: 500
    torque_limit_nm: null   # Configured via VPforce companion app

polling:
  expected_rate_hz: 500
  max_jitter_ms: 1

quirks:
  - id: DUAL_PRODUCT_ID
    description: >
      Rhino v2 and v3 share the same VID but differ in PID (0xA1C0 vs 0xA1C1).
      OpenFlight enumerates both; behaviour is identical.
  - id: STM_VID
    description: >
      VID 0x0483 belongs to STMicroelectronics (the MCU manufacturer).
      This is normal for VPforce devices and does not indicate a generic device.

support:
  tier: 2
  test_coverage:
    simulated: true
    hil: false
  notes: "HID report format validated by property tests and fuzz target."

firmware:
  min_version: "4.0"
  max_version: null
  notes: >
    VPforce companion app required for firmware updates and FFB torque tuning.
    Rhino v2 and v3 share the same firmware line. Ensure the companion app
    version matches the installed firmware. FFB effect set is identical across
    v2 (0xA1C0) and v3 (0xA1C1) hardware revisions.

driver:
  type: vpforce_companion
  notes: >
    VPforce companion app required for firmware updates, torque limit
    configuration, and centre-spring calibration. Device enumerates as standard
    HID; the companion app communicates over the same USB HID interface using
    vendor-defined reports.

tested_games:
  - game: "DCS World"
    integration: direct_input
    notes: "Primary FFB use case. Spring and damper effects driven by DCS FFB API; constant force for G-loading."
  - game: "MSFS 2020"
    integration: direct_input
    notes: "FFB effects supported via SimConnect force feedback translation. Spring/damper mapped to control feel."
  - game: "X-Plane 12"
    integration: direct_input
    notes: "No native X-Plane FFB API; OpenFlight synthesises spring/damper from flight model data."
  - game: "IL-2 Sturmovik: Great Battles"
    integration: direct_input
    notes: "Native FFB support in IL-2. Spring, damper, and constant effects all active."
