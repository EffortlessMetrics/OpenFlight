# HORI Flight Stick Alpha for PS5
# SPDX-License-Identifier: MIT OR Apache-2.0
# SPDX-FileCopyrightText: Copyright (c) 2024 Flight Hub Team
#
# The HORI HOTAS Flight Stick Alpha for PS5 is the PlayStation 5 variant of the
# HORI Flight Stick Alpha (flight-stick-alpha.yaml). Compatible with PS5 and PC.
# Functionally similar to the PS4 version with updated PS5 connectivity.
# VID 0x0F0D confirmed: Hori Co., Ltd.
# PID 0x0171 is a community estimate — confirm with lsusb.
schema_version: "1"

device:
  name: "HORI Flight Stick Alpha for PS5"
  vendor: "Hori Co., Ltd."
  usb:
    vendor_id: 0x0F0D
    product_id: 0x0171   # Community estimate — confirm with lsusb
  hid:
    usage_page: 0x01
    usage: 0x04

capabilities:
  axes:
    count: 5
    names: [x, y, z, rz, slider]
    resolution_bits: 10
  buttons: 19
  hats: 1
  force_feedback: false

polling:
  expected_rate_hz: 125
  max_jitter_ms: 4

quirks:
  - id: PID_UNCONFIRMED
    description: >
      PID 0x0171 is a community estimate for the PS5 Alpha variant. The PS4
      version (flight-stick-alpha.yaml) uses a different PID. Confirm with lsusb.
  - id: PS5_VARIANT
    description: >
      The PS5 Alpha adds PS5 authentication support. On PC it behaves as a
      standard HID joystick regardless of PS5 connectivity.

support:
  tier: 3
  test_coverage:
    simulated: false
    hil: false
  notes: >
    HORI Flight Stick Alpha for PS5. VID 0x0F0D = HORI.
    PID 0x0171 unconfirmed. PS4 version: flight-stick-alpha.yaml.
    Last reviewed: 2026-06.
