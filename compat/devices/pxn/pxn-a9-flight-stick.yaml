# PID 0x0900 — budget flight stick with more buttons.
schema_version: "1"

device:
  name: "PXN A9 Flight Stick"
  vendor: "PXN (Shenzhen JMD Technology)"
  usb:
    vendor_id: 0x3416
    product_id: 0x0900
  hid:
    usage_page: 0x01
    usage: 0x4           # Joystick

capabilities:
  axes:
    count: 4
    names: [x, y, twist, throttle]
    resolution_bits: 10
  buttons: 16
  hats: 1
  force_feedback: false

polling:
  expected_rate_hz: 125
  max_jitter_ms: 2

quirks:
  - id: PID_UNCONFIRMED
    description: >
      PID 0x0900 is a community estimate for A9. Verify with lsusb.

support:
  tier: 3
  test_coverage:
    simulated: false
    hil: false
  notes: >
    Budget flight stick with twist rudder, throttle, and 16 buttons.
    Last reviewed: 2026-06.
