# PXN V4 Joystick
# SPDX-License-Identifier: MIT OR Apache-2.0
# SPDX-FileCopyrightText: Copyright (c) 2024 Flight Hub Team
#
# The PXN V4 is an entry-level USB joystick from PXN (Shenzhen PXN Technology Co.)
# targeting flight simulation, featuring twist rudder, 8-way hat, and throttle slider.
# VID 0x3820 is a community estimate for PXN (Shenzhen PXN products).
# PID 0x0004 is a community estimate — confirm with lsusb.
schema_version: "1"

device:
  name: "PXN V4 Joystick"
  vendor: "PXN (Shenzhen PXN Technology)"
  usb:
    vendor_id: 0x3820    # Community estimate — confirm with lsusb
    product_id: 0x0004   # Community estimate — confirm with lsusb
  hid:
    usage_page: 0x01
    usage: 0x04

capabilities:
  axes:
    count: 4
    names: [x, y, z, rz]
    resolution_bits: 10
  buttons: 12
  hats: 1
  force_feedback: false

polling:
  expected_rate_hz: 125
  max_jitter_ms: 8

quirks:
  - id: PID_UNCONFIRMED
    description: >
      PID 0x0004 is a community estimate for the PXN V4. VID 0x3820 is also
      unconfirmed; PXN products may use different USB chip vendor IDs.
      Confirm both with lsusb on real hardware.
  - id: VID_UNCONFIRMED
    description: >
      VID 0x3820 is a community estimate. PXN V4 may use a third-party
      USB HID chip VID (e.g., 0x0079 DragonRise or 0x12BD). Verify with lsusb.

support:
  tier: 3
  test_coverage:
    simulated: false
    hil: false
  notes: >
    PXN V4 Joystick — entry-level budget USB stick. Both VID and PID unconfirmed.
    Related PXN devices: pxn-2119.yaml, pxn-v3-pro.yaml. Last reviewed: 2026-06.
