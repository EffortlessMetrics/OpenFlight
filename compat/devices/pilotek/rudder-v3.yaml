# Pilotek Rudder V3 — Spanish boutique rudder pedal set with aluminium frame
# and high-precision sensors. Popular in the Spanish and Portuguese flight sim
# community. VID 0x1209 (pid.codes open VID). PID 0x2140 community estimate.
# Wave-60 addition.
schema_version: "1"

device:
  name: "Pilotek Rudder V3 Pedals"
  vendor: "Pilotek"
  usb:
    vendor_id: 0x1209       # pid.codes open VID
    product_id: 0x2140      # Community estimate — confirm with lsusb
  hid:
    usage_page: 0x01        # Generic Desktop
    usage: 0x04             # Joystick

capabilities:
  axes:
    count: 3
    names: [rudder, left_brake, right_brake]
    resolution_bits: 12
  buttons: 0
  hats: 0
  force_feedback: false

polling:
  expected_rate_hz: 125
  max_jitter_ms: 3

quirks:
  - id: PID_UNCONFIRMED
    description: >
      VID 0x1209 / PID 0x2140 are community estimates for the Pilotek Rudder V3.
      Confirm with lsusb on real hardware.

support:
  tier: 3
  test_coverage:
    simulated: false
    hil: false
  notes: >
    Pilotek Rudder V3 — Spanish boutique aluminium rudder pedals. VID 0x1209 /
    PID 0x2140 community estimate. Wave-60 addition. Last reviewed: 2026-07.

tested_games:
  - msfs
  - xplane
  - dcs
