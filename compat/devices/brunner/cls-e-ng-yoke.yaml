# Brunner CLS-E NG Force Feedback Yoke (Next Generation / entry-level)
# SPDX-License-Identifier: MIT OR Apache-2.0
# SPDX-FileCopyrightText: Copyright (c) 2024 Flight Hub Team
#
# VID confirmed: 0x25BB (Brunner Elektronik AG) — from the-sz.com USB ID database.
# PID confirmed: 0x006D — from the-sz.com USB ID database, listed as "PRT.5127"
# (Brunner part number). Product name inferred from Brunner shop catalogue
# (shop.brunner-simulation.ch) where PRT.5127 corresponds to the CLS-E NG Yoke,
# the entry-level successor to the CLS-E MK II Yoke (PRT.5105).
schema_version: "1"

device:
  name: "Brunner CLS-E NG Force Feedback Yoke"
  vendor: "Brunner Elektronik AG"
  usb:
    vendor_id: 0x25BB         # Brunner Elektronik AG (registered VID)
    product_id: 0x006D        # PRT.5127 — confirmed from the-sz.com USB ID DB
  hid:
    usage_page: 0x01          # Generic Desktop
    usage: 0x04               # Joystick

capabilities:
  axes:
    count: 2
    names: [roll, pitch]      # Yoke roll and pitch; no integrated throttle
    resolution_bits: 16
  buttons: 12
  hats: 1
  force_feedback: true
  ffb:
    effects: [spring, damper, constant, sine]
    max_update_rate_hz: 250
    torque_limit_nm: null     # Configured in CLS2SIM companion software

polling:
  expected_rate_hz: 250
  max_jitter_ms: 2

quirks:
  - id: CLS2SIM_COMPANION
    description: >
      The CLS-E NG Yoke requires the Brunner CLS2SIM companion software for FFB
      configuration and yoke calibration. OpenFlight can read axis data directly via
      HID, but FFB effects should be sent via the CLS2SIM API or raw USB output reports.
  - id: HIL_NOT_VALIDATED
    description: >
      HID report layout inferred from Brunner SDK documentation and the USB PID/part
      mapping. Hardware-in-the-loop (HIL) validation has not been performed.
      Axis byte order and report ID require confirmation from real hardware.
  - id: PRODUCT_NAME_INFERRED
    description: >
      The mapping of part number PRT.5127 to the "CLS-E NG Yoke" product name is
      inferred from the Brunner shop catalogue. If the actual product name differs
      (e.g. different model year variant), adjust this manifest accordingly.

support:
  tier: 3
  test_coverage:
    simulated: false
    hil: false
  notes: >
    VID/PID confirmed from linux-usb.org registry (PRT.5127). Product name inferred
    from Brunner shop catalogue; no independent hardware probe found in
    linux-hardware.org. FFB requires CLS2SIM companion software.
    Last reviewed: 2026-02.
