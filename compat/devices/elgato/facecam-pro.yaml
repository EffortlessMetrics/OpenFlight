# Elgato Facecam Pro (USB Video / HID)
# SPDX-License-Identifier: MIT OR Apache-2.0
# SPDX-FileCopyrightText: Copyright (c) 2024 Flight Hub Team
#
# Elgato Facecam Pro — 4K USB webcam with hardware controls exposed via
# vendor HID. Sometimes mounted in home cockpit setups as a forward-view
# camera or for OBS scene management. VID 0x0FD9 confirmed (Elgato/Corsair).
# PID 0x0070 from linux-hardware.org community reports for Facecam Pro.

schema_version: "1"

device:
  name: "Elgato Facecam Pro"
  vendor: "Elgato"
  usb:
    vendor_id: 0x0FD9   # Elgato Systems / Corsair (confirmed)
    product_id: 0x0070  # Facecam Pro — PID from community reports
  hid:
    usage_page: 0xFF00   # Vendor-defined usage page
    usage: 0x0001

capabilities:
  axes:
    count: 0
    names: []
    resolution_bits: 0
  buttons: 1
  hats: 0
  force_feedback: false

polling:
  expected_rate_hz: 100
  max_jitter_ms: 5

quirks:
  - id: PID_UNCONFIRMED
    description: >
      PID 0x0070 is from community reports. Verify against actual hardware
      before production mapping. Camera video endpoints are separate from HID.
  - id: PANEL_DEVICE
    description: >
      Primarily a webcam; HID interface exposes hardware button (focus/record).
      OpenFlight maps the hardware button to a panel event for OBS/scene control.

support:
  tier: 3
  test_coverage:
    simulated: true
    hil: false
  notes: >
    Elgato Facecam Pro USB webcam. Used in some cockpit setups for scene
    switching or forward-view capture. VID 0x0FD9 confirmed; PID 0x0070
    from community reports. Last reviewed: 2026-06.
