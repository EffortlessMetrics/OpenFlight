# Elgato Stream Deck Original (15-key)
# SPDX-License-Identifier: MIT OR Apache-2.0
# SPDX-FileCopyrightText: Copyright (c) 2024 Flight Hub Team
#
# VID 0x0FD9 confirmed: Elgato Systems / Corsair (registered USB vendor).
# PID 0x0060 confirmed: documented in multiple open-source Stream Deck drivers
#   (python-elgato-streamdeck, node-elgato-stream-deck, streamdeck-linux-gui).
# The original 15-key Stream Deck is widely used in flight sim cockpit setups
# as a programmable panel/button device.

schema_version: "1"

device:
  name: "Elgato Stream Deck Original"
  vendor: "Elgato"
  usb:
    vendor_id: 0x0FD9    # Elgato Systems / Corsair (confirmed)
    product_id: 0x0060   # Stream Deck Original — confirmed from open-source drivers
  hid:
    usage_page: 0xFF00   # Vendor-defined usage page
    usage: 0x0001        # Vendor-defined

capabilities:
  axes:
    count: 0
    names: []
    resolution_bits: 0
  buttons: 15
  hats: 0
  force_feedback: false
  lcd_keys: true         # Each key has an LCD display

polling:
  expected_rate_hz: 1000  # USB interrupt endpoint; key events are near-instantaneous
  max_jitter_ms: 2

quirks:
  - id: VENDOR_HID_PROTOCOL
    description: >
      Stream Deck uses a vendor-defined HID protocol (usage page 0xFF00).
      Key state is reported via a 16-byte input report. Output reports
      control per-key LCD bitmaps. OpenFlight maps each key to a panel
      button event; image updates are handled by the streamdeck output driver.
  - id: PANEL_DEVICE
    description: >
      This device is a panel controller, not a traditional joystick/axis device.
      All 15 keys generate discrete button press/release events. Typically used
      for cockpit systems (lights, autopilot, comms, etc.) via profile bindings.

support:
  tier: 3
  test_coverage:
    simulated: true
    hil: false
  notes: >
    Elgato Stream Deck Original (first-generation, 15 keys, 3x5 grid).
    VID 0x0FD9 confirmed; PID 0x0060 confirmed from open-source drivers.
    Used for configurable cockpit panel buttons in MSFS, DCS, X-Plane setups.
    See also: streamdeck-mk2.yaml (second-gen), streamdeck-xl.yaml (32-key),
    streamdeck-plus.yaml (with dials). Last reviewed: 2026-06.
