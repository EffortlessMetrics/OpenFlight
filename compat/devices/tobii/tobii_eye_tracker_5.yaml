# Tobii Eye Tracker 5 (PID variant 0x0202)
# SPDX-License-Identifier: MIT OR Apache-2.0
# SPDX-FileCopyrightText: Copyright (c) 2024 Flight Hub Team
#
# VID 0x2104 confirmed: Tobii Technology AB.
# PID 0x0202 is a community estimate for the Eye Tracker 5; distinct from the
# 0x0408 estimate in eye-tracker-5.yaml. Tobii ET5 provides both eye-gaze
# tracking (90 Hz) and head-pose tracking for flight sim view control.
# Data is delivered via the Tobii Gaming SDK or opentrack integration.

schema_version: "1"

device:
  name: "Tobii Eye Tracker 5"
  vendor: "Tobii Technology AB"
  type: other
  usb:
    vendor_id: 0x2104    # Tobii Technology AB (confirmed)
    product_id: 0x0202   # Community estimate — ET5 variant; see also 0x0408
  hid:
    usage_page: 0x01
    usage: 0x04

capabilities:
  axes:
    count: 2
    names: [gaze_x, gaze_y]
    resolution_bits: 16
  buttons: 0
  hats: 0
  force_feedback: false

polling:
  expected_rate_hz: 90
  max_jitter_ms: 5

quirks:
  - id: PID_UNCONFIRMED
    description: >
      PID 0x0202 is a community estimate; another estimate (0x0408) appears in
      eye-tracker-5.yaml. The ET5 is a composite USB device; HID component PID
      may vary by firmware. Confirm from lsusb on real hardware.
  - id: EYE_TRACKING_SDK
    description: >
      Gaze data is not exposed as raw HID axes. OpenFlight reads eye and head
      position via the Tobii Gaming SDK or via opentrack's eye-tracking plugin.
  - id: COMBINED_GAZE_HEAD_TRACKING
    description: >
      The ET5 combines eye-gaze (90 Hz) and head-pose tracking. Flight sim use
      typically relies on head-pose for view control; eye-gaze for sensor zoom
      or cockpit interaction in compatible titles.

support:
  tier: 2
  test_coverage:
    simulated: false
    hil: false
  notes: >
    Tobii Eye Tracker 5. VID 0x2104 confirmed; PID 0x0202 community estimate
    (see also 0x0408 in eye-tracker-5.yaml). Eye-gaze and head-pose for flight
    sim view control via Tobii SDK or opentrack. Last reviewed: 2026-06.
