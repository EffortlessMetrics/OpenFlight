# Flight Illusion Communications Panel
# SPDX-License-Identifier: MIT OR Apache-2.0
# SPDX-FileCopyrightText: Copyright (c) 2024 Flight Hub Team
#
# Flight Illusion Communications Panel replicates a generic GA-aircraft
# COM/NAV radio comms selector panel with frequency rotary encoders,
# transfer pushbutton, and volume control for use in GA cockpit builds.
# VID 0x1F4D / PID 0x0059: community estimate.

schema_version: "1"

device:
  name: "Flight Illusion Communications Panel"
  vendor: "Flight Illusion"
  usb:
    vendor_id: 0x1F4D
    product_id: 0x0059      # Community estimate — comms panel
  hid:
    usage_page: 0x01
    usage: 0x00

capabilities:
  axes:
    count: 2                # Frequency coarse/fine outer rings as analogue
    names: [freq_coarse, freq_fine]
    resolution_bits: 8
  buttons: 12
  hats: 0
  force_feedback: false

polling:
  expected_rate_hz: 25
  max_jitter_ms: 20

quirks:
  - id: PID_UNCONFIRMED
    description: >
      PID 0x0059 is a community estimate. Confirm with Flight Illusion utility.
  - id: DUAL_CONCENTRIC_ENCODER
    description: >
      COM frequency rotary uses a dual-concentric encoder (outer = MHz, inner = kHz).
      Each sends axis changes; use the encoder_step binding for 25 kHz increments.
  - id: DISPLAY_FREQ
    description: >
      Active and standby frequency 7-segment displays are driven by HID output
      reports from the nav/com adapter subsystem.

support:
  tier: 3
  test_coverage:
    simulated: false
    hil: false
  notes: >
    Flight Illusion comms panel. VID 0x1F4D / PID 0x0059 est.
    Generic GA COM/NAV selector. Pairs with fi-gau57.yaml for full instrument cluster.
    Last reviewed: 2026-06.
