# VKB Space Gunfighter L (left-hand variant)
# SPDX-License-Identifier: MIT OR Apache-2.0
# SPDX-FileCopyrightText: Copyright (c) 2024 Flight Hub Team

schema_version: "1"

# Confirmed: VID 0x231D (VKB), PID 0x0127 — linux-hardware.org (3 probes,
# USB string "VKBSim Space Gunfighter L", vendor "VKB-Sim (C) Alex Oz 2023").
# Right-hand (or unspecified) variant is space-gunfighter.yaml (PID 0x0126).
device:
  name: "VKB Space Gunfighter L"
  vendor: "VKB"
  usb:
    vendor_id: 0x231D
    product_id: 0x0127
  hid:
    usage_page: 0x01    # Generic Desktop
    usage: 0x04         # Joystick

capabilities:
  axes:
    count: 8
    names: [x, y, z, rx, ry, rz, slider1, slider2]
    resolution_bits: 15
  buttons: 32
  hats: 1
  force_feedback: false

polling:
  expected_rate_hz: 125
  max_jitter_ms: 2

quirks:
  - id: CONFIGURABLE_AXES
    description: >
      Axis mapping can be changed in VKB's VKBDevCfg software.
      OpenFlight reads whatever the device reports; user must align VKB config
      with OpenFlight axis assignments.
  - id: A1_HAT_MODE
    description: >
      A1 hat mode behavior (8-way vs alternate 4-way) is profile-dependent
      in VKBDevCfg.

support:
  tier: 3
  test_coverage:
    simulated: false
    hil: false
  notes: >
    2023-generation Gunfighter pedestal base with Space series grip, left-hand
    variant. Designed for HOSAS (hands-on stick and side-stick) setups.
    See space-gunfighter.yaml for the right-hand / unspecified variant (PID 0x0126).
    VKBDevCfg can remap hats, ministicks, and axes; do not hardcode order.
