schema_version: "1"

device:
  name: "VKB Gladiator EVO SCG (Left)"
  vendor: "VKB"
  usb:
    vendor_id: 0x231D
    product_id: 0x0216   # Community estimate — EVO SCG left
  hid:
    usage_page: 0x01
    usage: 0x04

capabilities:
  axes:
    count: 8
    names: [x, y, z, rx, ry, rz, slider1, slider2]
    resolution_bits: 15
  buttons: 32
  hats: 1
  force_feedback: false

polling:
  expected_rate_hz: 125
  max_jitter_ms: 2

quirks:
  - id: PID_UNCONFIRMED
    description: >
      PID 0x0216 is a community estimate. Right variant estimated at 0x0215.
      Verify via linux-hardware.org USB string "VKBsim Gladiator EVO SCG L".
  - id: CONFIGURABLE_AXES
    description: "Axis mapping changeable in VKBDevCfg."
  - id: LEFT_HAND_MIRROR
    description: >
      Left-hand SCG is a mirrored configuration of the right-hand SCG.
      Axis polarity for X may be inverted; apply profile correction if needed.

support:
  tier: 3
  test_coverage:
    simulated: false
    hil: false
  notes: >
    VKB Gladiator EVO SCG left-hand variant. PID 0x0216 is unconfirmed.
    Right variant: gladiator-evo-scg.yaml. Last reviewed: 2026-02.
