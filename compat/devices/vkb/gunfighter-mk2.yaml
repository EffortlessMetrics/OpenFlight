# VKB Gunfighter MK2
# SPDX-License-Identifier: MIT OR Apache-2.0
# SPDX-FileCopyrightText: Copyright (c) 2024 Flight Hub Team
#
# VID 0x231D confirmed: VKB-Sim USB ID (VKBcontroller).
# PID 0x0124 is a community estimate for the Gunfighter MK2. The MK3 and MK4
# are later revisions; the MK2 was sold circa 2016–2019 and used a different
# firmware revision. No hardware probe has confirmed 0x0124 — update when
# a confirmed PID is available from lsusb on real hardware.
schema_version: "1"

device:
  name: "VKB Gunfighter MK2"
  vendor: "VKB"
  usb:
    vendor_id: 0x231D
    product_id: 0x0124      # Community estimate; MK3 = 0x012E (approx). Confirm with lsusb.
  hid:
    usage_page: 0x01        # Generic Desktop
    usage: 0x04             # Joystick

capabilities:
  axes:
    count: 8
    names: [x, y, z, rx, ry, rz, slider1, slider2]
    resolution_bits: 13
  buttons: 32
  hats: 1
  force_feedback: false

polling:
  expected_rate_hz: 125
  max_jitter_ms: 2

quirks:
  - id: PID_UNCONFIRMED
    description: >
      PID 0x0124 is a community estimate for the Gunfighter MK2. Later MK3
      (gunfighter-mk3.yaml) and MK4 (gunfighter-mk4.yaml) have different PIDs.
      No hardware probe has confirmed this value. Update when verified.
  - id: GRIP_MODULAR
    description: >
      The Gunfighter base accepts various VKB grip modules. The PID reported
      is for the base/firmware version; the grip module does not enumerate
      separately. Button count may differ by grip selection.

support:
  tier: 2
  test_coverage:
    simulated: false
    hil: false
  notes: >
    VKB Gunfighter MK2 (circa 2016–2019). Predecessor to the MK3 and MK4.
    Features cam-based force gradient and optional extension. PID 0x0124 is
    a community estimate. See gunfighter-mk3.yaml and gunfighter-mk4.yaml
    for later revisions. Last reviewed: 2026-02.
