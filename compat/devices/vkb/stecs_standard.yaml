# VKB STECS Standard Throttle (Combined / Generic Manifest)
# SPDX-License-Identifier: MIT OR Apache-2.0
# SPDX-FileCopyrightText: Copyright (c) 2024 Flight Hub Team
#
# Wave-34 addition. VID 0x231D (VKB Sim) is confirmed.
# PID 0x0209 is estimated for the STECS Standard combined unit.
# Left-hand (stecs-standard-left.yaml) and right-hand (stecs-standard-right.yaml)
# split manifests exist separately. This manifest targets the STECS Standard
# as a single USB device (some firmware versions report both halves under one PID).
# Verify PID with VKBDevCfg or lsusb.
schema_version: "1"

device:
  name: "VKB STECS Standard Throttle"
  vendor: "VKB"
  usb:
    vendor_id: 0x231D       # VKB Sim (confirmed)
    product_id: 0x0209      # Estimated — verify with VKBDevCfg or lsusb
  hid:
    usage_page: 0x01        # Generic Desktop
    usage: 0x05             # Gamepad

capabilities:
  axes:
    count: 4
    names: [throttle_left, throttle_right, rx, ry]
    resolution_bits: 12
  buttons: 28
  hats: 0
  force_feedback: false

polling:
  expected_rate_hz: 125
  max_jitter_ms: 2

quirks:
  - id: PID_UNCONFIRMED
    description: >
      PID 0x0209 is a community estimate for the STECS Standard combined unit.
      Left-hand and right-hand halves may enumerate separately under different
      PIDs. Confirm with VKBDevCfg → USB Info or lsusb.
  - id: SPLIT_THROTTLE_AXES
    description: >
      Left and right throttle levers are separate axes. OpenFlight exposes
      both individually; a virtual combined axis is available via profile rules.

support:
  tier: 2
  test_coverage:
    simulated: false
    hil: false
  notes: >
    VKB STECS Standard Throttle (combined single-USB variant). 4 axes, 28 buttons.
    VID 0x231D confirmed; PID 0x0209 estimated. See stecs-standard-left.yaml and
    stecs-standard-right.yaml for split-USB variants. Wave-34 addition.
    Last reviewed: 2026-06.
