# VKB Omni Throttle
# SPDX-License-Identifier: MIT OR Apache-2.0
# SPDX-FileCopyrightText: Copyright (c) 2024 Flight Hub Team
#
# VID 0x231D confirmed (VKB-Sim Europe).
# PID 0x0250 is a community estimate for the Omni Throttle.
# The VKB Omni Throttle is a compact 4-axis throttle unit designed for
# multi-engine and helicopter simulation with independent left/right
# throttle channels, a collective axis, and a spare axis.
schema_version: "1"

device:
  name: "VKB Omni Throttle"
  vendor: "VKB"
  usb:
    vendor_id: 0x231D       # VKB-Sim Europe
    product_id: 0x0250      # Community estimate — confirm with lsusb
  hid:
    usage_page: 0x01        # Generic Desktop
    usage: 0x04             # Joystick

capabilities:
  axes:
    count: 4
    names: [throttle_left, throttle_right, collective, spare]
    resolution_bits: 12
  buttons: 24
  hats: 1
  force_feedback: false

polling:
  expected_rate_hz: 125
  max_jitter_ms: 2

quirks:
  - id: PID_UNCONFIRMED
    description: >
      PID 0x0250 is a community estimate. Confirm with lsusb on real hardware
      and update this manifest when a confirmed PID becomes available.
  - id: HALL_EFFECT_SENSORS
    description: >
      All axes use contactless Hall-effect sensors. No mechanical wear; axis
      range may require per-unit calibration.
  - id: COLLECTIVE_AXIS
    description: >
      The collective axis is mapped for helicopter collective input. In
      fixed-wing profiles, map this axis to a prop pitch or engine condition
      lever as appropriate.

support:
  tier: 2
  test_coverage:
    simulated: false
    hil: false
  notes: >
    VKB Omni Throttle — 4-axis compact throttle unit for multi-engine and
    helicopter simulation. PID 0x0250 is a community estimate.
    Last reviewed: 2026-06.
