    description: >
      VID 0x231D confirmed (VKB-Sim). PID 0x012C estimated for Gunfighter + SCG Premium. Verify with VKBDevCfg.

support:
  tier: 3
  test_coverage:
    simulated: false
    hil: false
  notes: >
    VKB Gunfighter base with Space Combat Grip Premium. Modular grip with enhanced twist axis and additional hats for space sim use.
    Wave-96 addition. Last reviewed: 2026-07.
