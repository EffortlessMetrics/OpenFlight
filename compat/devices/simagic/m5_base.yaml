# Simagic M5 Direct Drive Wheel Base
# SPDX-License-Identifier: MIT OR Apache-2.0
# SPDX-FileCopyrightText: Copyright (c) 2024 Flight Hub Team
#
# The Simagic M5 is a 5Nm entry/mid-range direct-drive servo wheel base.
# Compact form factor, suitable for desktop sim rigs.
# VID 0x0483 (STMicroelectronics — Simagic USB MCU).
# PID 0x5742 is a community estimate — confirm with lsusb.

schema_version: "1"

device:
  name: "Simagic M5 Direct Drive Wheel Base"
  vendor: "Simagic"
  usb:
    vendor_id: 0x0483       # STMicroelectronics USB MCU (used by Simagic)
    product_id: 0x5742      # Community estimate — M5; confirm with lsusb
  hid:
    usage_page: 0x01
    usage: 0x04

capabilities:
  axes:
    count: 6
    names: [x, y, z, rx, ry, rz]
    resolution_bits: 16
  buttons: 32
  hats: 1
  force_feedback: true
  ffb:
    effects: [constant, spring, damper, inertia, friction, sine]
    max_update_rate_hz: 1000

polling:
  expected_rate_hz: 1000
  max_jitter_ms: 1

quirks:
  - id: PID_UNCONFIRMED
    description: >
      PID 0x5742 is a community estimate for the M5. See m10_base.yaml for
      VID details. Confirm with lsusb or Simagic Alpha Manager.
  - id: DIRECT_DRIVE_5NM
    description: >
      5Nm continuous torque. Lower peak torque than M10 but otherwise
      identical USB/HID stack. FFB strength limits apply.
  - id: SIMAGIC_ALPHA_MANAGER
    description: >
      Simagic Alpha Manager software used for advanced FFB and wheel
      configuration.

support:
  tier: 3
  test_coverage:
    simulated: false
    hil: false
  notes: >
    Simagic M5 — 5Nm direct-drive. VID 0x0483 (STM MCU); PID 0x5742 est.
    Entry-level DD base with same HID profile as M10. Last reviewed: 2026-06.
