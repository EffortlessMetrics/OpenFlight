# Simagic QR Quick-Release Adapter (Virtual Bundle)
# SPDX-License-Identifier: MIT OR Apache-2.0
# SPDX-FileCopyrightText: Copyright (c) 2024 Flight Hub Team
#
# The Simagic QR quick-release is a mechanical collar that attaches a wheel rim
# or flight grip to a Simagic direct-drive base. It does not enumerate as a
# standalone USB/HID device; it is modelled here as a virtual_bundle to document
# the pairing dependency between a base and an accessory rim or grip.
schema_version: "1"

device:
  name: "Simagic QR Quick-Release Adapter"
  vendor: "Simagic Technology"
  is_virtual: true
  usb:
    vendor_id: ~    # Not a USB device — mechanical adapter
    product_id: ~
  type: virtual_bundle

capabilities:
  axes:
    count: 0
    names: []
    resolution_bits: 0
  buttons: 0
  hats: 0
  force_feedback: false

quirks:
  - id: NOT_A_HID_DEVICE
    description: >
      The QR quick-release is a purely mechanical component. No USB enumeration
      occurs; inputs are provided by whichever rim or grip is attached and by
      the DD base. OpenFlight models this as a virtual_bundle pairing entry.

support:
  tier: 3
  test_coverage:
    simulated: false
    hil: false
  notes: >
    Virtual bundle entry representing the Simagic QR mechanical quick-release
    adapter. Pair with a Simagic direct-drive base (e.g. alpha-u-base.yaml)
    and a rim/grip in the OpenFlight device profile. Last reviewed: 2026-06.
