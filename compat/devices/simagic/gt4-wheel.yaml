# Simagic GT4 Steering Wheel
# SPDX-License-Identifier: MIT OR Apache-2.0
# SPDX-FileCopyrightText: Copyright (c) 2024 Flight Hub Team
#
# VID 0x0EBC (Simagic Technology, community-reported). PID 0x3040 is a
# community estimate for the Simagic GT4 steering wheel rim accessory. The GT4
# wheel provides buttons and rotary encoders; FFB is provided by the connected
# direct-drive base, not this wheel rim.
schema_version: "1"

device:
  name: "Simagic GT4 Steering Wheel"
  vendor: "Simagic Technology"
  usb:
    vendor_id: 0x0EBC    # Simagic Technology (community-reported)
    product_id: 0x3040   # Community estimate -- GT4 steering wheel rim
  hid:
    usage_page: 0x01     # Generic Desktop
    usage: 0x04          # Joystick

capabilities:
  axes:
    count: 0
    names: []
    resolution_bits: 0
  buttons: 13
  hats: 1
  force_feedback: false

polling:
  expected_rate_hz: 125
  max_jitter_ms: 4

quirks:
  - id: PID_UNCONFIRMED
    description: >
      PID 0x3040 is a community estimate. Confirm with lsusb on GT4 wheel
      hardware before enabling production device matching.
  - id: WHEEL_ACCESSORY
    description: >
      This is a steering wheel rim accessory -- it requires a Simagic direct-drive
      base to function; it does not connect to USB independently. Force feedback
      is provided by the base unit.

support:
  tier: 3
  test_coverage:
    simulated: false
    hil: false
  notes: >
    Simagic GT4 Steering Wheel rim accessory -- 13 buttons, 1 hat. VID 0x0EBC
    community-reported; PID 0x3040 is a community estimate. Requires a Simagic
    DD base to function. Last reviewed: 2026-06.
