# Saitek X52 Flight Control System (Alt PID 0xFF04)
# SPDX-License-Identifier: MIT OR Apache-2.0
# SPDX-FileCopyrightText: Copyright (c) 2024 Flight Hub Team
#
# VID 0x06A3 confirmed (Saitek/Logitech PLC).
# PID 0xFF04 is a community-reported alternate PID seen on some X52 units
# (distinct from the primary PID 0x075C in x52.yaml).
# Some firmware revisions or regional variants of the X52 enumerate under
# this PID. Functionally identical to the main X52 composite device.
schema_version: "1"

device:
  name: "Saitek X52 Flight Control System (Alt PID)"
  vendor: "Saitek / Logitech"
  usb:
    vendor_id: 0x06A3       # Saitek / Logitech PLC
    product_id: 0xFF04      # Community-reported alt PID; primary is 0x075C (x52.yaml)
  hid:
    usage_page: 0x01
    usage: 0x04

capabilities:
  axes:
    count: 6
    names: [x, y, rz, throttle, slider, rx]
    resolution_bits: 12
  buttons: 36
  hats: 3
  force_feedback: false

polling:
  expected_rate_hz: 125
  max_jitter_ms: 4

quirks:
  - id: PID_UNCONFIRMED
    description: >
      PID 0xFF04 is a community-reported alternate PID for the X52.
      Confirm with lsusb on real hardware. The primary X52 PID is 0x075C
      (see x52.yaml). Both PIDs share identical capabilities.

support:
  tier: 3
  test_coverage:
    simulated: false
    hil: false
  notes: >
    Saitek X52 alternate PID variant (0xFF04). Functionally identical to x52.yaml.
    Seen on some firmware revisions or regional units. Last reviewed: 2026-06.
