# Saitek P3200 Rumble Pad
# SPDX-License-Identifier: MIT OR Apache-2.0
# SPDX-FileCopyrightText: Copyright (c) 2024 Flight Hub Team
#
# VID 0x06A3 (Saitek / Mad Catz) / PID 0xFF17 — community estimate for the
# Saitek P3200 Rumble Pad. The P3200 is a mid-range USB gamepad with dual
# analogue sticks and vibration motors, positioned above the P2500 and below
# the Cyborg series. Sold circa 2006-2011.
schema_version: "1"

device:
  name: "Saitek P3200 Rumble Pad"
  vendor: "Saitek"
  usb:
    vendor_id: 0x06A3       # Saitek / Mad Catz (confirmed VID)
    product_id: 0xFF17      # P3200 — community estimate; verify with lsusb
  hid:
    usage_page: 0x01        # Generic Desktop
    usage: 0x05             # Game Pad

capabilities:
  axes:
    count: 4
    names: [x, y, z, rz]
    resolution_bits: 8
  buttons: 12
  hats: 2
  force_feedback: true
  ffb:
    effects: [rumble]
    max_update_rate_hz: 60

polling:
  expected_rate_hz: 125
  max_jitter_ms: 4

quirks:
  - id: PID_UNCONFIRMED
    description: >
      PID 0xFF17 is a community estimate for the P3200. Verify with lsusb
      before enabling production device matching.
  - id: DUAL_DPAD
    description: >
      The P3200 has two D-pads (4-way hats), unusual for a gamepad of this era.
      Both are reported as hat switches in the HID descriptor.

support:
  tier: 3
  test_coverage:
    simulated: false
    hil: false
  notes: >
    Saitek P3200 Rumble Pad. VID 0x06A3 confirmed; PID 0xFF17 estimated.
    Dual-dpad mid-range gamepad with vibration. Discontinued.
    Wave-42 addition. Last reviewed: 2026-07.
