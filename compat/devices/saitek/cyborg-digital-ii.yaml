# Saitek Cyborg Digital II Joystick
# SPDX-License-Identifier: MIT OR Apache-2.0
# SPDX-FileCopyrightText: Copyright (c) 2024 Flight Hub Team
#
# PID 0x0458 from USB IF. Digital joystick with programmable buttons.
schema_version: "1"

device:
  name: "Saitek Cyborg Digital II Joystick"
  vendor: "Saitek"
  usb:
    vendor_id: 0x06A3
    product_id: 0x0458
  hid:
    usage_page: 0x01
    usage: 0x4           # Joystick

capabilities:
  axes:
    count: 3
    names: [x, y, throttle]
    resolution_bits: 8
  buttons: 8
  hats: 1
  force_feedback: false

polling:
  expected_rate_hz: 125
  max_jitter_ms: 2

quirks:
  []

support:
  tier: 3
  test_coverage:
    simulated: false
    hil: false
  notes: >
    Digital programmable joystick. VID/PID from USB IF registry.
    Last reviewed: 2026-06.
