# ActiveSky Weather Engine (Virtual)
# SPDX-License-Identifier: MIT OR Apache-2.0
# SPDX-FileCopyrightText: Copyright (c) 2024 Flight Hub Team
#
# ActiveSky is a third-party weather engine add-on for MSFS, P3D, and FSX.
# It is a software-only virtual device with no physical USB hardware.
# This manifest documents the OpenFlight integration interface for reading
# ActiveSky weather data (wind, turbulence, visibility) and exposing it
# as virtual axis/telemetry inputs for force feedback and motion platform use.

schema_version: "1"

device:
  name: "ActiveSky Weather Engine"
  vendor: "HiFi Technologies"
  type: "other"
  usb:
    vendor_id: 0x0000  # virtual device - no physical USB
    product_id: 0x0000  # virtual device - no physical USB
capabilities:
  axes:
    count: 0
    names: []
    resolution_bits: 0
  buttons: 0
  hats: 0
  force_feedback: false

polling:
  expected_rate_hz: 4
  max_jitter_ms: 250

quirks:
  - id: VIRTUAL_NO_USB
    description: >
      ActiveSky has no physical USB device. Integration uses the ActiveSky
      SimConnect or UDP telemetry interface to read weather data. No HID
      input reports are generated by this device.
  - id: WEATHER_DATA_ONLY
    description: >
      This manifest covers the OpenFlight virtual weather source interface.
      Wind speed, turbulence intensity, and gust data can be mapped to
      force feedback effect parameters or motion platform cues.
  - id: SIM_DEPENDENT
    description: >
      ActiveSky integration requires an active simulator session (MSFS, P3D).
      Weather data is unavailable when the simulator is not running.

support:
  tier: 3
  test_coverage:
    simulated: false
    hil: false
  notes: >
    ActiveSky Weather Engine — virtual software integration, no USB device.
    Provides weather telemetry (wind, turbulence) for FFB/motion platform use.
    Compatible with MSFS and P3D. Last reviewed: 2026-06.
