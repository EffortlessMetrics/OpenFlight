# Logitech G440 Gaming Mouse
# SPDX-License-Identifier: MIT OR Apache-2.0
# SPDX-FileCopyrightText: Copyright (c) 2024 Flight Hub Team
#
# Logitech G440 is a wired gaming mouse with programmable buttons. In
# simulation contexts the programmable buttons can be bound to cockpit
# functions. VID 0x046D (Logitech) is confirmed; PID 0xC33F is
# community-reported from USB hardware databases.
schema_version: "1"

device:
  name: "Logitech G440 Gaming Mouse"
  vendor: "Logitech International SA"
  type: mouse
  usb:
    vendor_id: 0x046D   # Logitech International SA (confirmed)
    product_id: 0xC33F  # Community-reported — G440; confirm with lsusb
  hid:
    usage_page: 0x01
    usage: 0x02

capabilities:
  axes:
    count: 3
    names: [x, y, scroll]
    resolution_bits: 16
  buttons: 6
  hats: 0
  force_feedback: false

polling:
  expected_rate_hz: 1000
  max_jitter_ms: 1

quirks:
  - id: PID_UNCONFIRMED
    description: >
      PID 0xC33F is community-reported for the Logitech G440. Verify with
      lsusb on real hardware. The G440 uses a hard mousepad surface optimized
      for low-friction use.

support:
  tier: 2
  test_coverage:
    simulated: true
    hil: false
  notes: >
    Logitech G440 gaming mouse. VID 0x046D confirmed; PID 0xC33F
    community-reported. 6 programmable buttons for sim binding.
    Last reviewed: 2026-07.
