# Logitech WingMan Formula Force GP
# SPDX-License-Identifier: MIT OR Apache-2.0
# SPDX-FileCopyrightText: Copyright (c) 2024 Flight Hub Team
#
# VID 0x046D confirmed: Logitech Inc.
# PID 0xC293 confirmed from:
#   1. Linux kernel drivers/hid/hid-ids.h: USB_DEVICE_ID_LOGITECH_WINGMAN_FG
#   2. linuxconsole.sourceforge.net USB HID device database entry
# The WingMan Formula Force GP is a force feedback steering wheel with pedals.
# While designed for racing, it is occasionally used in flight sim setups with
# the wheel axis mapped to aileron or rudder, and the pedals to throttle/rudder.
schema_version: "1"

device:
  name: "Logitech WingMan Formula Force GP"
  vendor: "Logitech"
  usb:
    vendor_id: 0x046D    # Logitech Inc.
    product_id: 0xC293   # WingMan Formula Force GP (confirmed from kernel hid-ids.h)
  hid:
    usage_page: 0x01
    usage: 0x08          # Multi-axis controller (wheel)

capabilities:
  axes:
    count: 3
    names: [wheel, throttle, brake]
    resolution_bits: 10
  buttons: 8
  hats: 0
  force_feedback: true
  ffb:
    effects: [constant, spring, damper, sine, square, triangle, sawtooth_up, sawtooth_down]
    max_update_rate_hz: 100

polling:
  expected_rate_hz: 125
  max_jitter_ms: 4

quirks:
  - id: WHEEL_AXIS_FLIGHT_MAPPING
    description: >
      Wheel axis maps well to aileron (roll) or rudder in flight sims.
      Pedals (throttle = gas, brake = brake pedal) map to engine throttle
      and toe brake respectively. A custom profile is required since
      auto-detection cannot infer flight axis roles from a wheel device.
  - id: FFB_HID_PID
    description: >
      Force feedback uses USB HID PID (Physical Interface Device) standard
      effects. OpenFlight FFB engine will issue spring and constant-force
      effects for stick-force simulation when a flight profile is active.

support:
  tier: 3
  test_coverage:
    simulated: false
    hil: false
  notes: >
    Logitech WingMan Formula Force GP. PID 0xC293 confirmed from Linux kernel.
    Primarily a racing wheel; useful in flight setups with custom axis mapping.
    Force feedback available via HID PID standard effects.
    Last reviewed: 2026-06.
