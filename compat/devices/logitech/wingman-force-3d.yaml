# Logitech WingMan Force 3D
# SPDX-License-Identifier: MIT OR Apache-2.0
# SPDX-FileCopyrightText: Copyright (c) 2024 Flight Hub Team
#
# VID 0x046D (Logitech Inc.). PID 0xC283 is listed in the community usb.ids
# database as "WingMan Force 3D"; distinct from the WingMan Force original
# (0xC281) and Force 3D Pro (0xC286). Force-feedback joystick circa 2001-2005
# with 5 axes, twist rudder, and throttle.
schema_version: "1"

device:
  name: "Logitech WingMan Force 3D"
  vendor: "Logitech"
  usb:
    vendor_id: 0x046D    # Logitech Inc.
    product_id: 0xC283   # WingMan Force 3D -- usb.ids community database
  hid:
    usage_page: 0x01     # Generic Desktop
    usage: 0x04          # Joystick

capabilities:
  axes:
    count: 5
    names: [x, y, z, rx, ry]
    resolution_bits: 10
  buttons: 10
  hats: 1
  force_feedback: true
  ffb:
    effects: [spring, damper, constant, periodic]
    max_update_rate_hz: 100
    torque_limit_nm: null

polling:
  expected_rate_hz: 125
  max_jitter_ms: 4

quirks:
  - id: LEGACY_10BIT_AXES
    description: >
      10-bit axis resolution (1024 steps). Apply light smoothing for smooth
      analogue axis response in modern simulators.
  - id: DIRECTINPUT_FFB
    description: >
      FFB on X and Y axes via DirectInput spring, damper, constant-force, and
      periodic effects. The Z axis (throttle) has no FFB.
  - id: DISCONTINUED
    description: >
      Discontinued circa 2005. Legacy device; standard HID FFB continues to
      function on modern Windows via the WDM HID minidriver.

support:
  tier: 3
  test_coverage:
    simulated: false
    hil: false
  notes: >
    Logitech WingMan Force 3D (circa 2001-2005). 5-axis FFB joystick with twist
    rudder. PID 0xC283 from usb.ids community database. Distinct from Force 3D
    Pro (0xC286). Last reviewed: 2026-06.
