# Logitech WingMan 3D
# SPDX-License-Identifier: MIT OR Apache-2.0
# SPDX-FileCopyrightText: Copyright (c) 2024 Flight Hub Team
#
# VID 0x046D (Logitech Inc.). PID 0xC209 is listed in the community usb.ids
# database as "WingMan 3D". 3-axis joystick with twist rudder and throttle
# lever, circa 2000-2004. No force feedback.
schema_version: "1"

device:
  name: "Logitech WingMan 3D"
  vendor: "Logitech"
  usb:
    vendor_id: 0x046D    # Logitech Inc.
    product_id: 0xC209   # WingMan 3D -- usb.ids community database
  hid:
    usage_page: 0x01     # Generic Desktop
    usage: 0x04          # Joystick

capabilities:
  axes:
    count: 4
    names: [x, y, z, rz]
    resolution_bits: 10
  buttons: 8
  hats: 1
  force_feedback: false

polling:
  expected_rate_hz: 125
  max_jitter_ms: 4

quirks:
  - id: LEGACY_10BIT_AXES
    description: >
      10-bit axis resolution (1024 steps). Apply light smoothing for smooth
      analogue axis response in modern simulators.
  - id: DISCONTINUED
    description: >
      Discontinued circa 2004. Legacy device; enumerates as standard HID
      joystick on modern Windows without additional drivers.

support:
  tier: 3
  test_coverage:
    simulated: false
    hil: false
  notes: >
    Logitech WingMan 3D (circa 2000-2004). 4-axis with twist rudder, 8 buttons.
    PID 0xC209 from usb.ids community database. Last reviewed: 2026-06.
