# Logitech G923 Racing Wheel (Xbox / PC Edition)
# SPDX-License-Identifier: MIT OR Apache-2.0
# SPDX-FileCopyrightText: Copyright (c) 2024 Flight Hub Team
#
# VID 0x046D confirmed: Logitech International.
# PID 0xC267: G923 Xbox/PC variant (TrueForce). Distinct from:
#   0xC29B — G923 generic/PS5 variant
#   0xC266 — G923 PS4/PS5 variant
# Source: linux kernel hid-logitech-hidpp.c, SimHub device database.

schema_version: "1"

device:
  name: "Logitech G923 Racing Wheel (Xbox/PC)"
  vendor: "Logitech"
  usb:
    vendor_id: 0x046D    # Logitech International (confirmed)
    product_id: 0xC267   # G923 Xbox/PC — confirmed from Linux kernel hid-logitech-hidpp.c
  hid:
    usage_page: 0x01
    usage: 0x04

capabilities:
  axes:
    count: 6
    names: [x, throttle, brake, clutch, ry, rz]
    resolution_bits: 14
  buttons: 20
  hats: 1
  force_feedback: true
  ffb:
    effects: [spring, damper, constant, periodic, friction]
    max_update_rate_hz: 500

polling:
  expected_rate_hz: 500
  max_jitter_ms: 2

quirks:
  - id: TRUEFORCE_FFB_PATH
    description: >
      The Xbox/PC variant enables TrueForce high-frequency FFB via the
      Logitech G HUB SDK. Standard DirectInput FFB effects work without
      G HUB but bypass the TrueForce path.
  - id: XBOX_MODE_XINPUT
    description: >
      In Xbox mode the wheel presents as XInput controller. Switch to PC
      mode (hold the mode button) to expose full HID axis/button set.
  - id: RACING_WHEEL_IN_FLIGHT_SIM
    description: >
      Wheel rotation axis used for roll/rudder; pedal axes for throttle and
      brakes. Pair with a HOTAS or yoke for full flight-sim coverage.

support:
  tier: 2
  test_coverage:
    simulated: true
    hil: false
  notes: >
    Logitech G923 TrueForce — Xbox/PC variant. VID 0x046D / PID 0xC267 confirmed.
    Distinct PID from G923 PS variant (0xC266). Switch to PC mode for full HID
    exposure. Last reviewed: 2026-06.
