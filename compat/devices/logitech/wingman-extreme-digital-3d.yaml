schema_version: "1"

device:
  name: "Logitech WingMan Extreme Digital 3D"
  vendor: "Logitech"
  usb:
    vendor_id: 0x046D       # Confirmed
    product_id: 0xC207      # Community estimate - verify with lsusb
  hid:
    usage_page: 0x01     # Generic Desktop
    usage: 0x4             # Joystick

capabilities:
  axes:
    count: 4
    names: [x, y, z, rz]
    resolution_bits: 8
  buttons: 10
  hats: 1
  force_feedback: false

polling:
  expected_rate_hz: 125
  max_jitter_ms: 3

quirks:
  - id: PID_UNCONFIRMED
    description: >
      VID 0x046D confirmed (Logitech). PID 0xC207 estimated for WingMan Extreme Digital 3D. Verify with lsusb.

support:
  tier: 3
  test_coverage:
    simulated: false
    hil: false
  notes: >
    Logitech WingMan Extreme Digital 3D - USB variant with twist handle and digital hat. Late 1990s classic.
    Wave-99 addition. Last reviewed: 2026-07.
