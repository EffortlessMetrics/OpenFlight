# Logitech F510 Gamepad
# SPDX-License-Identifier: MIT OR Apache-2.0
# SPDX-FileCopyrightText: Copyright (c) 2024 Flight Hub Team
#
# VID 0x046D (Logitech) / PID 0xC21E — confirmed from SDL2 gamecontrollerdb
# and multiple community USB capture reports. The Logitech F510 is a wired
# USB gamepad with dual analogue sticks, vibration motors, and an XInput/DInput
# mode switch. Discontinued; was sold alongside the F710 wireless variant.
schema_version: "1"

device:
  name: "Logitech F510 Gamepad"
  vendor: "Logitech"
  usb:
    vendor_id: 0x046D       # Logitech (confirmed)
    product_id: 0xC21E      # F510 — confirmed, SDL2 gamecontrollerdb
  hid:
    usage_page: 0x01        # Generic Desktop
    usage: 0x05             # Game Pad

capabilities:
  axes:
    count: 6
    names: [x, y, z, rz, rx, ry]
    resolution_bits: 8
  buttons: 12
  hats: 1
  force_feedback: true
  ffb:
    effects: [rumble]
    max_update_rate_hz: 60

polling:
  expected_rate_hz: 125
  max_jitter_ms: 4

quirks:
  - id: XINPUT_DINPUT_SWITCH
    description: >
      The F510 has a physical XInput/DInput mode switch on the back. In DInput
      mode it enumerates as HID joystick (PID 0xC21E). In XInput mode it
      presents as an Xbox 360 controller via the xinput.sys driver and is not
      accessible via standard HID.
  - id: RUMBLE_DINPUT_ONLY
    description: >
      Vibration/rumble is available in both modes but OpenFlight sends FFB
      effects via the HID output report path (DInput mode only).

support:
  tier: 3
  test_coverage:
    simulated: false
    hil: false
  notes: >
    Logitech F510 Gamepad. VID 0x046D / PID 0xC21E confirmed from SDL2.
    Wired sibling of the F710. XInput/DInput switch on back.
    Wave-42 addition. Last reviewed: 2026-07.
