# Logitech WingMan Warrior
# SPDX-License-Identifier: MIT OR Apache-2.0
# SPDX-FileCopyrightText: Copyright (c) 2024 Flight Hub Team
#
# VID 0x046D (Logitech Inc.). PID 0xC208 is listed in the community usb.ids
# database as "WingMan Warrior". Released circa 1999–2002; one of Logitech's
# early USB gaming joysticks marketed for flight and space simulation.
# 3-axis joystick with throttle wheel on base, twist rudder, 8 buttons.
schema_version: "1"

device:
  name: "Logitech WingMan Warrior"
  vendor: "Logitech"
  usb:
    vendor_id: 0x046D     # Logitech Inc.
    product_id: 0xC208    # WingMan Warrior — usb.ids community database
  hid:
    usage_page: 0x01      # Generic Desktop
    usage: 0x04           # Joystick

capabilities:
  axes:
    count: 4
    names: [x, y, z, rz]
    resolution_bits: 10
  buttons: 8
  hats: 1
  force_feedback: false

polling:
  expected_rate_hz: 125
  max_jitter_ms: 4

quirks:
  - id: LEGACY_10BIT_AXES
    description: >
      10-bit axis resolution (1024 steps). Apply light smoothing (1–2 sample
      moving average) to reduce steppy axis response in modern simulators.
  - id: THROTTLE_ON_BASE
    description: >
      The rz axis is a throttle wheel on the base (not a twist rudder). The
      Z axis is the twist-grip rudder on the stick body. Map rz unipolar
      [0, 1] for throttle in the profile.

support:
  tier: 3
  test_coverage:
    simulated: false
    hil: false
  notes: >
    Logitech WingMan Warrior (circa 1999–2002). Entry-level 4-axis USB joystick.
    PID 0xC208 from usb.ids community database. Legacy device; no active
    support but standard HID continues to work on modern Windows.
    Last reviewed: 2026-02.
