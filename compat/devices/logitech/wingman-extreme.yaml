# Logitech WingMan Extreme (original USB)
# SPDX-License-Identifier: MIT OR Apache-2.0
# SPDX-FileCopyrightText: Copyright (c) 2024 Flight Hub Team
#
# VID 0x046D (Logitech Inc.). PID 0xC207 is listed in the community usb.ids
# database as "WingMan Extreme"; the original USB version, distinct from the
# WingMan Extreme Digital 3D (0xC20A). 2-axis joystick with throttle lever,
# circa 1998-2001; one of Logitech's first USB joysticks.
schema_version: "1"

device:
  name: "Logitech WingMan Extreme"
  vendor: "Logitech"
  usb:
    vendor_id: 0x046D    # Logitech Inc.
    product_id: 0xC207   # WingMan Extreme -- usb.ids community database
  hid:
    usage_page: 0x01     # Generic Desktop
    usage: 0x04          # Joystick

capabilities:
  axes:
    count: 3
    names: [x, y, z]
    resolution_bits: 8
  buttons: 6
  hats: 1
  force_feedback: false

polling:
  expected_rate_hz: 125
  max_jitter_ms: 4

quirks:
  - id: LEGACY_8BIT_AXES
    description: >
      8-bit axis resolution (256 steps). This is very coarse by modern
      standards; apply smoothing or a light low-pass filter for acceptable
      analogue axis response.
  - id: DISCONTINUED
    description: >
      Discontinued circa 2001. Legacy device; enumerates as standard HID
      joystick on modern Windows without additional drivers.

support:
  tier: 3
  test_coverage:
    simulated: false
    hil: false
  notes: >
    Logitech WingMan Extreme original USB (circa 1998-2001). 3-axis, 6 buttons.
    PID 0xC207 from usb.ids community database. Distinct from WingMan Extreme
    Digital 3D (0xC20A). Last reviewed: 2026-06.
