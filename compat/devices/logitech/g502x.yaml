# Logitech G502 X Gaming Mouse (Wired)
# SPDX-License-Identifier: MIT OR Apache-2.0
# SPDX-FileCopyrightText: Copyright (c) 2024 Flight Hub Team
#
# VID 0x046D confirmed: Logitech Inc.
# PID 0xC080 confirmed from:
#   1. Logitech USB ID registry (G502 X wired variant)
#   2. linux-hardware.org: usb:046d:c080 probes
# The G502 X is a high-precision gaming mouse with 13 programmable buttons.
# Some flight simmers bind its extra thumb buttons to cockpit controls (e.g.,
# view rotation, PTT, autopilot engage) making it a de-facto sim peripheral.

schema_version: "1"

device:
  name: "Logitech G502 X Gaming Mouse (Wired)"
  vendor: "Logitech"
  usb:
    vendor_id: 0x046D    # Logitech Inc.
    product_id: 0xC080   # G502 X wired (confirmed Logitech registry + linux-hardware.org)
  hid:
    usage_page: 0x01
    usage: 0x02          # Mouse

capabilities:
  axes:
    count: 2
    names: [x, y]
    resolution_bits: 16
  buttons: 13
  hats: 0
  force_feedback: false

polling:
  expected_rate_hz: 1000
  max_jitter_ms: 1

quirks:
  - id: HIGH_POLL_RATE
    description: >
      The G502 X polls at up to 1000 Hz. OpenFlight throttles mouse HID input
      to a maximum of 125 Hz for sim binding purposes.
  - id: NOT_PRIMARY_SIM_DEVICE
    description: >
      Intended as a supplemental binding device (extra thumb/scroll buttons),
      not a primary flight control input.

support:
  tier: 3
  test_coverage:
    simulated: false
    hil: false
  notes: >
    Logitech G502 X wired gaming mouse. PID 0xC080 confirmed. Used for
    supplemental button bindings (view, PTT, AP engage) in flight sim setups.
    Not a primary flight control device. Last reviewed: 2026-06.
