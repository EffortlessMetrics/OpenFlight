# Logitech Rumblepad 2 Vibration Feedback Gamepad
# SPDX-License-Identifier: MIT OR Apache-2.0
# SPDX-FileCopyrightText: Copyright (c) 2024 Flight Hub Team
#
# VID 0x046D confirmed: Logitech Inc.
# PID 0xC218 confirmed from:
#   1. SDL GameControllerDB: MAKE_VIDPID(0x046d, 0xc218) — "Logitech RumblePad 2"
#   2. Linux kernel hid-logitech: 0xc218 entry
# Mid-2000s USB gamepad with dual analog sticks and vibration motors.
# Occasionally used as a secondary flight sim controller.

schema_version: "1"

device:
  name: "Logitech RumblePad 2 Vibration Feedback Gamepad"
  vendor: "Logitech"
  usb:
    vendor_id: 0x046D    # Logitech Inc.
    product_id: 0xC218   # RumblePad 2 (confirmed SDL + Linux kernel)
  hid:
    usage_page: 0x01
    usage: 0x05          # Gamepad

capabilities:
  axes:
    count: 4
    names: [lx, ly, rx, ry]
    resolution_bits: 8
  buttons: 12
  hats: 1
  force_feedback: true

polling:
  expected_rate_hz: 100
  max_jitter_ms: 5

quirks:
  - id: ANALOG_TRIGGER_BUTTONS
    description: >
      L2/R2 are analog axes on newer variants but digital buttons on earlier
      hardware revisions. OpenFlight maps them as buttons in this manifest.

support:
  tier: 3
  test_coverage:
    simulated: false
    hil: false
  notes: >
    Logitech RumblePad 2. PID 0xC218 confirmed from SDL GameControllerDB and
    Linux hid-logitech driver. Legacy gamepad; occasionally used as secondary
    sim controller. Last reviewed: 2026-06.
