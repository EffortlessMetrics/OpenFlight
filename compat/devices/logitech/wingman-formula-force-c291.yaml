# Logitech WingMan Formula Force (Alt PID 0xC291)
# SPDX-License-Identifier: MIT OR Apache-2.0
# SPDX-FileCopyrightText: Copyright (c) 2024 Flight Hub Team
#
# VID 0x046D confirmed (Logitech Inc.).
# PID 0xC291 is a community-reported alternate PID for the WingMan Formula Force.
# The primary PID is 0xC293 (WingMan Formula Force GP in wingman-formula-force.yaml).
# The WingMan Formula Force was Logitech's early FFB racing wheel with spring
# and damper effects; occasionally used as axis input in flight sim setups.
schema_version: "1"

device:
  name: "Logitech WingMan Formula Force (Alt PID)"
  vendor: "Logitech"
  usb:
    vendor_id: 0x046D       # Logitech Inc.
    product_id: 0xC291      # Community-reported alt PID; primary GP model is 0xC293
  hid:
    usage_page: 0x01
    usage: 0x04

capabilities:
  axes:
    count: 3
    names: [x, y, rz]
    resolution_bits: 10
  buttons: 10
  hats: 1
  force_feedback: true
  ffb:
    effects: [spring, damper, friction, constant]
    max_update_rate_hz: 100

polling:
  expected_rate_hz: 125
  max_jitter_ms: 5

quirks:
  - id: PID_UNCONFIRMED
    description: >
      PID 0xC291 is community-reported for an earlier WingMan Formula Force
      revision. Confirm with lsusb. The GP version uses 0xC293 (wingman-formula-force.yaml).
  - id: DIRECTINPUT_FFB
    description: >
      Uses DirectInput force feedback. Spring and damper effects are well-supported.
      Constant and friction effects may vary by driver version.

support:
  tier: 3
  test_coverage:
    simulated: false
    hil: false
  notes: >
    Logitech WingMan Formula Force alternate PID (0xC291). See wingman-formula-force.yaml
    for the GP model (0xC293). Last reviewed: 2026-06.
