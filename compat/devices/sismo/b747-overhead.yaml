  test_coverage:
    simulated: false
    hil: false
  notes: >
    SISMO B747 Overhead Panel — Boeing 747 systems overhead panel replica.
    VID 0x1554 and PID 0x0001 unconfirmed. Last reviewed: 2026-06.
