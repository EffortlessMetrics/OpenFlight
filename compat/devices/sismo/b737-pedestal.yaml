# Sismo Soluciones Boeing 737 Pedestal Panel
# SPDX-License-Identifier: MIT OR Apache-2.0
# SPDX-FileCopyrightText: Copyright (c) 2024 Flight Hub Team
#
# VID 0x04D8 (Microchip Technology) / PID 0xF5D6 — community estimate.
# Sismo Soluciones (Spain) produces Boeing 737 NG cockpit panel replicas.
# The Pedestal panel covers the centre pedestal area: ATC transponder,
# audio control panel selectors, spoiler/speedbrake lever position,
# and flap/slat selector detents.
schema_version: "1"

device:
  name: "Sismo Soluciones Boeing 737 Pedestal Panel"
  vendor: "Sismo Soluciones"
  type: panel
  usb:
    vendor_id: 0x04D8       # Microchip Technology (common for custom USB HID)
    product_id: 0xF5D6      # Community estimate — Sismo B737 Pedestal
  hid:
    usage_page: 0x01        # Generic Desktop
    usage: 0x00             # Undefined (panel device)

capabilities:
  axes:
    count: 2
    names: [speedbrake, flap_lever]
    resolution_bits: 10
  buttons: 28
  hats: 0
  encoders: 4
  force_feedback: false

polling:
  expected_rate_hz: 20
  max_jitter_ms: 20

quirks:
  - id: PID_UNCONFIRMED
    description: >
      PID 0xF5D6 is a community estimate. Sismo panels use Microchip VID 0x04D8.
      Verify with lsusb. Distinct from the MCP (sismo-b737-mcp.yaml) and
      EICAS (b737-eicas.yaml) panels.
  - id: SPOILER_FLAP_ANALOGUE
    description: >
      Speedbrake/ground-spoiler lever and flap/slat selector lever are reported
      as analogue axes with detent positions. Detent thresholds should be
      configured in the OpenFlight axis mapping for reliable position detection.
  - id: ATC_TRANSPONDER_ENCODERS
    description: >
      ATC transponder squawk code digit selection via four rotary encoders
      (one per digit 1-4). Each encoder reports CW/CCW as discrete button events.

support:
  tier: 3
  test_coverage:
    simulated: false
    hil: false
  notes: >
    Sismo B737 Pedestal Panel. VID 0x04D8 (Microchip); PID 0xF5D6 estimated.
    Speedbrake, flap lever, ATC transponder. Wave-42 addition. Last reviewed: 2026-07.
