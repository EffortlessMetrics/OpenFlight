# Sismo Soluciones Boeing 737 EICAS Panel
# SPDX-License-Identifier: MIT OR Apache-2.0
# SPDX-FileCopyrightText: Copyright (c) 2024 Flight Hub Team
#
# VID 0x04D8 (Microchip Technology) / PID 0xF5D2 — community estimate.
# Sismo Soluciones (Spain) produces Boeing 737 NG cockpit panel replicas.
# The EICAS (Engine Indicating and Crew Alerting System) display control panel
# provides switch inputs for the two EICAS display pages, selector switches,
# and the engine/system display selection.
schema_version: "1"

device:
  name: "Sismo Soluciones Boeing 737 EICAS Panel"
  vendor: "Sismo Soluciones"
  type: panel
  usb:
    vendor_id: 0x04D8       # Microchip Technology (common for custom USB HID)
    product_id: 0xF5D2      # Community estimate — Sismo B737 EICAS
  hid:
    usage_page: 0x01        # Generic Desktop
    usage: 0x00             # Undefined (panel device)

capabilities:
  axes:
    count: 0
    names: []
    resolution_bits: 0
  buttons: 20
  hats: 0
  encoders: 2
  force_feedback: false

polling:
  expected_rate_hz: 20
  max_jitter_ms: 20

quirks:
  - id: PID_UNCONFIRMED
    description: >
      PID 0xF5D2 is a community estimate. Sismo panels use Microchip VID 0x04D8.
      Verify with lsusb. Distinct from the B737 MCP (sismo-b737-mcp.yaml).
  - id: EICAS_DISPLAY_SELECTORS
    description: >
      Primary selector switches for EICAS upper/lower display page content:
      engine, systems, status, and maintenance pages. Also includes ENG display
      select and alert cancel pushbutton.

support:
  tier: 3
  test_coverage:
    simulated: false
    hil: false
  notes: >
    Sismo B737 EICAS Panel. VID 0x04D8 (Microchip); PID 0xF5D2 estimated.
    Spanish B737 NG cockpit panel builder. Wave-42 addition. Last reviewed: 2026-07.
