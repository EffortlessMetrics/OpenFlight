# Boeing 737 replica throttle quadrant with thrust reversers.

schema_version: "1"

device:
  name: "Skalarki Throttle Quadrant 737"
  vendor: "Skalarki Electronics"
  usb:
    vendor_id: 0x1209
    product_id: 0x0BD0
  hid:
    usage_page: 0x01
