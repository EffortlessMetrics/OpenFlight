quirks:
  - id: PID_UNCONFIRMED
    description: "VID 0x1209 (pid.codes). PID 0x0BD0 community estimate."
  - id: THRUST_REVERSER
    description: "Includes thrust reverser detent and idle gate on both throttle levers."

support:
  tier: 3
  test_coverage:
    simulated: false
    hil: false
  notes: >
    Skalarki 737 throttle quadrant replica. Thrust reversers. VID/PID unconfirmed.
    Last reviewed: 2026-07.
