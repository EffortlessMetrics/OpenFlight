# Thrustmaster Sparco R383 Mod+ Racing Wheel
# SPDX-License-Identifier: MIT OR Apache-2.0
# SPDX-FileCopyrightText: Copyright (c) 2024 Flight Hub Team
#
# VID 0x044F (Thrustmaster) confirmed.
# PID 0xB665 is a community estimate from USB captures.
# The Sparco R383 Mod+ is a Sparco-licensed racing wheel add-on for
# Thrustmaster wheel bases (T300 RS, T-GT, TX). Features a 33cm Rally
# specification polyurethane rim with Sparco badging and 13 programmable
# buttons. Used on PC via the wheel base's USB connection.

schema_version: "1"

device:
  name: "Thrustmaster Sparco R383 Mod+ Racing Wheel"
  vendor: "Thrustmaster"
  usb:
    vendor_id: 0x044F       # Thrustmaster (confirmed)
    product_id: 0xB665      # Community estimate — PID_UNCONFIRMED
  hid:
    usage_page: 0x01        # Generic Desktop
    usage: 0x04             # Joystick

capabilities:
  axes:
    count: 1
    names: [x]              # Steering axis from wheel base
    resolution_bits: 16
  buttons: 13
  hats: 1
  force_feedback: false     # FFB is from the wheel base, not the rim

polling:
  expected_rate_hz: 250
  max_jitter_ms: 2

quirks:
  - id: PID_UNCONFIRMED
    description: >
      PID 0xB665 is a community estimate. The Sparco R383 Mod+ exposes its
      buttons via the Thrustmaster wheel base; PID may vary by the base model
      (T300 RS, T-GT II, TX). Confirm with lsusb.
  - id: RIM_ADDON
    description: >
      The Sparco R383 is a wheel rim add-on; it connects to a Thrustmaster
      wheel base (T300/TX/T-GT). The HID report is generated by the base, not
      the rim itself. Axis data (steering) originates from the base.

support:
  tier: 3
  test_coverage:
    simulated: false
    hil: false
  notes: >
    Thrustmaster Sparco R383 Mod+ rim add-on. VID 0x044F confirmed; PID 0xB665
    community estimate. Requires a compatible Thrustmaster base. Last reviewed: 2026-06.
