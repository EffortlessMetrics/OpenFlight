schema_version: "1"

device:
  name: "Thrustmaster FCS (Original)"
  vendor: "Thrustmaster"
  usb:
    vendor_id: 0x044F       # Confirmed
    product_id: 0x0200      # Community estimate - verify with lsusb
  hid:
    usage_page: 0x01     # Generic Desktop
    usage: 0x4             # Joystick

capabilities:
  axes:
    count: 3
    names: [x, y, z]
    resolution_bits: 8
  buttons: 4
  hats: 1
  force_feedback: false

polling:
  expected_rate_hz: 125
  max_jitter_ms: 4

quirks:
  - id: PID_UNCONFIRMED
    description: >
      VID 0x044F confirmed (Thrustmaster). PID 0x0200 estimated for original FCS (gameport/USB adapter). Verify with lsusb.

support:
  tier: 3
  test_coverage:
    simulated: false
    hil: false
  notes: >
    Thrustmaster FCS (original) - the classic F-16 FLCS replica from the early 1990s. Gameport design, needs adapter.
    Wave-99 addition. Last reviewed: 2026-07.
