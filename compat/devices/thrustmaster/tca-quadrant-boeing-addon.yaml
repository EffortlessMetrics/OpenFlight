# Thrustmaster TCA Quadrant Boeing Add-On (Engines 3 & 4)
# SPDX-License-Identifier: MIT OR Apache-2.0
# SPDX-FileCopyrightText: Copyright (c) 2024 Flight Hub Team
#
# PID confirmed: VID 0x044F:0x040B — linux-hardware.org ("TCA Quadrant Boeing 3&4").
# Primary quadrant (Engines 1&2) uses PID 0x040A; see tca-quadrant-boeing.yaml.
schema_version: "1"

device:
  name: "Thrustmaster TCA Quadrant Boeing Add-On (Eng 3&4)"
  vendor: "Thrustmaster"
  usb:
    vendor_id: 0x044F   # Thrustmaster (ThrustMaster of Texas, Inc.)
    product_id: 0x040B  # TCA Quadrant Boeing 3&4 — confirmed via linux-hardware.org
  hid:
    usage_page: 0x01    # Generic Desktop
    usage: 0x04         # Joystick

capabilities:
  axes:
    count: 4
    names: [throttle_3, throttle_4, flaps, speedbrake]
    resolution_bits: 12
  buttons: 10
  hats: 0
  force_feedback: false

polling:
  expected_rate_hz: 125
  max_jitter_ms: 4

quirks:
  - id: TCA_BOEING_QUADRANT_DETENT
    description: >
      Thrust levers feature a physical TOGA / CLB / MCT / IDLE detent system.
      The idle detent is at the low end of axis travel and TOGA at the high end.
      Reverse thrust gate extends below idle on compatible hardware configs.
  - id: ADD_ON_REQUIRES_PRIMARY
    description: >
      This Add-On unit is designed to be used alongside the primary TCA Quadrant
      Boeing Edition (PID 0x040A). It appears as a distinct USB device.

support:
  tier: 2
  test_coverage:
    simulated: false
    hil: false
  notes: >
    PID 0x040B confirmed from linux-hardware.org (USB string "TCA Quadrant Boeing 3&4").
    Axis count and names based on Thrustmaster product specification and community reports.
    Primary quadrant (Engines 1&2, PID 0x040A) is a separate USB device; see tca-quadrant-boeing.yaml.
