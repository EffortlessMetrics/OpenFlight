# Thrustmaster TCA Quadrant Airbus Edition
# SPDX-License-Identifier: MIT OR Apache-2.0
# SPDX-FileCopyrightText: Copyright (c) 2024 Flight Hub Team
#
# PIDs confirmed: VID 0x044F:0x0407 — linux-hardware.org ("TCA Q-Eng 1&2").
# Engines 3&4 Add-On uses PID 0x0408; see tca-quadrant-airbus-addon.yaml.
schema_version: "1"

device:
  name: "Thrustmaster TCA Quadrant Airbus Edition"
  vendor: "Thrustmaster"
  usb:
    vendor_id: 0x044F   # Thrustmaster (ThrustMaster of Texas, Inc.)
    product_id: 0x0407  # TCA Q-Eng 1&2 — confirmed via linux-hardware.org
  hid:
    usage_page: 0x01    # Generic Desktop
    usage: 0x04         # Joystick

capabilities:
  axes:
    count: 4
    names: [throttle_1, throttle_2, flaps, spoiler]
    resolution_bits: 12
  buttons: 12
  hats: 0
  force_feedback: false

polling:
  expected_rate_hz: 125
  max_jitter_ms: 4

quirks:
  - id: TCA_QUADRANT_REVERSE_DETENT
    description: >
      The thrust levers have a physical TOGA/CLB/MCT/IDLE detent system.
      The idle detent is at the low end of axis travel (raw 0) and TOGA
      at the high end. Reverse thrust (if fitted) extends below idle.
  - id: AIRBUS_SOLD_SEPARATELY
    description: >
      TCA Sidestick and TCA Quadrant are separate USB HID devices that must
      each be enumerated independently for full axis coverage.

support:
  tier: 2
  test_coverage:
    simulated: false
    hil: false
  notes: >
    PID 0x0407 confirmed from linux-hardware.org (USB string "TCA Q-Eng 1&2").
    Capabilities based on Thrustmaster product specification and community reports.
    Engines 3&4 Add-On (PID 0x0408) is a separate USB device; see tca-quadrant-airbus-addon.yaml.
