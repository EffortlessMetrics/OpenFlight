# Thrustmaster Add-On Formula Wheel
# SPDX-License-Identifier: MIT OR Apache-2.0
# SPDX-FileCopyrightText: Copyright (c) 2024 Flight Hub Team
#
# The Thrustmaster Add-On Formula Wheel is an open-wheel F1-style rim add-on
# compatible with T300RS, T-GT, TX, and TS-XW bases. It adds an additional
# 2-position rotary switch, 2 encoders, and extra button inputs beyond the
# base wheel's button count.
# VID 0x044F (Thrustmaster), PID 0xB65E is a community estimate.

schema_version: "1"

device:
  name: "Thrustmaster Add-On Formula Wheel"
  vendor: "Thrustmaster"
  usb:
    vendor_id: 0x044F       # Thrustmaster
    product_id: 0xB65E      # Community estimate — confirm with lsusb
  hid:
    usage_page: 0x01
    usage: 0x04

capabilities:
  axes:
    count: 2
    names: [rx, ry]         # Thumb paddles or analog inputs on rim
    resolution_bits: 10
  buttons: 24               # Face buttons + paddles + rotary switches
  hats: 1
  force_feedback: false     # Rim-only; FFB is in the wheel base

polling:
  expected_rate_hz: 250
  max_jitter_ms: 4

quirks:
  - id: PID_UNCONFIRMED
    description: >
      PID 0xB65E is a community estimate for the Add-On Formula Wheel.
      This rim connects to a compatible Thrustmaster base via the quick-release
      coupling; the PID seen by the OS depends on the base + rim combination.
      Verify with lsusb on target hardware.
  - id: RIM_ADDON_ONLY
    description: >
      This manifest covers the rim's additional inputs only. The steering
      wheel axis and FFB are provided by the connected base (t300rs.yaml,
      t-gt.yaml, tx-racing-wheel.yaml, etc.).
  - id: ROTARY_ENCODER_INPUTS
    description: >
      Two rotary encoders (bias/balance front/rear) generate button events
      (increment/decrement) rather than axis events. Map to trim axes in
      OpenFlight profile as button-step inputs.
  - id: FLIGHT_USE_MAPPING
    description: >
      Formula wheel is used in flight sim primarily for its extra buttons and
      rotary encoders — useful for autopilot heading/altitude knobs or
      transponder inputs.

support:
  tier: 3
  test_coverage:
    simulated: false
    hil: false
  notes: >
    Thrustmaster Add-On Formula Wheel — F1-style rim with encoders and extra
    buttons for T300RS/T-GT/TX/TS-XW bases. PID community estimate only.
    Last reviewed: 2026-06.
