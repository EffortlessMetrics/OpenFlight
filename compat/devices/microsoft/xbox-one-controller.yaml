# Microsoft Xbox One Controller (USB)
# SPDX-License-Identifier: MIT OR Apache-2.0
# SPDX-FileCopyrightText: Copyright (c) 2024 Flight Hub Team
#
# VID 0x045E confirmed: Microsoft Corporation.
# PID 0x02D1 confirmed from:
#   1. libsdl-org/SDL: MAKE_VIDPID(0x045e, 0x02d1) — "Xbox One Controller"
#   2. Linux kernel xpad driver (xpad_device_id table)
#   3. linux-hardware.org: 312 independent probes
# The Xbox One controller (first generation, 2013) over USB.
schema_version: "1"

device:
  name: "Microsoft Xbox One Controller"
  vendor: "Microsoft"
  usb:
    vendor_id: 0x045E    # Microsoft Corporation
    product_id: 0x02D1   # Xbox One Controller Gen 1 (confirmed)
  hid:
    usage_page: 0x01
    usage: 0x05

capabilities:
  axes:
    count: 6
    names: [lx, ly, rx, ry, lt, rt]
    resolution_bits: 16
  buttons: 15
  hats: 1
  force_feedback: true
  ffb:
    effects: [rumble_left, rumble_right, trigger_l, trigger_r]
    max_update_rate_hz: 60

polling:
  expected_rate_hz: 125
  max_jitter_ms: 4

quirks:
  - id: XINPUT_PREFERRED
    description: >
      Use XInput for full 16-bit axis resolution. DirectInput is available
      but limited. OpenFlight uses XInput when available on Windows.
  - id: TRIGGER_RUMBLE
    description: >
      Xbox One controllers support per-trigger rumble motors in addition to
      the standard grip motors. Trigger rumble requires XInput 1.4 extended
      rumble API; not available via standard DirectInput FFB.

support:
  tier: 3
  test_coverage:
    simulated: true
    hil: false
  notes: >
    Xbox One Controller (first generation, USB). PID 0x02D1 confirmed.
    Used in MSFS and DCS. See also xbox-360-controller.yaml for Xbox 360.
    Last reviewed: 2026-06.
