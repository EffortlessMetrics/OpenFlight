# Microsoft Xbox One S Controller (USB)
# SPDX-License-Identifier: MIT OR Apache-2.0
# SPDX-FileCopyrightText: Copyright (c) 2024 Flight Hub Team
#
# VID 0x045E confirmed: Microsoft Corporation.
# PID 0x02DD confirmed from:
#   1. libsdl-org/SDL: MAKE_VIDPID(0x045e, 0x02dd) — "Xbox One S Controller"
#   2. Linux kernel xpad driver table
#   3. linux-hardware.org hardware probe data
# Xbox One S controller (2016) connected via USB-A. Adds Bluetooth 4.0 over
# the original Xbox One controller (xbox-one-controller.yaml, PID 0x02D1).
schema_version: "1"

device:
  name: "Microsoft Xbox One S Controller"
  vendor: "Microsoft"
  usb:
    vendor_id: 0x045E    # Microsoft Corporation
    product_id: 0x02DD   # Xbox One S Controller (confirmed from SDL)
  hid:
    usage_page: 0x01
    usage: 0x05

capabilities:
  axes:
    count: 6
    names: [lx, ly, rx, ry, lt, rt]
    resolution_bits: 16
  buttons: 15
  hats: 1
  force_feedback: true
  ffb:
    effects: [rumble_left, rumble_right, trigger_l, trigger_r]
    max_update_rate_hz: 60

polling:
  expected_rate_hz: 125
  max_jitter_ms: 4

quirks:
  - id: XINPUT_PREFERRED
    description: "Use XInput for full 16-bit axis resolution."
  - id: BLUETOOTH_AVAILABLE
    description: >
      The Xbox One S added Bluetooth 4.0 alongside the existing USB connection.
      This manifest covers the USB HID mode; Bluetooth mode presents a different
      HID descriptor and is not covered here.

support:
  tier: 3
  test_coverage:
    simulated: true
    hil: false
  notes: >
    Xbox One S Controller. PID 0x02DD confirmed from SDL. USB connection covered
    here; see separate Bluetooth descriptor if using wireless mode.
    Last reviewed: 2026-06.
