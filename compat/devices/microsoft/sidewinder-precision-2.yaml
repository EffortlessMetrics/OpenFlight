schema_version: "1"

device:
  name: "Microsoft SideWinder Precision 2"
  vendor: "Microsoft"
  usb:
    vendor_id: 0x045E       # Confirmed
    product_id: 0x0038      # Community estimate — verify with lsusb
  hid:
    usage_page: 0x01     # Generic Desktop
    usage: 0x4             # Joystick

capabilities:
  axes:
    count: 4
    names: [x, y, z, rz]
    resolution_bits: 8
  buttons: 8
  hats: 1
  force_feedback: false

polling:
  expected_rate_hz: 125
  max_jitter_ms: 3

quirks:
  - id: PID_UNCONFIRMED
    description: >
      VID 0x045E confirmed (Microsoft). PID 0x0038 community-reported for SideWinder Precision 2. Verify with lsusb.

support:
  tier: 3
  test_coverage:
    simulated: false
    hil: false
  notes: >
    Microsoft SideWinder Precision 2 — classic USB joystick with 8 buttons and hat switch. Reliable mid-2000s stick.
    Wave-99 addition. Last reviewed: 2026-07.
