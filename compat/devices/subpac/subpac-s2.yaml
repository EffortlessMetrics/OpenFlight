# SubPac S2 Tactile Audio Backpack
# SPDX-License-Identifier: MIT OR Apache-2.0
# SPDX-FileCopyrightText: Copyright (c) 2024 Flight Hub Team
#
# SubPac S2 — wearable tactile audio backpack that converts audio bass
# frequencies into full-body vibration. Used in simulation rigs to enhance
# immersion. Primary audio input via 3.5mm or Bluetooth; USB-C port for
# charging and optionally firmware updates (not USB HID input).
schema_version: "1"

device:
  name: "SubPac S2 Tactile Audio Backpack"
  vendor: "SubPac"
  usb:
    vendor_id: 0x0000   # Placeholder — VID_UNCONFIRMED; USB-C is charge-only on S2
    product_id: 0x0000  # Placeholder — PID_UNCONFIRMED
  hid:
    usage_page: 0x01    # Generic Desktop
    usage: 0x00         # Undefined — not an HID input device

capabilities:
  axes:
    count: 0
    names: []
    resolution_bits: ~
  buttons: 0
  hats: 0
  force_feedback: false   # Audio-driven tactile output, not HID force-feedback

polling:
  expected_rate_hz: ~
  max_jitter_ms: ~

quirks:
  - id: VID_UNCONFIRMED
    description: >
      The SubPac S2 USB-C port is primarily for charging; it may not enumerate
      as a USB HID or audio device on all firmware versions. VID/PID unknown.
  - id: AUDIO_DRIVEN_OUTPUT
    description: >
      Tactile output is driven by the audio input signal (3.5mm or Bluetooth).
      OpenFlight cannot directly control SubPac haptics; audio routing must
      be managed by the OS audio stack or a companion application.
  - id: NO_HID_INPUT
    description: >
      The SubPac S2 generates no HID input events. Tracked for wearable
      accessory compatibility documentation.

support:
  tier: 3
  test_coverage:
    simulated: false
    hil: false
  notes: >
    SubPac S2 wearable tactile backpack. Audio-driven haptic output; not a
    USB HID input device. Tracked for accessory/rig compatibility.
    Last reviewed: 2026-02.
