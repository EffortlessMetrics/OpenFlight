# FriendlyPanels Airbus A320 Center Pedestal Panel
# SPDX-License-Identifier: MIT OR Apache-2.0
# SPDX-FileCopyrightText: Copyright (c) 2024 Flight Hub Team
#
# VID 0x2341 (Arduino LLC) / PID 0x803A — community estimate. FriendlyPanels
# (Spain) produces Airbus A320 center pedestal replica panels for home cockpit
# builders. The pedestal panel covers ATC transponder, radio management,
# spoiler/speedbrake lever, and thrust reverser controls.
schema_version: "1"

device:
  name: "FriendlyPanels Airbus A320 Center Pedestal Panel"
  vendor: "FriendlyPanels"
  type: panel
  usb:
    vendor_id: 0x2341       # Arduino LLC (placeholder — FriendlyPanels Arduino base)
    product_id: 0x803A      # Community estimate — A320 center pedestal
  hid:
    usage_page: 0x01        # Generic Desktop
    usage: 0x00             # Undefined

capabilities:
  axes:
    count: 2
    names: [speedbrake, flap_lever]
    resolution_bits: 8
  buttons: 32
  hats: 0
  encoders: 6
  force_feedback: false

polling:
  expected_rate_hz: 20
  max_jitter_ms: 20

quirks:
  - id: PID_UNCONFIRMED
    description: >
      PID 0x803A is a community estimate. FriendlyPanels pedestal kits use
      Arduino Leonardo-compatible boards (VID 0x2341). Verify with lsusb.
  - id: ARDUINO_HID_BASE
    description: >
      Arduino-based pedestal panel. Enumerates as standard HID joystick.
  - id: AIRBUS_PEDESTAL_CONTROLS
    description: >
      Centre pedestal section includes speedbrake/ground spoiler lever (analogue),
      flap/slat selection lever (analogue), parking brake, and transponder digit
      rotary encoders.

support:
  tier: 3
  test_coverage:
    simulated: false
    hil: false
  notes: >
    FriendlyPanels A320 Center Pedestal. VID 0x2341 (Arduino); PID 0x803A estimated.
    Speedbrake, flap lever, transponder, and pedestal switch replica.
    Wave-42 addition. Last reviewed: 2026-07.
