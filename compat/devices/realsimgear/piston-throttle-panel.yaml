# SPDX-FileCopyrightText: Copyright (c) 2024 Flight Hub Team
#
# Multi-engine piston throttle panel with prop and mixture levers.

schema_version: "1"

device:
  name: "RealSimGear Piston Throttle Panel"
  vendor: "RealSimGear"
  usb:
    vendor_id: 0x04D8
    product_id: 0xF255
  hid:
    usage_page: 0x01
    usage: 0x04

capabilities:
  axes:
    count: 6
    names: [throttle1, throttle2, prop1, prop2, mixture1, mixture2]
    resolution_bits: 12
  buttons: 4
  hats: 0
  force_feedback: false

polling:
  expected_rate_hz: 100
  max_jitter_ms: 10

quirks:
  - id: PID_UNCONFIRMED
    description: "VID 0x04D8 (Microchip/RealSimGear). PID 0xF255 community estimate."
  - id: TWIN_ENGINE
    description: "Twin-engine piston layout with independent throttle/prop/mixture per engine."

support:
  tier: 3
  test_coverage:
    simulated: false
    hil: false
  notes: >
    RealSimGear piston throttle panel for twin-engine aircraft. VID/PID unconfirmed.
    Last reviewed: 2026-07.
