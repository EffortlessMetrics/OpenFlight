# RealSimGear G5 HSI Bezel
# SPDX-License-Identifier: MIT OR Apache-2.0
# SPDX-FileCopyrightText: Copyright (c) 2024 Flight Hub Team
#
# VID 0x04D8 confirmed: RealSimGear (Microchip Technology licensed VID).
# PID 0xF270 is a community estimate for the G5 HSI bezel.
# The Garmin G5 is a retrofit electronic flight instrument (EFIS) for GA.
# The RealSimGear G5 HSI bezel replicates the physical button and knob layout
# of the G5 in HSI (horizontal situation indicator) configuration.

schema_version: "1"

device:
  name: "RealSimGear G5 HSI Bezel"
  vendor: "RealSimGear"
  usb:
    vendor_id: 0x04D8
    product_id: 0xF270   # Community estimate — G5 HSI bezel
  hid:
    usage_page: 0x01
    usage: 0x04

capabilities:
  axes:
    count: 0
    names: []
    resolution_bits: 0
  buttons: 6
  hats: 0
  encoders: 1            # OBS/CRS setting encoder
  force_feedback: false

polling:
  expected_rate_hz: 125
  max_jitter_ms: 8

quirks:
  - id: PID_UNCONFIRMED
    description: >
      PID 0xF270 is a community estimate for the G5 HSI bezel.
      Confirm with lsusb on real hardware before deployment.
  - id: OBS_ENCODER
    description: >
      The single rotary encoder adjusts OBS/CRS (course selector) heading.
      In OpenFlight, map this encoder to the HSI course variable for the
      active simulator (MSFS/X-Plane G5 navigation data).

support:
  tier: 3
  test_coverage:
    simulated: false
    hil: false
  notes: >
    RealSimGear G5 HSI Bezel — Garmin G5 horizontal situation indicator replica.
    VID 0x04D8 confirmed; PID 0xF270 is a community estimate.
    Used in traditional GA instrument panel setups. Last reviewed: 2026-06.
