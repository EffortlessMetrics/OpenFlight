# RealSimGear G530 GPS (alternate PID variant)
# SPDX-License-Identifier: MIT OR Apache-2.0
# SPDX-FileCopyrightText: Copyright (c) 2024 Flight Hub Team
#
# VID 0x04D8 (Microchip Technology / RealSimGear), PID 0xEF71 — community
# estimate for a newer G530 GPS firmware revision. The earlier variant uses
# PID 0xF250 (see g530-gps.yaml).

schema_version: "1"

device:
  name: "RealSimGear G530 GPS"
  vendor: "RealSimGear"
  usb:
    vendor_id: 0x04D8       # Microchip Technology (used by RealSimGear)
    product_id: 0xEF71      # Community estimate — G530 GPS alternate revision
  hid:
    usage_page: 0x01        # Generic Desktop
    usage: 0x00             # Undefined (panel device)

capabilities:
  axes:
    count: 0
    names: []
    resolution_bits: 0
  buttons: 30
  hats: 0
  force_feedback: false

polling:
  expected_rate_hz: 10
  max_jitter_ms: 50

quirks:
  - id: PID_UNCONFIRMED
    description: >
      PID 0xEF71 is a community estimate. The earlier G530 GPS variant uses
      PID 0xF250 (see realsimgear/g530-gps.yaml). Confirm with lsusb.

support:
  tier: 3
  test_coverage:
    simulated: false
    hil: false
  notes: >
    RealSimGear G530 GPS — Garmin GNS 530 GPS/NAV/COM replica.
    PID 0xEF71 community estimate (alt revision). Last reviewed: 2026-06.
