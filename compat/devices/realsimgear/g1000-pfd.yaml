# RealSimGear G1000 PFD Bezel
# SPDX-License-Identifier: MIT OR Apache-2.0
# SPDX-FileCopyrightText: Copyright (c) 2024 Flight Hub Team
#
# VID 0x04D8 (Microchip Technology / RealSimGear), PID 0xF236 (approximate).
# G1000 Primary Flight Display panel bezel replica. Provides the full set of
# PFD-side controls: NAV/COM flip, CRS/BARO/ALT knobs, autopilot panel buttons,
# and CDI/MENU/CLR/ENT keys for GA aircraft simulation.
schema_version: "1"

device:
  name: "RealSimGear G1000 PFD Bezel"
  vendor: "RealSimGear"
  usb:
    vendor_id: 0x04D8       # Microchip Technology (used by RealSimGear)
    product_id: 0xF236      # G1000 PFD — approximate; varies by firmware revision
  hid:
    usage_page: 0x01        # Generic Desktop
    usage: 0x00             # Undefined (panel device)

capabilities:
  axes:
    count: 0
    names: []
    resolution_bits: 0
  buttons: 55               # Autopilot panel (AP/FD/HDG/NAV/APR/VS/FLC/ALT), NAV/COM knob clicks, softkeys
  hats: 0
  force_feedback: false

polling:
  expected_rate_hz: 100
  max_jitter_ms: 10

quirks:
  - id: ROTARY_ENCODERS_NAV_COM
    description: >
      NAV and COM frequency inner/outer knobs are incremental rotary encoders.
      Each detent produces a button press (CW or CCW). The flip/transfer button
      swaps active/standby frequency. OpenFlight maps encoder detents as
      encoder-delta inputs.
  - id: AUTOPILOT_BUTTONS
    description: >
      Full autopilot panel (AP, FD, HDG, NAV, APR, VS, FLC, ALT, UP/DN) is
      present as discrete buttons. Requires per-sim AP integration.
  - id: PID_VARIES_BY_FIRMWARE
    description: >
      RealSimGear ships multiple G1000 PFD variants with different USB PIDs
      depending on firmware version and hardware revision. PID 0xF236 is the
      most common; verify with lsusb or Windows Device Manager on the target unit.

support:
  tier: 2
  test_coverage:
    simulated: false
    hil: false
  notes: >
    VID 0x04D8 (Microchip Technology) confirmed as RealSimGear's USB vendor.
    PID 0xF236 is approximate — verify with Device Manager on individual units.
    Designed to pair with the G1000 MFD bezel (PID 0xF235) for a full dual-panel G1000 setup.
    Primarily used with MSFS Cessna 172/182 G1000 variants and X-Plane.
    Last reviewed: 2026-02.
