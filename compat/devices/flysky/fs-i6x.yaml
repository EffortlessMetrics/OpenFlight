schema_version: "1"

device:
  name: "Flysky FS-i6X (USB HID)"
  vendor: "Flysky"
  usb:
    vendor_id: 0x1781       # Confirmed
    product_id: 0x089A      # Community estimate - verify with lsusb
  hid:
    usage_page: 0x01     # Generic Desktop
    usage: 0x4             # Joystick

capabilities:
  axes:
    count: 6
    names: [ch1, ch2, ch3, ch4, ch5, ch6]
    resolution_bits: 10
  buttons: 6
  hats: 0
  force_feedback: false

polling:
  expected_rate_hz: 50
  max_jitter_ms: 5

quirks:
  - id: PID_UNCONFIRMED
    description: >
      VID 0x1781 (community HID VID). PID 0x089A estimated for FS-i6X in USB mode. Verify with lsusb.

support:
  tier: 3
  test_coverage:
    simulated: false
    hil: false
  notes: >
    Flysky FS-i6X - 10-channel RC transmitter with USB joystick output. Budget drone controller adapted for sim.
    Wave-97 addition. Last reviewed: 2026-07.
