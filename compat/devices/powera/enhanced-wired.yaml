# PowerA Enhanced Wired Controller for Xbox
# SPDX-License-Identifier: MIT OR Apache-2.0
# SPDX-FileCopyrightText: Copyright (c) 2024 Flight Hub Team
#
# VID 0x20D6 confirmed: PowerA. PID 0xA711 confirmed from linux-hardware.org
# USB device probes (usb:20d6:a711 — "PowerA Enhanced Wired Controller for
# Xbox Series X|S"). The PowerA Enhanced Wired is a licensed Xbox controller
# with two extra mappable buttons (M1/M2) on the back; used in flight sim as
# a secondary controller for view and panel inputs.

schema_version: "1"

device:
  name: "PowerA Enhanced Wired Controller for Xbox"
  vendor: "PowerA"
  usb:
    vendor_id: 0x20D6    # PowerA (confirmed)
    product_id: 0xA711   # Enhanced Wired for Xbox — linux-hardware.org probe (confirmed)
  hid:
    usage_page: 0x01
    usage: 0x05          # Gamepad

capabilities:
  axes:
    count: 6
    names: [lx, ly, rx, ry, lt, rt]
    resolution_bits: 8
  buttons: 16              # Standard Xbox layout + 2 mappable back buttons (M1/M2)
  hats: 1
  force_feedback: false    # No rumble motors in this model

polling:
  expected_rate_hz: 125
  max_jitter_ms: 4

quirks:
  - id: XBOX_COMPATIBLE
    description: >
      Licensed Xbox controller; enumerates as XInput-compatible on Windows.
      OpenFlight accesses it via HID path for cross-platform consistency.
  - id: BACK_BUTTONS
    description: >
      Two programmable back buttons (M1/M2) on the underside of the controller.
      Button mapping is set via the PowerA companion app. They expose as
      buttons 15 and 16 in the HID report.
  - id: NO_RUMBLE
    description: >
      The Enhanced Wired model does not include vibration motors. Any FFB
      requests from the profile will be silently ignored.

support:
  tier: 3
  test_coverage:
    simulated: false
    hil: false
  notes: >
    PowerA Enhanced Wired Controller for Xbox. VID/PID confirmed from
    linux-hardware.org. Licensed Xbox gamepad with back buttons; no rumble.
    Used for secondary inputs in flight sim. Last reviewed: 2026-06.
