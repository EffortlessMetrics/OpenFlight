#
# PFC multi-engine throttle quadrant with throttle, mixture, and propeller axes.
# VID and PID are unconfirmed; see pfc-yoke-system.yaml for vendor notes.

schema_version: "1"

device:
  name: "PFC Throttle Quadrant"
  vendor: "Professional Flight Controls"
  usb:
    vendor_id: 0x04D8   # Placeholder — VID_UNCONFIRMED
    product_id: 0x0102  # Placeholder — PID_UNCONFIRMED
  hid:
    usage_page: 0x01
    usage: 0x04

capabilities:
  axes:
    count: 6
    names: [throttle1, throttle2, mixture1, mixture2, prop1, prop2]
    resolution_bits: 10
  buttons: 6
  hats: 0
  force_feedback: false

polling:
  expected_rate_hz: 60
  max_jitter_ms: 10

quirks:
  - id: VID_MICROCHIP_BRIDGE
    description: "VID 0x04D8 (Microchip Technology) is plausible â PFC devices typically use Microchip USB MCU bridges."
  - id: PID_UNCONFIRMED
    description: "PID 0x0102 is a placeholder; must be verified against real hardware."
  - id: THROTTLE_NOT_CENTERED
    description: "All throttle/mixture/prop axes report [0, max]; map to [0.0, 1.0]."

support:
  tier: 3
  test_coverage:
    simulated: false
    hil: false
  notes: "PFC multi-engine throttle quadrant (twin throttle, mixture, prop). VID/PID unconfirmed. Last reviewed: 2026-02."
