#
# VID 0x1551, PID 0x0013 — community estimates. PFC's primary VID is 0x04D8.
# The PFC Weather Radar Panel provides tilt/range knobs and mode switches
# for weather radar simulation in professional training environments.

schema_version: "1"

device:
  name: "PFC Weather Radar Panel"
  vendor: "Precision Flight Controls"
  usb:
    vendor_id: 0x1551       # VID_UNCONFIRMED — PFC alt; primary VID is 0x04D8
    product_id: 0x0013      # Community estimate
  hid:
    usage_page: 0x01        # Generic Desktop
    usage: 0x00             # Undefined (panel device)

capabilities:
  axes:
    count: 2
    names: [tilt, range]
    resolution_bits: 8
  buttons: 8
  hats: 0
  force_feedback: false

polling:
  expected_rate_hz: 10
  max_jitter_ms: 50

quirks:
  - id: VID_UNCONFIRMED
    description: >
      VID 0x1551 and PID 0x0013 are community estimates for this PFC panel.
      PFC's confirmed VID is 0x04D8 (Microchip Technology).

support:
  tier: 3
  test_coverage:
    simulated: false
    hil: false
  notes: >
    PFC Weather Radar Panel — tilt/range/mode controls for radar simulation.
    VID/PID unconfirmed. Last reviewed: 2026-06.
