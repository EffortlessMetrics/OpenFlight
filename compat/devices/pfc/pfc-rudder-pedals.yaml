#
# PFC rudder pedal set — Cessna-style differential toe-brake pedals.
# VID and PID are unconfirmed; see pfc-yoke-system.yaml for vendor notes.

schema_version: "1"

device:
  name: "PFC Professional Rudder Pedals"
  vendor: "Professional Flight Controls"
  usb:
    vendor_id: 0x04D8   # Placeholder — VID_UNCONFIRMED
    product_id: 0x0101  # Placeholder — PID_UNCONFIRMED
  hid:
    usage_page: 0x01
    usage: 0x04

capabilities:
  axes:
    count: 3
    names: [rudder, left_brake, right_brake]
    resolution_bits: 10
  buttons: 0
  hats: 0
  force_feedback: false

polling:
  expected_rate_hz: 60
  max_jitter_ms: 10

quirks:
  - id: VID_MICROCHIP_BRIDGE
    description: "VID 0x04D8 (Microchip Technology) is plausible â PFC devices typically use Microchip USB MCU bridges."
  - id: PID_UNCONFIRMED
    description: "PID 0x0101 is a placeholder; must be verified against real hardware."
  - id: DIFFERENTIAL_TOE_BRAKES
    description: >
      Left and right toe brakes are separate axes. OpenFlight exposes them
      individually and can derive a combined braking virtual axis.

support:
  tier: 3
  test_coverage:
    simulated: false
    hil: false
  notes: "PFC rudder pedals — Cessna-style with differential toe brakes. VID/PID unconfirmed. Last reviewed: 2026-02."
