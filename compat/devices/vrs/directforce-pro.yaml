# VRS DirectForce Pro Direct Drive Wheel Base
# SPDX-License-Identifier: MIT OR Apache-2.0
# SPDX-FileCopyrightText: Copyright (c) 2024 Flight Hub Team
#
# VID 0x0483 (STMicroelectronics) — used by VRS (Virtual Racing School) for
# the DirectForce Pro USB firmware.
# PID 0xA3A4 is a community estimate from SimRacing/VRS community reports.
# The DirectForce Pro is a 20Nm direct-drive servo base using the Simucube
# IONI Pro HC servo drive and STM32 USB interface. It is similar in design
# to the OSW/SimSteering platform. Confirm PID with lsusb capture.
schema_version: "1"

device:
  name: "VRS DirectForce Pro"
  vendor: "VRS (Virtual Racing School)"
  usb:
    vendor_id: 0x0483       # STMicroelectronics — VRS DirectForce Pro USB firmware
    product_id: 0xA3A4      # Community estimate — confirm from lsusb capture
  hid:
    usage_page: 0x01        # Generic Desktop
    usage: 0x04             # Joystick

capabilities:
  axes:
    count: 1
    names: [x]
    resolution_bits: 24
  buttons: 0
  hats: 0
  force_feedback: true
  ffb:
    effects: [torque]
    max_update_rate_hz: 1000
    torque_limit_nm: 20.0   # DirectForce Pro peak torque (community-reported)

polling:
  expected_rate_hz: 1000
  max_jitter_ms: 1

quirks:
  - id: PID_UNCONFIRMED
    description: >
      PID 0xA3A4 is a community estimate for the VRS DirectForce Pro.
      VID 0x0483 (STM) is shared with other STM32-based peripherals.
      Confirm with lsusb or VRS software USB capture before deployment.
  - id: TORQUE_ONLY
    description: >
      The DirectForce Pro uses IONI servo drive with raw torque-command
      USB protocol (Simucube-compatible). Standard DirectInput effects
      are not natively exposed; host translates to torque commands.
  - id: GRIP_ADAPTER_REQUIRED
    description: >
      The DirectForce Pro base exposes only the rotation axis. A flight
      grip adapter is required and enumerates as a separate USB HID device.
  - id: GRANITY_REQUIRED
    description: >
      Granite Devices Granity software is required for initial IONI drive
      configuration. Ongoing FFB operation does not require Granity.

support:
  tier: 3
  test_coverage:
    simulated: false
    hil: false
  notes: >
    VRS DirectForce Pro — 20Nm DD base using IONI servo drive. VID 0x0483
    (STM) confirmed class; PID 0xA3A4 community estimate. Wave-49 addition.
    Last reviewed: 2026-07.

tested_games:
  - game: "DCS World"
    integration: direct_input
    notes: "Used with flight grip adapter for force-feedback cyclic input."
  - game: "MSFS 2020"
    integration: direct_input
    notes: "Single rotation axis with grip adapter for buttons."
