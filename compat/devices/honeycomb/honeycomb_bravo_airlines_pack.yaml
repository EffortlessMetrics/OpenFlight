# Honeycomb Bravo Airlines Pack (Virtual Bundle)
# SPDX-License-Identifier: MIT OR Apache-2.0
# SPDX-FileCopyrightText: Copyright (c) 2024 Flight Hub Team
#
# The Honeycomb Bravo Airlines Pack is a virtual bundle combining the Bravo
# Throttle Quadrant (PID 0x1901) with airline-specific livery overlays and
# label sets. It is not a separate USB device; it shares the Bravo USB
# descriptor. This manifest exists for software bundle tracking purposes.

schema_version: "1"

device:
  name: "Honeycomb Bravo Airlines Pack"
  vendor: "Honeycomb Aeronautical"
  type: virtual_bundle
  usb:
    vendor_id: 0x294B     # Honeycomb Aeronautical (confirmed)
    product_id: 0         # Bundle — shares Bravo PID 0x1901; no separate PID
  hid:
    usage_page: ~
    usage: ~

capabilities:
  axes:
    count: 7
    names: [throttle1, throttle2, throttle3, throttle4, throttle5, flap_lever, spoiler]
    resolution_bits: 12
  buttons: 64
  hats: 0
  force_feedback: false

polling:
  expected_rate_hz: 125
  max_jitter_ms: 4

quirks:
  - id: VIRTUAL_BUNDLE_NO_SEPARATE_PID
    description: >
      The Airlines Pack is a cosmetic/label bundle for the Bravo Throttle
      Quadrant. No separate USB PID is assigned. OpenFlight treats this as
      an alias to bravo-throttle.yaml for device matching purposes.
  - id: AIRLINE_LIVERY_LABELS
    description: >
      Bundle includes airline-specific overlay labels (e.g., A320-family,
      B737-family) that relabel physical throttle positions. Axis ranges
      and button assignments are identical to the standard Bravo.

support:
  tier: 2
  test_coverage:
    simulated: true
    hil: false
  notes: >
    Virtual bundle — no distinct USB device. Functionally identical to
    bravo-throttle.yaml (VID 0x294B / PID 0x1901). Bundle tracked for
    installer and profile-matching purposes. Last reviewed: 2026-06.
