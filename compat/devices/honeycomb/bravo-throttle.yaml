schema_version: "1"

device:
  name: "Honeycomb Bravo Throttle Quadrant"
  vendor: "Honeycomb Aeronautical"
  usb:
    vendor_id: 0x294B
    product_id: 0x1902
  hid:
    usage_page: 0x01        # Generic Desktop
    usage: 0x04             # Joystick

capabilities:
  axes:
    count: 7
    names: [throttle1, throttle2, throttle3, throttle4, throttle5, flap_lever, spoiler]
    resolution_bits: 12
  buttons: 64               # Includes AP panel, lights, landing gear lever
  hats: 0
  force_feedback: false

polling:
  expected_rate_hz: 125
  max_jitter_ms: 4

quirks:
  - id: GEAR_LEVER_AS_BUTTON
    description: >
      Landing gear lever is reported as a button pair (up/down), not an axis.
      OpenFlight maps gear-up and gear-down events via the rules engine.
  - id: AUTOPILOT_BUTTONS
    description: >
      Autopilot panel switches (HDG, NAV, APR, REV, ALT, VS, IAS, AP, YD) are
      discrete buttons. Binding requires explicit per-sim mapping.
  - id: LEVER_COUNT_VARIES
    description: >
      Lever positions are reported on axes 1–5; unused levers read as 0.
      Users with fewer throttle levers should ignore inactive axes.

support:
  tier: 2
  test_coverage:
    simulated: true
    hil: false
  notes: >
    Commonly paired with the Honeycomb Alpha yoke (VID 0x294B / PID 0x1901).
    Bravo-only axis configuration supported; no dedicated crate yet.
    Last validated: 2026-02.
