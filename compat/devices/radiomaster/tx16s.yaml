# Wave-97 addition.
schema_version: "1"

device:
  name: "Radiomaster TX16S (USB HID)"
  vendor: "Radiomaster"
  usb:
    vendor_id: 0x0483       # Confirmed
    product_id: 0x5740      # Community estimate — verify with lsusb
  hid:
    usage_page: 0x01     # Generic Desktop
    usage: 0x4             # Joystick

capabilities:
  axes:
    count: 8
    names: [ch1, ch2, ch3, ch4, ch5, ch6, ch7, ch8]
    resolution_bits: 12
  buttons: 8
  hats: 0
  force_feedback: false

polling:
  expected_rate_hz: 50
  max_jitter_ms: 5

quirks:
  - id: PID_UNCONFIRMED
    description: >
      VID 0x0483 (STMicroelectronics — used by EdgeTX firmware). PID 0x5740 estimated for TX16S. Verify with lsusb.

support:
  tier: 3
  test_coverage:
    simulated: false
    hil: false
  notes: >
    Radiomaster TX16S — multi-protocol RC transmitter with EdgeTX in USB joystick mode. Hall-effect gimbals, 8 mapped axes.
    Wave-97 addition. Last reviewed: 2026-07.
