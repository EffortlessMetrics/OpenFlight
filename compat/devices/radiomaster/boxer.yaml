schema_version: "1"

device:
  name: "Radiomaster Boxer (USB HID)"
  vendor: "Radiomaster"
  usb:
    vendor_id: 0x0483       # Confirmed
    product_id: 0x5746      # Community estimate — verify with lsusb
  hid:
    usage_page: 0x01     # Generic Desktop
    usage: 0x4             # Joystick

capabilities:
  axes:
    count: 6
    names: [ch1, ch2, ch3, ch4, ch5, ch6]
    resolution_bits: 12
  buttons: 8
  hats: 0
  force_feedback: false

polling:
  expected_rate_hz: 50
  max_jitter_ms: 5

quirks:
  - id: PID_UNCONFIRMED
    description: >
      VID 0x0483 (STMicroelectronics — used by EdgeTX). PID 0x5746 estimated for Boxer. Verify with lsusb.

support:
  tier: 3
  test_coverage:
    simulated: false
    hil: false
  notes: >
    Radiomaster Boxer — mid-size RC transmitter with EdgeTX. Full-size gimbals and USB joystick output.
    Wave-97 addition. Last reviewed: 2026-07.
