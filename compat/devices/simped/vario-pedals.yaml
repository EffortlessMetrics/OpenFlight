    description: >
      VID 0xF5A0 / PID 0x0002 are community estimates. Simped may use
      a custom or Leonardo-based USB VID. Verify with lsusb.

support:
  tier: 3
  test_coverage:
    simulated: false
    hil: false
  notes: >
    High-end adjustable-spacing rudder pedals. VID/PID estimated.
    Last reviewed: 2026-06.
