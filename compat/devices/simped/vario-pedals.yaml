    vendor_id: 0xF5A0
    product_id: 0x0002
  hid:
    usage_page: 0x01
    usage: 0x4           # Joystick

capabilities:
  axes:
    count: 3
    names: [rudder, left_brake, right_brake]
    resolution_bits: 12
  buttons: 0
  hats: 0
  force_feedback: false

polling:
  expected_rate_hz: 125
  max_jitter_ms: 2

quirks:
