# MOZA HF8 Force Feedback Flight Yoke
# SPDX-License-Identifier: MIT OR Apache-2.0
# SPDX-FileCopyrightText: Copyright (c) 2024 Flight Hub Team
#
# The MOZA HF8 is a dedicated force-feedback flight yoke designed for MSFS.
# It provides dual-axis (pitch/roll) force feedback via a brushless motor
# system, with a column-style mount and 180° rotation range.
# VID 0x346E confirmed: MOZA Racing Inc.
# PID 0x0005 is a community estimate — confirm with lsusb.
schema_version: "1"

device:
  name: "MOZA HF8 Force Feedback Flight Yoke"
  vendor: "MOZA Racing"
  usb:
    vendor_id: 0x346E
    product_id: 0x0005   # Community estimate — confirm with lsusb
  hid:
    usage_page: 0x01
    usage: 0x04

capabilities:
  axes:
    count: 3
    names: [x, y, z]
    resolution_bits: 16
  buttons: 14
  hats: 1
  force_feedback: true
  ffb:
    effects: [spring, damper, constant, periodic, friction]
    max_update_rate_hz: 1000
    torque_limit_nm: 8

polling:
  expected_rate_hz: 500
  max_jitter_ms: 2

quirks:
  - id: PID_UNCONFIRMED
    description: >
      PID 0x0005 is a community estimate for the HF8. MOZA uses VID 0x346E
      across their product line. Confirm with lsusb on real hardware.
  - id: DUAL_AXIS_FFB
    description: >
      FFB is applied on both pitch (Y) and roll (X) axes simultaneously via
      dual motor actuation. The Z axis (throttle) has no FFB.
  - id: PITOT_PHYSICS_MODE
    description: >
      The MOZA Pitot companion software provides aerodynamic physics-based
      FFB effects for MSFS. OpenFlight can also drive raw DirectInput FFB
      effects independently of Pitot.

support:
  tier: 2
  test_coverage:
    simulated: true
    hil: false
  notes: >
    MOZA HF8 Force Feedback Flight Yoke — aviation-specific FFB yoke for MSFS.
    VID 0x346E = MOZA Racing. PID 0x0005 unconfirmed.
    Last reviewed: 2026-06.
