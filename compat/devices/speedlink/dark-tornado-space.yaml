schema_version: "1"

device:
  name: "Speedlink Dark Tornado Space Edition"
  vendor: "Speedlink"
  usb:
    vendor_id: 0x0E8F       # Confirmed
    product_id: 0x0029      # Community estimate - verify with lsusb
  hid:
    usage_page: 0x01     # Generic Desktop
    usage: 0x4             # Joystick

capabilities:
  axes:
    count: 4
    names: [x, y, z, rz]
    resolution_bits: 8
  buttons: 12
  hats: 1
  force_feedback: false

polling:
  expected_rate_hz: 125
  max_jitter_ms: 3

quirks:
  - id: PID_UNCONFIRMED
    description: >
      VID 0x0E8F (GreenAsia OEM). PID 0x0029 estimated for Dark Tornado Space Edition. Verify with lsusb.

support:
  tier: 3
  test_coverage:
    simulated: false
    hil: false
  notes: >
    Speedlink Dark Tornado Space Edition - budget joystick with enhanced centering spring for space sims.
    Wave-96 addition. Last reviewed: 2026-07.
