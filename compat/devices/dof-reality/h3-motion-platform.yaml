# DOF Reality H3 Motion Platform
# SPDX-License-Identifier: MIT OR Apache-2.0
# SPDX-FileCopyrightText: Copyright (c) 2024 Flight Hub Team
#
# DOF Reality H3 is a 3-degrees-of-freedom motion platform (pitch, roll, heave)
# for flight and driving simulation. VID 0x1209 is the pid.codes open VID;
# PID 0x3002 is a community estimate — confirm with lsusb on hardware.
schema_version: "1"

device:
  name: "DOF Reality H3 Motion Platform"
  vendor: "DOF Reality"
  type: platform
  usb:
    vendor_id: 0x1209   # pid.codes open VID (community estimate)
    product_id: 0x3002  # Community estimate — H3; confirm with lsusb
  hid:
    usage_page: 0x01
    usage: 0x00         # Undefined — motion output device

capabilities:
  axes:
    count: 3
    names: [pitch, roll, heave]
    resolution_bits: 16
  buttons: 0
  hats: 0
  force_feedback: false

polling:
  expected_rate_hz: 60
  max_jitter_ms: 10

quirks:
  - id: PID_UNCONFIRMED
    description: >
      VID 0x1209 and PID 0x3002 are community estimates. Verify with lsusb.
      Motion output is typically driven via SimTools or Motion Compensation.
  - id: MOTION_OUTPUT_ONLY
    description: >
      The H3 receives motion commands from the PC and does not generate HID
      input events.

support:
  tier: 3
  test_coverage:
    simulated: false
    hil: false
  notes: >
    DOF Reality H3 3-DOF motion platform (pitch, roll, heave). VID 0x1209 /
    PID 0x3002 community estimate. Motion output device driven by SimTools.
    Last reviewed: 2026-07.
