# Simrace.pl Button Box
# SPDX-License-Identifier: MIT OR Apache-2.0
# SPDX-FileCopyrightText: Copyright (c) 2024 Flight Hub Team
#
# Simrace.pl Button Box — Polish DIY/boutique button panel used in home cockpit
# and sim-racing builds. Popular in the Polish flight sim community for overhead
# and FCU panel replication. VID 0x1209 (pid.codes open VID).
# PID 0x2130 is a community estimate. Wave-60 addition.
schema_version: "1"

device:
  name: "Simrace.pl Button Box"
  vendor: "Simrace.pl"
  type: panel
  usb:
    vendor_id: 0x1209       # pid.codes open VID
    product_id: 0x2130      # Community estimate — confirm with lsusb
  hid:
    usage_page: 0x01        # Generic Desktop
    usage: 0x00             # Undefined (panel device)

capabilities:
  axes:
    count: 0
    names: []
    resolution_bits: 0
  buttons: 32
  hats: 2
  force_feedback: false

polling:
  expected_rate_hz: 20
  max_jitter_ms: 25

quirks:
  - id: PID_UNCONFIRMED
    description: >
      VID 0x1209 / PID 0x2130 are community estimates for the Simrace.pl Button
      Box. Confirm with lsusb on real hardware.

support:
  tier: 3
  test_coverage:
    simulated: false
    hil: false
  notes: >
    Simrace.pl Button Box — Polish home cockpit panel. VID 0x1209 / PID 0x2130
    community estimate. Wave-60 addition. Last reviewed: 2026-07.

tested_games:
  - msfs
  - xplane
  - dcs
