# VIRPIL VPC ACE-1 Fighter Bundle (virtual bundle)
# SPDX-License-Identifier: MIT OR Apache-2.0
# SPDX-FileCopyrightText: Copyright (c) 2024 Flight Hub Team
#
# Virtual bundle combining the VPC ACE-1 grip (vpc-ace-1.yaml) with the VPC
# WarBRD-D base (vpc-warbrd-d.yaml) as the recommended ACE-1 fighter stick
# setup. No single USB product_id -- both devices enumerate separately.
schema_version: "1"

device:
  name: "VIRPIL VPC ACE-1 Fighter Bundle"
  vendor: "VIRPIL Controls"
  usb:
    vendor_id: 0x3344
    product_id: ~          # Virtual bundle -- no single PID
  hid:
    usage_page: 0x01
    usage: 0x04

capabilities:
  axes:
    count: 0
    names: []
    resolution_bits: 16
  buttons: 0
  hats: 0
  force_feedback: false

polling:
  expected_rate_hz: 125
  max_jitter_ms: 2

quirks:
  - id: VIRTUAL_BUNDLE
    description: >
      This manifest represents the common pairing of the VPC ACE-1 grip
      (vpc-ace-1.yaml) with the VPC WarBRD-D base (vpc-warbrd-d.yaml).
      Both devices enumerate separately. Configure each via its individual
      manifest; use this entry only for profile-level bundle documentation.
  - id: TWO_USB_DEVICES
    description: >
      The bundle occupies two USB HID entries. Axis count and button count
      are the sum of the individual components. See component manifests for
      accurate capability details.

support:
  tier: 2
  test_coverage:
    simulated: true
    hil: false
  notes: >
    VIRPIL VPC ACE-1 Fighter Bundle -- virtual bundle documentation entry.
    Component manifests: vpc-ace-1.yaml + vpc-warbrd-d.yaml.
    Last reviewed: 2026-06.
