# VIRPIL VPC T-50CM2 Stick Base
# SPDX-License-Identifier: MIT OR Apache-2.0
# SPDX-FileCopyrightText: Copyright (c) 2024 Flight Hub Team
#
# VID 0x3344 confirmed (VIRPIL Controls, UAB). The VPC T-50CM2 is the
# second-generation T-50 base, the predecessor to the T-50CM3 (t50cm3-base.yaml).
# PID is a community estimate; the T-50CM3 uses 0x0194 area (similar to CM3
# throttle). Confirm with VIRPILs VPC Configurator → USB Info tab.
schema_version: "1"

device:
  name: "VIRPIL VPC T-50CM2 Stick Base"
  vendor: "VIRPIL Controls"
  usb:
    vendor_id: 0x3344       # VIRPIL Controls UAB (confirmed)
    product_id: 0x0104      # Community estimate — T-50CM2 base; confirm with VPC Configurator
  hid:
    usage_page: 0x01        # Generic Desktop
    usage: 0x04             # Joystick

capabilities:
  axes:
    count: 6
    names: [x, y, z, rx, ry, rz]
    resolution_bits: 14
  buttons: 40
  hats: 2
  force_feedback: false

polling:
  expected_rate_hz: 250
  max_jitter_ms: 1

quirks:
  - id: PID_UNCONFIRMED
    description: >
      PID 0x0104 is a community estimate for the T-50CM2 base. The T-50CM3
      (t50cm3-base.yaml) uses a PID in the adjacent range. VIRPIL assigns
      base PIDs independently of grip/throttle combinations. Verify with
      VPC Configurator → USB Info.
  - id: VIRPIL_250HZ_POLLING
    description: >
      VIRPIL devices poll at 250 Hz matching the OpenFlight RT spine.
  - id: HALL_EFFECT_SENSORS
    description: >
      T-50CM2 uses Hall-effect sensors on all axes providing 14-bit resolution
      and zero mechanical wear. Lower resolution than T-50CM3 (which may offer
      higher bit depth in the updated firmware).
  - id: UPGRADE_PATH
    description: >
      The T-50CM2 base is grip-agnostic (VPC modular system). Compatible with
      VPC WarBRD, VPC Constellation, and VPC MongoosT grips.

support:
  tier: 2
  test_coverage:
    simulated: false
    hil: false
  notes: >
    VIRPIL VPC T-50CM2 Stick Base — predecessor to T-50CM3. VID 0x3344
    confirmed; PID 0x0104 is a community estimate. 250 Hz, 14-bit Hall-effect.
    Confirm PID via VPC Configurator. Last reviewed: 2026-06.
