# VID 0x3344 (VIRPIL Controls), PID 0x01C7 — community estimate.
# VIRPIL VPC Constellation DELTA joystick grip — larger format with more controls.
schema_version: "1"
device:
  name: "VIRPIL VPC Constellation DELTA"
  vendor: "VIRPIL Controls"
  usb:
    vendor_id: 0x3344       # VIRPIL Controls (confirmed)
    product_id: 0x01C7      # Community estimate — Constellation DELTA; confirm with VPC Configurator
  hid:
    usage_page: 0x01
    usage: 0x04             # Joystick
capabilities:
  axes:
    count: 6
    names: [x, y, z, rx, ry, rz]
    resolution_bits: 14
  buttons: 36
  hats: 4
  force_feedback: false
polling:
  expected_rate_hz: 250
  max_jitter_ms: 2
quirks:
  - id: PID_UNCONFIRMED
    description: >
      PID 0x01C7 is a community estimate for the VPC Constellation DELTA.
      VIRPIL grip+base combos may enumerate different PIDs. Confirm with
      VPC Configurator or lsusb on real hardware.
support:
  tier: 2
  test_coverage:
    simulated: false
    hil: false
  notes: >
    VIRPIL VPC Constellation DELTA — VID 0x3344 / PID 0x01C7 (est).
    Extended Constellation grip with additional axes and buttons vs ALPHA.
    Wave-59 addition. Last reviewed: 2026-07.
