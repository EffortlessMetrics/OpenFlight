# VIRPIL VPC Throttle CM2
# SPDX-License-Identifier: MIT OR Apache-2.0
# SPDX-FileCopyrightText: Copyright (c) 2024 Flight Hub Team
#
# VID 0x3344 confirmed (VIRPIL Controls, UAB — confirmed from USB ID DB).
# PID 0x0184 is a community estimate for the CM2 throttle based on the
# VIRPIL sequential PID allocation (CM3 = 0x0194). The CM2 predates the
# CM3 and has fewer axes and buttons. Confirm PID with VIRPILs VPC
# Configurator software or lsusb on real hardware.
schema_version: "1"

device:
  name: "VIRPIL VPC Throttle CM2"
  vendor: "VIRPIL Controls"
  usb:
    vendor_id: 0x3344       # VIRPIL Controls UAB (confirmed)
    product_id: 0x0184      # Community estimate — CM2; CM3 = 0x0194
  hid:
    usage_page: 0x01        # Generic Desktop
    usage: 0x04             # Joystick

capabilities:
  axes:
    count: 4
    names: [left_throttle, right_throttle, flaps, slider]
    resolution_bits: 14
  buttons: 64
  hats: 0
  force_feedback: false

polling:
  expected_rate_hz: 250
  max_jitter_ms: 1

quirks:
  - id: PID_UNCONFIRMED
    description: >
      PID 0x0184 is a community estimate for the CM2 throttle. VIRPIL uses
      sequential PIDs for their product line; CM3 (cm3-throttle.yaml) uses
      0x0194. CM2 is the predecessor with fewer axis channels and buttons.
      Confirm with VIRPILs VPC Configurator → USB Info tab.
  - id: VIRPIL_250HZ_POLLING
    description: >
      VIRPIL devices poll at 250 Hz (4 ms interval), matching the OpenFlight
      RT spine tick rate. This allows direct axis sampling without interpolation.
  - id: HALL_EFFECT_SENSORS
    description: >
      CM2 throttle axes use Hall-effect magnetic position sensors providing
      14-bit resolution with no mechanical wear. Long-term calibration drift
      is minimal compared to potentiometer-based devices.

support:
  tier: 2
  test_coverage:
    simulated: false
    hil: false
  notes: >
    VIRPIL VPC Throttle CM2 (predecessor to CM3). VID 0x3344 confirmed;
    PID 0x0184 is a community estimate. 250 Hz polling, 14-bit Hall-effect
    axes. Confirm PID via VPC Configurator. Last reviewed: 2026-06.
