# VIRPIL VPC Control Panel #2
# SPDX-License-Identifier: MIT OR Apache-2.0
# SPDX-FileCopyrightText: Copyright (c) 2024 Flight Hub Team
#
# VID 0x3344 confirmed (VIRPIL Controls UAB).
# PID 0x0259 confirmed via community USB descriptor captures; referenced in
# vpc-control-panel-3.yaml (PID comment cross-reference).
# The VPC Control Panel #2 is an expanded button/encoder/switch panel with
# additional toggle switches and an analog axis (rotary potentiometer), plus
# LED indicators for switch state.

schema_version: "1"

device:
  name: "VIRPIL VPC Control Panel #2"
  vendor: "VIRPIL Controls"
  usb:
    vendor_id: 0x3344       # VIRPIL Controls UAB
    product_id: 0x0259      # Confirmed via community USB descriptor cross-reference
  hid:
    usage_page: 0x01        # Generic Desktop
    usage: 0x04             # Joystick

capabilities:
  axes:
    count: 1
    names: [rotary]
    resolution_bits: 8
  buttons: 20               # Toggle switches + push buttons + encoder pushes
  hats: 0
  encoders: 4
  force_feedback: false

polling:
  expected_rate_hz: 125
  max_jitter_ms: 3

quirks:
  - id: ENCODER_AS_BUTTONS
    description: >
      Rotary encoders report increment/decrement as button pairs.
  - id: LED_SYNC_REQUIRED
    description: >
      LED indicators for switch state are driven by HID output reports.
      OpenFlight writes LED state from profile switch bindings.

support:
  tier: 2
  test_coverage:
    simulated: false
    hil: false
  notes: >
    VIRPIL VPC Control Panel #2. PID 0x0259 confirmed via community cross-reference
    (see vpc-control-panel-3.yaml). Expanded panel with analog rotary and LED
    indicators. Last reviewed: 2026-06.
