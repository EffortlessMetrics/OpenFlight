# PID 0x0138 — Alpha Prime left grip in standalone HOSAS configuration.
# Right variant uses PID 0x4139 (see constellation-alpha-prime-right.yaml).
schema_version: "1"

device:
  name: "VPC Constellation Alpha Prime Left"
  vendor: "VIRPIL Controls"
  usb:
    vendor_id: 0x3344
    product_id: 0x0138
  hid:
    usage_page: 0x01
    usage: 0x04

capabilities:
  axes:
    count: 5
    names: [x, y, z, sz, sl]
    resolution_bits: 14
  buttons: 28
  force_feedback: false

support:
  tier: 2
  notes: "Same report format as Constellation Alpha. Prime variant with improved grip."
  test_coverage:
    simulated: true
    hil: false
