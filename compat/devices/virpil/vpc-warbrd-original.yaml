# VIRPIL VPC WarBRD Joystick Base (original, pre-D revision)
# SPDX-License-Identifier: MIT OR Apache-2.0
# SPDX-FileCopyrightText: Copyright (c) 2024 Flight Hub Team
#
# VID 0x3344 confirmed: the-sz.com USB ID DB (VIRPIL Controls UAB)
#
# PID 0x40CC — original WarBRD (pre-D revision).
# Source: fredemmott/cpp-remapper devicedb.h,
#   "RIGHT VPC Stick WarBRD", HardwareID HID\VID_3344&PID_40CC&Col01
# Cross-reference: warbrd-base.yaml notes both 0x40CC (original) and
#   0x43F5 (WarBRD-D) with identical HID report format.
#
# The WarBRD-D (PID 0x43F5) is the revised version; see warbrd-base.yaml.
# Both the original WarBRD and WarBRD-D use the same 15-byte HID report
# format as the MongoosT-50CM3 stick (PID 0x4130).

schema_version: "1"

device:
  name: "VIRPIL VPC WarBRD Joystick Base"
  vendor: "VIRPIL Controls"
  usb:
    vendor_id: 0x3344
    product_id: 0x40CC     # Original WarBRD; WarBRD-D uses 0x43F5
  hid:
    usage_page: 0x01
    usage: 0x04

capabilities:
  axes:
    count: 5
    names: [x, y, z, sz, sl]
    resolution_bits: 14
  buttons: 28
  hats: 1
  force_feedback: false

polling:
  expected_rate_hz: 250
  max_jitter_ms: 1

hid_report:
  format: "report_id(1) + axes_u16le(10) + buttons_lsb(4)"
  total_bytes: 15
  axis_max_raw: 16384

quirks:
  - id: HAT_IN_BUTTON_BYTE
    description: >
      Hat switch is encoded in the high nibble (bits 4–7) of button byte 4.
      Values 0–7 = N/NE/E/SE/S/SW/W/NW; all other values = center.
      Identical encoding to MongoosT-50CM3 (PID 0x4130) and WarBRD-D (0x43F5).
  - id: SHARED_REPORT_FORMAT_WARBRD_D
    description: >
      The original WarBRD (0x40CC) shares its HID report format with the
      WarBRD-D (0x43F5) and MongoosT-50CM3 (0x4130). The same parser
      (parse_mongoost_stick_report) handles all three PIDs.

support:
  tier: 2
  test_coverage:
    simulated: true
    hil: false
  notes: >
    PID 0x40CC confirmed from fredemmott/cpp-remapper (community hardware
    listing, "RIGHT VPC Stick WarBRD"). Also cross-referenced in warbrd-base.yaml.
    The revised WarBRD-D (PID 0x43F5) is documented in warbrd-base.yaml.
    Both variants use the same 15-byte report format; parser is shared.
    VIRPIL VID=0x3344. Last reviewed: 2026-02.
