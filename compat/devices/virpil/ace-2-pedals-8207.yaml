# VIRPIL VPC ACE-2 Torque Rudder Pedals (Alt PID 0x8207)
# SPDX-License-Identifier: MIT OR Apache-2.0
# SPDX-FileCopyrightText: Copyright (c) 2024 Flight Hub Team
#
# VID 0x3344 confirmed: VIRPIL Controls UAB (the-sz.com USB ID DB).
# PID 0x8207 is a community estimate for an alternate ACE-2 hardware revision.
# Known ACE-2 PIDs: 0x0201 (ace-2-pedals.yaml), 0x8105 (vpc-ace-2.yaml).
# PID 0x8207 may correspond to a later production batch of the ACE-2 Torque
# rudder pedals with revised firmware.
schema_version: "1"

device:
  name: "VIRPIL VPC ACE-2 Torque Rudder Pedals"
  vendor: "VIRPIL Controls"
  usb:
    vendor_id: 0x3344
    product_id: 0x8207      # Community estimate — ACE-2 alt PID; confirm with lsusb
  hid:
    usage_page: 0x01        # Generic Desktop
    usage: 0x04             # Joystick

capabilities:
  axes:
    count: 3
    names: [rudder, left_brake, right_brake]
    resolution_bits: 15
  buttons: 0
  hats: 0
  force_feedback: false

polling:
  expected_rate_hz: 125
  max_jitter_ms: 2

quirks:
  - id: PID_UNCONFIRMED
    description: >
      PID 0x8207 is a community estimate for an alternate ACE-2 revision.
      Confirmed ACE-2 PIDs: 0x0201 (ace-2-pedals.yaml), 0x8105 (vpc-ace-2.yaml).
      Confirm 0x8207 with lsusb or VIRPIL Configurator before relying on this
      manifest.
  - id: RUDDER_CENTRED
    description: >
      Rudder axis is bipolar (centred). Toe brake axes are unipolar.
      Apply separate deadzone/curve profiles for each axis.
  - id: CONFIGURABLE_VIA_VIRPIL_CONFIGURATOR
    description: >
      Axis assignments and sensitivity can be adjusted in the VIRPIL
      Configurator software. Changes persist in device firmware.

support:
  tier: 2
  test_coverage:
    simulated: false
    hil: false
  notes: >
    VIRPIL VPC ACE-2 Torque Rudder Pedals — alternate PID variant (0x8207).
    See ace-2-pedals.yaml (0x0201) and vpc-ace-2.yaml (0x8105) for other
    revisions. VIRPIL VID=0x3344. Last reviewed: 2026-06.
