schema_version: "1"

device:
  name: "GameSir T3 Wireless Gamepad"
  vendor: "GameSir"
  usb:
    vendor_id: 0x1949
    product_id: 0x0402
  hid:
    usage_page: 0x01
    usage: 0x5           # Game Pad

capabilities:
  axes:
    count: 6
    names: [left_x, left_y, right_x, right_y, left_trigger, right_trigger]
    resolution_bits: 8
  buttons: 14
  hats: 1
  force_feedback: false

polling:
  expected_rate_hz: 125
  max_jitter_ms: 2

quirks:
  - id: PID_UNCONFIRMED
    description: >
      VID 0x1949 / PID 0x0402 are community estimates. Verify with lsusb.

support:
  tier: 3
  test_coverage:
    simulated: false
    hil: false
  notes: >
    Budget wireless gamepad with vibration.
    Last reviewed: 2026-06.
