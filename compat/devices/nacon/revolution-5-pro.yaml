# Nacon Revolution 5 Pro PS5/PC Controller
# SPDX-License-Identifier: MIT OR Apache-2.0
# SPDX-FileCopyrightText: Copyright (c) 2024 Flight Hub Team
#
# VID 0x146B (Nacon). PID 0x0602 is a community estimate for the Nacon
# Revolution 5 Pro PS5/PC controller. High-end gaming controller with
# adjustable stick tension and weighted grips. Additional features require
# the Nacon Revolution 5 Pro companion app.
schema_version: "1"

device:
  name: "Nacon Revolution 5 Pro"
  vendor: "Nacon"
  usb:
    vendor_id: 0x146B    # Nacon (confirmed VID)
    product_id: 0x0602   # Community estimate -- Revolution 5 Pro
  hid:
    usage_page: 0x01     # Generic Desktop
    usage: 0x05          # Gamepad

capabilities:
  axes:
    count: 6
    names: [lx, ly, rx, ry, lt, rt]
    resolution_bits: 12
  buttons: 18
  hats: 1
  force_feedback: true
  ffb:
    effects: [rumble_left, rumble_right]
    max_update_rate_hz: 60
    torque_limit_nm: null

polling:
  expected_rate_hz: 125
  max_jitter_ms: 4

quirks:
  - id: PID_UNCONFIRMED
    description: >
      PID 0x0602 is a community estimate. Confirm with lsusb on Revolution 5
      Pro hardware before enabling production device matching.
  - id: NACON_REVOLUTION_FEATURES
    description: >
      Additional features including adjustable stick travel, swappable
      thumbstick caps, and hardware profiles require the Nacon Revolution 5 Pro
      companion app. All standard HID axes and buttons work without the app.

support:
  tier: 3
  test_coverage:
    simulated: false
    hil: false
  notes: >
    Nacon Revolution 5 Pro. PID 0x0602 community estimate. High-end PS5/PC
    gamepad with adjustable stick tension. Core HID works without companion app.
    Last reviewed: 2026-06.
