# GoFlight GF-46 MCP/NAV Avionics Panel
# SPDX-License-Identifier: MIT OR Apache-2.0
# SPDX-FileCopyrightText: Copyright (c) 2024 Flight Hub Team
#
# VID 0x0E9F (GoFlight Inc.), PID 0x0004 (estimated from USB device registry).
# Combined MCP-style autopilot and NAV panel with dual-concentric encoder knobs.
schema_version: "1"

device:
  name: "GoFlight GF-46 MCP/NAV Panel"
  vendor: "GoFlight"
  usb:
    vendor_id: 0x0E9F       # GoFlight Inc.
    product_id: 0x0004      # Estimated — GF-46
  hid:
    usage_page: 0x01        # Generic Desktop
    usage: 0x00             # Undefined (panel device)

capabilities:
  axes:
    count: 0
    names: []
    resolution_bits: 0
  buttons: 24
  hats: 0
  force_feedback: false

polling:
  expected_rate_hz: 10
  max_jitter_ms: 50

quirks:
  - id: DUAL_CONCENTRIC_ENCODERS
    description: >
      Several knobs use dual-concentric (inner/outer) rotary encoders.
      Each ring generates independent relative-delta events, effectively
      doubling the logical button count relative to physical knob count.
  - id: NAV_DISPLAY_OUTPUT
    description: >
      Panel includes display segments for NAV frequency and autopilot
      target values. Display updates require USB HID output reports.
  - id: GOFLIGHT_HID_PROTOCOL
    description: >
      Uses GoFlight's proprietary HID panel protocol shared across the
      GF avionics panel family.

support:
  tier: 3
  test_coverage:
    simulated: false
    hil: false
  notes: >
    PID 0x0004 is an estimate based on GoFlight USB device registry ordering.
    Combines autopilot mode selection with NAV radio management functions.
    Suitable for GA and airliner home cockpit builds targeting MSFS and X-Plane.
    Last reviewed: 2026-02.
