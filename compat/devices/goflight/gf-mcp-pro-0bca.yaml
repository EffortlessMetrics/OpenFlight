# GoFlight GF-MCP Pro (VID 0x0BCA, PID 0x0030)
# SPDX-License-Identifier: MIT OR Apache-2.0
# SPDX-FileCopyrightText: Copyright (c) 2024 Flight Hub Team
#
# VID 0x0BCA is used by OpenCockpits/Engravity hardware; the primary GoFlight
# VID is 0x0E9F. PID 0x0030 with VID 0x0BCA is a community estimate — may
# represent a GoFlight unit manufactured with Engravity/OpenCockpits electronics.
# The primary GF-MCP Pro manifest uses VID 0x0E9F, PID 0x0004 (gf-mcp-pro.yaml).
schema_version: "1"

device:
  name: "GoFlight GF-MCP Pro"
  vendor: "GoFlight"
  usb:
    vendor_id: 0x0BCA       # Community estimate — primary GoFlight VID is 0x0E9F
    product_id: 0x0030      # Community estimate — PID estimated from community sources
  hid:
    usage_page: 0x01        # Generic Desktop
    usage: 0x06             # Keyboard

capabilities:
  axes:
    count: 0
  buttons: 40
  hats: 0
  encoders: 8
  force_feedback: false

polling:
  expected_rate_hz: 125
  max_jitter_ms: 5

quirks:
  - id: PID_UNCONFIRMED
    description: >
      VID 0x0BCA and PID 0x0030 are community estimates. The primary GoFlight
      VID is 0x0E9F; the GF-MCP Pro with that VID uses PID 0x0004 (gf-mcp-pro.yaml).
      VID 0x0BCA is shared with OpenCockpits/Engravity hardware. Verify with
      lsusb on real hardware.
  - id: PANEL_DEVICE
    description: >
      MCP (Mode Control Panel) replica with pushbutton switches and rotary
      encoders for altitude, speed, heading and vertical speed. Encoders report
      as paired button events per detent.

support:
  tier: 3
  test_coverage:
    simulated: false
    hil: false
  notes: >
    GoFlight GF-MCP Pro — VID 0x0BCA, PID 0x0030 community estimate. Primary
    manifest: gf-mcp-pro.yaml (VID 0x0E9F, PID 0x0004). Wave-47 addition.
    Last reviewed: 2026-07.
