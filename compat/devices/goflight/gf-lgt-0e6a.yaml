# GoFlight GF-LGT Landing Gear Toggle Panel (VID 0x0E6A variant)
# SPDX-License-Identifier: MIT OR Apache-2.0
# SPDX-FileCopyrightText: Copyright (c) 2024 Flight Hub Team
#
# VID 0x0E6A (GoFlight Inc. — community-reported alternate VID), PID 0x0222 (est).
# The GF-LGT is a landing gear lever and annunciator panel. This entry covers
# the 0x0E6A VID enumeration; the primary VID 0x0E9F variant is in gf-lgt.yaml.
schema_version: "1"

device:
  name: "GoFlight GF-LGT Landing Gear Toggle"
  vendor: "GoFlight"
  type: panel
  usb:
    vendor_id: 0x0E6A       # GoFlight Inc. — community-reported alternate VID
    product_id: 0x0222      # Community estimate — PID estimated from community sources
  hid:
    usage_page: 0x01        # Generic Desktop
    usage: 0x00             # Undefined (panel device)

capabilities:
  axes:
    count: 0
    names: []
    resolution_bits: 0
  buttons: 12
  hats: 0
  force_feedback: false

polling:
  expected_rate_hz: 20
  max_jitter_ms: 30

quirks:
  - id: PID_UNCONFIRMED
    description: >
      VID 0x0E6A / PID 0x0222 are community estimates. Confirm with lsusb or
      Windows Device Manager on real hardware. See gf-lgt.yaml for the primary
      0x0E9F VID variant.
  - id: GEAR_LEVER_THREE_POSITION
    description: >
      The gear lever has three detented positions (UP / NEUTRAL / DOWN).
      Each position transition fires a discrete button event.
  - id: GEAR_ANNUNCIATOR_LEDS
    description: >
      Gear position LEDs are driven by USB HID output reports. The host must
      synchronise LED state with sim gear position flags.

support:
  tier: 3
  test_coverage:
    simulated: false
    hil: false
  notes: >
    GoFlight GF-LGT Landing Gear Toggle — VID 0x0E6A / PID 0x0222 (est). Alternate
    VID variant; primary 0x0E9F variant is in gf-lgt.yaml. PID estimated from
    community sources. Wave-62 addition. Last reviewed: 2026-07.

tested_games:
  - msfs
  - xplane
