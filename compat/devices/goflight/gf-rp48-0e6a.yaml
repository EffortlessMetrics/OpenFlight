# GoFlight GF-RP48 Radio Panel (VID 0x0E6A variant)
# SPDX-License-Identifier: MIT OR Apache-2.0
# SPDX-FileCopyrightText: Copyright (c) 2024 Flight Hub Team
#
# VID 0x0E6A (GoFlight Inc. — community-reported alternate VID), PID 0x0220 (est).
# The GF-RP48 is a 48-position rotary selector panel for navigation/avionics
# frequency and mode selection. This entry covers the 0x0E6A VID enumeration
# reported in some community USB probes; the primary VID 0x0E9F variant is
# covered in gf-rp48.yaml.
schema_version: "1"

device:
  name: "GoFlight GF-RP48 Radio Panel"
  vendor: "GoFlight"
  type: panel
  usb:
    vendor_id: 0x0E6A       # GoFlight Inc. — community-reported alternate VID
    product_id: 0x0220      # Community estimate — PID estimated from community sources
  hid:
    usage_page: 0x01        # Generic Desktop
    usage: 0x00             # Undefined (panel device)

capabilities:
  axes:
    count: 0
    names: []
    resolution_bits: 0
  buttons: 48
  hats: 0
  force_feedback: false

polling:
  expected_rate_hz: 10
  max_jitter_ms: 50

quirks:
  - id: PID_UNCONFIRMED
    description: >
      VID 0x0E6A / PID 0x0220 are community estimates. Confirm with lsusb or
      Windows Device Manager on real hardware. See gf-rp48.yaml for the primary
      0x0E9F VID variant.
  - id: ROTARY_POSITION_BUTTONS
    description: >
      Each of the 48 rotary positions is reported as a button event. Only one
      position button is active at a time (single-select).
  - id: GOFLIGHT_HID_PROTOCOL
    description: >
      Uses the GoFlight proprietary HID panel protocol. Display updates require
      USB output reports via the GoFlight SDK or FSUIPC GoFlight plugin.

support:
  tier: 3
  test_coverage:
    simulated: false
    hil: false
  notes: >
    GoFlight GF-RP48 Radio Panel — VID 0x0E6A / PID 0x0220 (est). Alternate VID
    variant; primary 0x0E9F variant is in gf-rp48.yaml. PID estimated from
    community sources. Wave-62 addition. Last reviewed: 2026-07.

tested_games:
  - msfs
  - xplane
