# GoFlight GF-EFIS Panel (VID 0x0738 variant)
# SPDX-License-Identifier: MIT OR Apache-2.0
# SPDX-FileCopyrightText: Copyright (c) 2024 Flight Hub Team
#
# GoFlight GF-EFIS — Electronic Flight Instrument System control panel for
# cockpit replica builds. This manifest covers the VID 0x0738 / PID 0x7119
# variant (community estimate). The primary manifest (gf-efis.yaml) uses
# VID 0x0E9F (confirmed GoFlight VID).

schema_version: "1"

device:
  name: "GoFlight GF-EFIS Panel"
  vendor: "GoFlight"
  usb:
    vendor_id: 0x0738       # PID estimated — confirmed GoFlight VID is 0x0E9F
    product_id: 0x7119      # Community estimate — GF-EFIS (0x0738 batch)
  hid:
    usage_page: 0x01
    usage: 0x00

capabilities:
  axes:
    count: 0
    names: []
    resolution_bits: 0
  buttons: 24
  hats: 0
  encoders: 2
  force_feedback: false

polling:
  expected_rate_hz: 10
  max_jitter_ms: 50

quirks:
  - id: VID_PID_UNCONFIRMED
    description: >
      VID 0x0738 / PID 0x7119 are community estimates. Confirmed GoFlight VID
      is 0x0E9F (see gf-efis.yaml). VID 0x0738 is unverified for GoFlight
      hardware. Confirm with lsusb on real hardware.
  - id: BARO_ENCODER
    description: >
      Barometric pressure selector encoder maps to QNH/QFE baro setting.
      Encoder push-button toggles STD (standard pressure) mode.

support:
  tier: 3
  test_coverage:
    simulated: false
    hil: false
  notes: >
    GoFlight GF-EFIS panel — VID 0x0738 / PID 0x7119 est (alternate batch).
    Primary manifest: gf-efis.yaml (VID 0x0E9F). Last reviewed: 2026-06.
