#
# GoFlight GF-RPM — engine management panel with mixture, prop, and carb-heat
# controls for GA single or twin engine aircraft simulation.
# VID 0x0E9F confirmed. PID 0x000F is a community estimate.

schema_version: "1"

device:
  name: "GoFlight GF-RPM Engine Panel"
  vendor: "GoFlight"
  usb:
    vendor_id: 0x0E9F
    product_id: 0x000F   # Community estimate — GF-RPM
  hid:
    usage_page: 0x01
    usage: 0x00

capabilities:
  axes:
    count: 3
    names: [mixture, prop_pitch, carb_heat]
    resolution_bits: 8
  buttons: 6
  hats: 0
  force_feedback: false

polling:
  expected_rate_hz: 10
  max_jitter_ms: 50

quirks:
  - id: PID_UNCONFIRMED
    description: "PID 0x000F is a community estimate for the GF-RPM. Update when confirmed."
  - id: THROTTLE_NOT_CENTERED
    description: "All lever axes report [0, max]; map to [0.0, 1.0] in profile."

support:
  tier: 3
  test_coverage:
    simulated: false
    hil: false
  notes: "GoFlight GF-RPM engine panel. PID unconfirmed. VID 0x0E9F confirmed. Last reviewed: 2026-02."
