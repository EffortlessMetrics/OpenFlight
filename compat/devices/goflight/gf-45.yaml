# GoFlight GF-45 — compact 45-position multi-function avionics panel with
# rotary knob and button array for general-purpose cockpit expansion.
# Smaller form factor than the GF-166 (gf-166.yaml).
# VID 0x0E9F confirmed. PID 0x0011 is a community estimate.

schema_version: "1"

device:
  name: "GoFlight GF-45 Multi-Function Panel"
  vendor: "GoFlight"
  usb:
    vendor_id: 0x0E9F
    product_id: 0x0011   # Community estimate — GF-45
  hid:
    usage_page: 0x01
    usage: 0x00

capabilities:
  axes:
    count: 1
    names: [knob]
    resolution_bits: 8
  buttons: 45
  hats: 0
  force_feedback: false

polling:
  expected_rate_hz: 10
  max_jitter_ms: 50

quirks:
  - id: PID_UNCONFIRMED
    description: "PID 0x0011 is a community estimate for the GF-45. Update when confirmed."

support:
  tier: 3
  test_coverage:
    simulated: false
    hil: false
  notes: "GoFlight GF-45 compact multi-function panel. PID unconfirmed. VID 0x0E9F confirmed. Last reviewed: 2026-02."
