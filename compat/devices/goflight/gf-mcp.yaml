# GoFlight GF-MCP Autopilot Mode Control Panel
# SPDX-License-Identifier: MIT OR Apache-2.0
# SPDX-FileCopyrightText: Copyright (c) 2024 Flight Hub Team
#
# VID 0x0E9F (GoFlight Inc.), PID 0x0003 (estimated from USB device registry).
# Boeing 737-style Mode Control Panel replicating autopilot SPD/HDG/ALT/VS/CRS selectors.
schema_version: "1"

device:
  name: "GoFlight GF-MCP Autopilot Mode Control Panel"
  vendor: "GoFlight"
  usb:
    vendor_id: 0x0E9F       # GoFlight Inc.
    product_id: 0x0003      # Estimated — GF-MCP
  hid:
    usage_page: 0x01        # Generic Desktop
    usage: 0x00             # Undefined (panel device)

capabilities:
  axes:
    count: 0
    names: []
    resolution_bits: 0
  buttons: 32
  hats: 0
  force_feedback: false

polling:
  expected_rate_hz: 10
  max_jitter_ms: 50

quirks:
  - id: ROTARY_ENCODERS_MCP
    description: >
      SPD, HDG, ALT, VS, and CRS selectors are rotary encoders sending
      relative-delta button events. The host must accumulate deltas and
      convert to absolute target values before forwarding to the sim.
  - id: SEVEN_SEG_DISPLAY_MCP
    description: >
      Panel has 7-segment displays for SPD, HDG, ALT, and VS readouts.
      Display updates require USB HID output reports driven by sim telemetry.
      Without active output writes the displays show static or blank values.
  - id: AP_ANNUNCIATOR_LEDS
    description: >
      Autopilot mode annunciators (FD, AT, APP, LOC, VS, ALT, LNAV, VNAV)
      are driven by HID output reports. LED state must be synchronised with
      sim autopilot mode flags by the host application.
  - id: GOFLIGHT_HID_PROTOCOL
    description: >
      Uses GoFlight's proprietary HID panel protocol. Compatible with the
      FSUIPC GoFlight plugin and community open-source drivers.

support:
  tier: 3
  test_coverage:
    simulated: false
    hil: false
  notes: >
    PID 0x0003 is an estimate based on GoFlight USB device registry ordering.
    Popular for Boeing 737 home cockpit builds targeting MSFS and X-Plane.
    Bidirectional HID (input + display output) required for full functionality.
    Last reviewed: 2026-02.
