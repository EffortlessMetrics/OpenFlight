#
# GoFlight GF-GVT — generic pitch/roll/yaw trim input panel with trim wheel
# or rocker inputs. Used to supplement yoke/joystick setups with dedicated
# trim controls in a GA cockpit.
# VID 0x0E9F confirmed. PID 0x0010 is a community estimate.

schema_version: "1"

device:
  name: "GoFlight GF-GVT Generic Trim Panel"
  vendor: "GoFlight"
  usb:
    vendor_id: 0x0E9F
    product_id: 0x0010   # Community estimate — GF-GVT
  hid:
    usage_page: 0x01
    usage: 0x00

capabilities:
  axes:
    count: 3
    names: [pitch_trim, roll_trim, yaw_trim]
    resolution_bits: 8
  buttons: 8
  hats: 0
  force_feedback: false

polling:
  expected_rate_hz: 10
  max_jitter_ms: 50

quirks:
  - id: PID_UNCONFIRMED
    description: "PID 0x0010 is a community estimate for the GF-GVT. Update when confirmed."

support:
  tier: 3
  test_coverage:
    simulated: false
    hil: false
  notes: "GoFlight GF-GVT trim panel. PID unconfirmed. VID 0x0E9F confirmed. Last reviewed: 2026-02."
