# GoFlight GF-ENGPC Engine Power Control Module
# SPDX-License-Identifier: MIT OR Apache-2.0
# SPDX-FileCopyrightText: Copyright (c) 2024 Flight Hub Team
#
# VID 0x0E9F confirmed (GoFlight Inc.).
# PID 0x0009 is a community estimate for the GF-ENGPC.
# The GoFlight GF-ENGPC (Engine Power Control) is a 3-axis throttle/prop/mixture
# module with dedicated levers for each engine control axis. Designed for GA
# aircraft in X-Plane and MSFS.
schema_version: "1"

device:
  name: "GoFlight GF-ENGPC Engine Power Control Module"
  vendor: "GoFlight Inc."
  usb:
    vendor_id: 0x0E9F       # GoFlight Inc.
    product_id: 0x0009      # Community estimate — confirm with lsusb on real hardware
  hid:
    usage_page: 0x01        # Generic Desktop
    usage: 0x04             # Joystick

capabilities:
  axes:
    count: 3
    names: [throttle, prop_rpm, mixture]
    resolution_bits: 10
  buttons: 4
  hats: 0
  force_feedback: false

polling:
  expected_rate_hz: 100
  max_jitter_ms: 5

quirks:
  - id: PID_UNCONFIRMED
    description: >
      PID 0x0009 is a community estimate for the GF-ENGPC. Confirm with lsusb
      on real hardware. GoFlight sequential PIDs: 0x0003 (GF-MCP), 0x0004 (GF-46).
  - id: GA_LEVER_LAYOUT
    description: >
      Three independent levers: throttle (blue), prop RPM (blue), mixture (red).
      All levers are unipolar (0 = idle/lean, max = full/rich). No detents.
  - id: SINGLE_OR_TWIN_ENGINE
    description: >
      The GF-ENGPC exposes 3 axes suitable for single-engine GA aircraft. For
      twin-engine use, a second GF-ENGPC unit is required for the second set
      of throttle/prop/mixture levers.

support:
  tier: 2
  test_coverage:
    simulated: false
    hil: false
  notes: >
    GoFlight GF-ENGPC throttle/prop/mixture module for GA aircraft. PID 0x0009
    is unconfirmed. 3-axis unipolar lever layout. Last reviewed: 2026-02.
