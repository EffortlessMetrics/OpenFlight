# GoFlight GF-ADF — ADF radio tuning panel with frequency selector and
# function mode buttons (ADF/ANT/BFO). Common in GA training cockpits.
# VID 0x0E9F confirmed. PID 0x000D is a community estimate.

schema_version: "1"

device:
  name: "GoFlight GF-ADF ADF Radio Panel"
  vendor: "GoFlight"
  usb:
    vendor_id: 0x0E9F
    product_id: 0x000D   # Community estimate — GF-ADF
  hid:
    usage_page: 0x01
    usage: 0x00

capabilities:
  axes:
    count: 2
    names: [freq_mhz, freq_khz]
    resolution_bits: 8
  buttons: 8
  hats: 0
  force_feedback: false

polling:
  expected_rate_hz: 10
  max_jitter_ms: 50

quirks:
  - id: PID_UNCONFIRMED
    description: "PID 0x000D is a community estimate for the GF-ADF. Update when confirmed."

support:
  tier: 3
  test_coverage:
    simulated: false
    hil: false
  notes: "GoFlight GF-ADF panel. PID unconfirmed. VID 0x0E9F confirmed. Last reviewed: 2026-02."
