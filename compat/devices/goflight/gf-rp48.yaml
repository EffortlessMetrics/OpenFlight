# GoFlight GF-RP48 Rotary Panel
# SPDX-License-Identifier: MIT OR Apache-2.0
# SPDX-FileCopyrightText: Copyright (c) 2024 Flight Hub Team
#
# VID 0x0E9F (GoFlight Inc.). PID is a community estimate within the
# GoFlight panel PID range. The GF-RP48 is a 48-position rotary selector
# panel for navigation/avionics frequency and mode selection.
# GoFlight products are enumerated and controlled via the GoFlight
# HID panel protocol (see gf-p8.yaml for protocol reference).
schema_version: "1"

device:
  name: "GoFlight GF-RP48 Rotary Panel"
  vendor: "GoFlight"
  usb:
    vendor_id: 0x0E9F       # GoFlight Inc. (confirmed)
    product_id: 0x0014      # Community estimate — GF-RP48 in GoFlight PID sequence
  hid:
    usage_page: 0x01        # Generic Desktop
    usage: 0x00             # Undefined (panel device)

capabilities:
  axes:
    count: 0
    names: []
    resolution_bits: 0
  buttons: 48
  hats: 0
  force_feedback: false

polling:
  expected_rate_hz: 10
  max_jitter_ms: 50

quirks:
  - id: PID_UNCONFIRMED
    description: >
      PID 0x0014 is a community estimate for the GF-RP48. GoFlight panels
      follow a sequential PID allocation. Confirm with lsusb on real hardware.
  - id: ROTARY_POSITION_BUTTONS
    description: >
      Each of the 48 rotary positions is reported as a button event.
      The 48 positions map to COM/NAV mode/frequency presets. Only one
      position button is active at a time (single-select).
  - id: GOFLIGHT_HID_PROTOCOL
    description: >
      Uses the GoFlight proprietary HID panel protocol. Display (if present)
      requires USB output reports via the GoFlight SDK or FSUIPC plugin.

support:
  tier: 3
  test_coverage:
    simulated: false
    hil: false
  notes: >
    GoFlight GF-RP48 Rotary Panel. VID 0x0E9F confirmed; PID 0x0014 is a
    community estimate. 48-position rotary for avionics control. Used with
    FSUIPC GoFlight plugin for MSFS/X-Plane. Last reviewed: 2026-06.
