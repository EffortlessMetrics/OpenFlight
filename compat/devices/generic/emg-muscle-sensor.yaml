# Wave-100 addition.
schema_version: "1"

device:
  name: "EMG Muscle Sensor Controller"
  vendor: "Generic"
  usb:
    vendor_id: 0xFF03       # Community estimate
    product_id: 0x0007      # Community estimate — verify with lsusb
  hid:
    usage_page: 0x01     # Generic Desktop
    usage: 0x4             # Joystick

capabilities:
  axes:
    count: 4
    names: [emg_bicep, emg_forearm, emg_wrist_flex, emg_wrist_ext]
    resolution_bits: 10
  buttons: 4
  hats: 0
  force_feedback: false

polling:
  expected_rate_hz: 60
  max_jitter_ms: 8

quirks:
  - id: PID_UNCONFIRMED
    description: >
      VID 0xFF03 / PID 0x0007 are placeholders for EMG muscle sensor controllers.

support:
  tier: 3
  test_coverage:
    simulated: false
    hil: false
  notes: >
    EMG muscle sensor controller — electromyography input mapping muscle activation to sim axes for force-proportional control.
    Wave-100 addition. Last reviewed: 2026-07.
