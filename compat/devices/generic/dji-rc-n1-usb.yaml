# Wave-97 addition.
schema_version: "1"

device:
  name: "DJI RC-N1 Controller (USB Mode)"
  vendor: "DJI"
  usb:
    vendor_id: 0x2CA3       # Confirmed
    product_id: 0x001A      # Community estimate — verify with lsusb
  hid:
    usage_page: 0x01     # Generic Desktop
    usage: 0x4             # Joystick

capabilities:
  axes:
    count: 4
    names: [x, y, z, rz]
    resolution_bits: 10
  buttons: 8
  hats: 0
  force_feedback: false

polling:
  expected_rate_hz: 50
  max_jitter_ms: 5

quirks:
  - id: PID_UNCONFIRMED
    description: >
      VID 0x2CA3 confirmed (DJI). PID 0x001A estimated for RC-N1 in USB joystick mode. Verify with lsusb.

support:
  tier: 3
  test_coverage:
    simulated: false
    hil: false
  notes: >
    DJI RC-N1 controller in USB joystick mode. Gimbaled sticks with Hall sensors, 4 axes for drone sim use.
    Wave-97 addition. Last reviewed: 2026-07.
