schema_version: "1"

device:
  name: "DIY 6-Axis Throttle Quadrant"
  vendor: "Generic"
  usb:
    vendor_id: 0x1209       # pid.codes open VID
    product_id: 0x4F02      # Community estimate — DIY 6-axis throttle
  hid:
    usage_page: 0x01        # Generic Desktop
    usage: 0x04             # Joystick

capabilities:
  axes:
    count: 6
    names: [throttle1, throttle2, prop1, prop2, mixture1, mixture2]
    resolution_bits: 10
  buttons: 16
  hats: 0
  force_feedback: false

polling:
  expected_rate_hz: 125
  max_jitter_ms: 4

quirks:
  - id: PID_UNCONFIRMED
    description: >
      PID is a community estimate. Generic DIY 6-axis throttle using pid.codes VID. Verify with lsusb.

support:
  tier: 3
  test_coverage:
    simulated: false
    hil: false
  notes: >
    Generic DIY 6-axis throttle quadrant. PID 0x4F02 community estimate. Wave-71. Last reviewed: 2026-07.

tested_games:
  - msfs
  - xplane
  - dcs
