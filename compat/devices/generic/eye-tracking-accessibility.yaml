# Wave-98 addition.
schema_version: "1"

device:
  name: "Eye Tracking Accessibility Controller"
  vendor: "Generic"
  usb:
    vendor_id: 0xFF01       # Community estimate
    product_id: 0x0006      # Community estimate - verify with lsusb
  hid:
    usage_page: 0x01     # Generic Desktop
    usage: 0x8             # Multi-axis Controller

capabilities:
  axes:
    count: 2
    names: [gaze_x, gaze_y]
    resolution_bits: 12
  buttons: 2
  hats: 0
  force_feedback: false

polling:
  expected_rate_hz: 60
  max_jitter_ms: 5

quirks:
  - id: PID_UNCONFIRMED
    description: >
      VID 0xFF01 / PID 0x0006 are placeholders for generic eye tracking accessibility devices.

support:
  tier: 2
  test_coverage:
    simulated: false
    hil: false
  notes: >
    Generic eye tracking accessibility controller - maps gaze position to virtual axes for hands-free flight control.
    Wave-98 addition. Last reviewed: 2026-07.
