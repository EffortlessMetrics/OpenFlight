# Wave-97 addition.
schema_version: "1"

device:
  name: "Eachine TX16S Clone (USB HID)"
  vendor: "Eachine"
  usb:
    vendor_id: 0x0483       # Confirmed
    product_id: 0x5749      # Community estimate - verify with lsusb
  hid:
    usage_page: 0x01     # Generic Desktop
    usage: 0x4             # Joystick

capabilities:
  axes:
    count: 8
    names: [ch1, ch2, ch3, ch4, ch5, ch6, ch7, ch8]
    resolution_bits: 10
  buttons: 8
  hats: 0
  force_feedback: false

polling:
  expected_rate_hz: 50
  max_jitter_ms: 5

quirks:
  - id: PID_UNCONFIRMED
    description: >
      VID 0x0483 (STMicroelectronics - EdgeTX firmware). PID 0x5749 estimated for Eachine clone. Verify with lsusb.

support:
  tier: 3
  test_coverage:
    simulated: false
    hil: false
  notes: >
    Eachine TX16S-compatible RC transmitter clone with EdgeTX USB joystick mode.
    Wave-97 addition. Last reviewed: 2026-07.
