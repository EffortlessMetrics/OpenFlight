# Wave-98 addition.
schema_version: "1"

device:
  name: "Head Mouse Nano"
  vendor: "Origin Instruments"
  usb:
    vendor_id: 0xFF01       # Community estimate
    product_id: 0x0004      # Community estimate - verify with lsusb
  hid:
    usage_page: 0x01     # Generic Desktop
    usage: 0x2             # Mouse

capabilities:
  axes:
    count: 2
    names: [x, y]
    resolution_bits: 10
  buttons: 2
  hats: 0
  force_feedback: false

polling:
  expected_rate_hz: 60
  max_jitter_ms: 5

quirks:
  - id: PID_UNCONFIRMED
    description: >
      VID 0xFF01 / PID 0x0004 are placeholders for Head Mouse Nano. Verify actual USB HID descriptor.

support:
  tier: 2
  test_coverage:
    simulated: false
    hil: false
  notes: >
    Head Mouse Nano - IR-based head tracking mouse for accessibility. Maps head position to view or flight axes.
    Wave-98 addition. Last reviewed: 2026-07.
