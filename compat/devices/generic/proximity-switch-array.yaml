schema_version: "1"

device:
  name: "Proximity Switch Array Controller"
  vendor: "Generic"
  usb:
    vendor_id: 0xFF01       # Community estimate
    product_id: 0x000D      # Community estimate — verify with lsusb
  hid:
    usage_page: 0x01     # Generic Desktop
    usage: 0x5             # Game Pad

capabilities:
  axes:
    count: 0
    names: []
    resolution_bits: 0
  buttons: 8
  hats: 0
  force_feedback: false

polling:
  expected_rate_hz: 50
  max_jitter_ms: 8

quirks:
  - id: PID_UNCONFIRMED
    description: >
      VID 0xFF01 / PID 0x000D are placeholders for proximity switch arrays.

support:
  tier: 2
  test_coverage:
    simulated: false
    hil: false
  notes: >
    Proximity switch array — IR proximity sensors as contactless buttons for users with limited motor control.
    Wave-98 addition. Last reviewed: 2026-07.
