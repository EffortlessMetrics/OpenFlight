# Wave-98 addition.
schema_version: "1"

device:
  name: "Switch-Adapted Gamepad Interface"
  vendor: "Generic"
  usb:
    vendor_id: 0xFF01       # Community estimate
    product_id: 0x000A      # Community estimate — verify with lsusb
  hid:
    usage_page: 0x01     # Generic Desktop
    usage: 0x5             # Game Pad

capabilities:
  axes:
    count: 2
    names: [x, y]
    resolution_bits: 8
  buttons: 12
  hats: 1
  force_feedback: false

polling:
  expected_rate_hz: 125
  max_jitter_ms: 5

quirks:
  - id: PID_UNCONFIRMED
    description: >
      VID 0xFF01 / PID 0x000A are placeholders for switch-adapted gamepad interfaces.

support:
  tier: 2
  test_coverage:
    simulated: false
    hil: false
  notes: >
    Switch-adapted gamepad — standard gamepad with 3.5mm jacks for external accessibility switches.
    Wave-98 addition. Last reviewed: 2026-07.
