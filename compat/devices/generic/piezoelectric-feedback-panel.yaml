# Wave-100 addition.
schema_version: "1"

device:
  name: "Piezoelectric Feedback Panel"
  vendor: "Generic"
  usb:
    vendor_id: 0xFF03       # Community estimate
    product_id: 0x000F      # Community estimate — verify with lsusb
  hid:
    usage_page: 0x01     # Generic Desktop
    usage: 0x8             # Multi-axis Controller

capabilities:
  axes:
    count: 4
    names: [touch_x, touch_y, pressure, proximity]
    resolution_bits: 10
  buttons: 8
  hats: 0
  force_feedback: false

polling:
  expected_rate_hz: 125
  max_jitter_ms: 3

quirks:
  - id: PID_UNCONFIRMED
    description: >
      VID 0xFF03 / PID 0x000F are placeholders for piezoelectric feedback panels.

support:
  tier: 3
  test_coverage:
    simulated: false
    hil: false
  notes: >
    Piezoelectric feedback panel — touch surface with localized haptic feedback for virtual switch feel simulation.
    Wave-100 addition. Last reviewed: 2026-07.
