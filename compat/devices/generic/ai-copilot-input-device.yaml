schema_version: "1"

device:
  name: "AI Copilot Input Device"
  vendor: "Generic"
  usb:
    vendor_id: 0xFF03       # Community estimate
    product_id: 0x0014      # Community estimate — verify with lsusb
  hid:
    usage_page: 0x01     # Generic Desktop
    usage: 0x8             # Multi-axis Controller

capabilities:
  axes:
    count: 4
    names: [confidence, intent_x, intent_y, override]
    resolution_bits: 10
  buttons: 8
  hats: 0
  force_feedback: false

polling:
  expected_rate_hz: 60
  max_jitter_ms: 5

quirks:
  - id: PID_UNCONFIRMED
    description: >
      VID 0xFF03 / PID 0x0014 are placeholders for AI copilot input devices.

support:
  tier: 3
  test_coverage:
    simulated: false
    hil: false
  notes: >
    AI copilot input device — experimental HID device bridging AI flight assistant commands to sim input axes.
    Wave-100 addition. Last reviewed: 2026-07.
