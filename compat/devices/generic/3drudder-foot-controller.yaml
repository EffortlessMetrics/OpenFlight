# Wave-98 addition.
schema_version: "1"

device:
  name: "3dRudder Foot Controller"
  vendor: "3dRudder"
  usb:
    vendor_id: 0x29C4       # Confirmed
    product_id: 0x0001      # Community estimate - verify with lsusb
  hid:
    usage_page: 0x01     # Generic Desktop
    usage: 0x8             # Multi-axis Controller

capabilities:
  axes:
    count: 4
    names: [x, y, z, rz]
    resolution_bits: 12
  buttons: 4
  hats: 0
  force_feedback: false

polling:
  expected_rate_hz: 60
  max_jitter_ms: 5

quirks:
  - id: PID_UNCONFIRMED
    description: >
      VID 0x29C4 estimated (3dRudder). PID 0x0001 estimated for standard model. Verify with lsusb.

support:
  tier: 2
  test_coverage:
    simulated: false
    hil: false
  notes: >
    3dRudder foot controller - tilt-based 4-axis foot input for hands-free navigation and rudder/throttle control.
    Wave-98 addition. Last reviewed: 2026-07.
