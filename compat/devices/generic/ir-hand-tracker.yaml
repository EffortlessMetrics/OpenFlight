#
# Wave-100 addition.
schema_version: "1"

device:
  name: "IR Hand Tracking Controller"
  vendor: "Generic"
  usb:
    vendor_id: 0xFF03       # Community estimate
    product_id: 0x000D      # Community estimate - verify with lsusb
  hid:
    usage_page: 0x01     # Generic Desktop
    usage: 0x4             # Joystick

capabilities:
  axes:
    count: 6
    names: [hand_x, hand_y, hand_z, hand_rx, hand_ry, hand_rz]
    resolution_bits: 12
  buttons: 10
  hats: 0
  force_feedback: false

polling:
  expected_rate_hz: 60
  max_jitter_ms: 5

quirks:
  - id: PID_UNCONFIRMED
    description: >
      VID 0xFF03 / PID 0x000D are placeholders for IR hand tracking controllers.

support:
  tier: 3
  test_coverage:
    simulated: false
    hil: false
  notes: >
    IR hand tracking controller - infrared camera-based hand position tracking for touchless cockpit interaction.
    Wave-100 addition. Last reviewed: 2026-07.
