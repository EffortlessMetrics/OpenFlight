schema_version: "1"

device:
  name: "Gameport-to-USB Adapter (2-Axis)"
  vendor: "Generic"
  usb:
    vendor_id: 0x0810       # Confirmed
    product_id: 0x0001      # Community estimate — verify with lsusb
  hid:
    usage_page: 0x01     # Generic Desktop
    usage: 0x4             # Joystick

capabilities:
  axes:
    count: 2
    names: [x, y]
    resolution_bits: 8
  buttons: 4
  hats: 0
  force_feedback: false

polling:
  expected_rate_hz: 125
  max_jitter_ms: 5

quirks:
  - id: PID_UNCONFIRMED
    description: >
      VID 0x0810 estimated (common gameport adapter OEM). PID 0x0001 estimated. Verify with lsusb.

support:
  tier: 3
  test_coverage:
    simulated: false
    hil: false
  notes: >
    Generic gameport-to-USB adapter for 2-axis legacy joysticks. Converts analog gameport signals to USB HID.
    Wave-99 addition. Last reviewed: 2026-07.
