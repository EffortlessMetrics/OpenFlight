# Wave-100 addition.
schema_version: "1"

device:
  name: "Pressure-Sensitive Touchpad Controller"
  vendor: "Generic"
  usb:
    vendor_id: 0xFF03       # Community estimate
    product_id: 0x0003      # Community estimate - verify with lsusb
  hid:
    usage_page: 0x01     # Generic Desktop
    usage: 0x8             # Multi-axis Controller

capabilities:
  axes:
    count: 3
    names: [x, y, pressure]
    resolution_bits: 12
  buttons: 4
  hats: 0
  force_feedback: false

polling:
  expected_rate_hz: 125
  max_jitter_ms: 3

quirks:
  - id: PID_UNCONFIRMED
    description: >
      VID 0xFF03 / PID 0x0003 are placeholders for pressure-sensitive touchpad controllers.

support:
  tier: 3
  test_coverage:
    simulated: false
    hil: false
  notes: >
    Pressure-sensitive touchpad controller - multi-touch surface with pressure axis for proportional flight control.
    Wave-100 addition. Last reviewed: 2026-07.
