# Wave-100 addition.
schema_version: "1"

device:
  name: "Haptic Feedback Gloves (HID)"
  vendor: "Generic"
  usb:
    vendor_id: 0xFF03       # Community estimate
    product_id: 0x0001      # Community estimate - verify with lsusb
  hid:
    usage_page: 0x01     # Generic Desktop
    usage: 0x4             # Joystick

capabilities:
  axes:
    count: 10
    names: [thumb, index, middle, ring, pinky, wrist_yaw, wrist_pitch, wrist_roll, grip_force, spread]
    resolution_bits: 10
  buttons: 10
  hats: 0
  force_feedback: false

polling:
  expected_rate_hz: 60
  max_jitter_ms: 5

quirks:
  - id: PID_UNCONFIRMED
    description: >
      VID 0xFF03 / PID 0x0001 are placeholders for generic haptic feedback gloves with HID interface.

support:
  tier: 3
  test_coverage:
    simulated: false
    hil: false
  notes: >
    Generic haptic feedback gloves - finger tracking with force feedback actuators. Maps hand gestures to sim inputs.
    Wave-100 addition. Last reviewed: 2026-07.
