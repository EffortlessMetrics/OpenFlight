# Wave-100 addition.
schema_version: "1"

device:
  name: "Motion-Tracked Hand Controller"
  vendor: "Generic"
  usb:
    vendor_id: 0xFF03       # Community estimate
    product_id: 0x0002      # Community estimate — verify with lsusb
  hid:
    usage_page: 0x01     # Generic Desktop
    usage: 0x4             # Joystick

capabilities:
  axes:
    count: 6
    names: [x, y, z, rx, ry, rz]
    resolution_bits: 12
  buttons: 8
  hats: 0
  force_feedback: false

polling:
  expected_rate_hz: 60
  max_jitter_ms: 5

quirks:
  - id: PID_UNCONFIRMED
    description: >
      VID 0xFF03 / PID 0x0002 are placeholders for motion-tracked hand controllers.

support:
  tier: 3
  test_coverage:
    simulated: false
    hil: false
  notes: >
    Generic motion-tracked hand controller — 6-DOF tracked input for VR cockpit interaction and switch manipulation.
    Wave-100 addition. Last reviewed: 2026-07.
