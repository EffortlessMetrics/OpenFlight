# Raspberry Pi Pico SDK Joystick (RP2040, PID 0x000A)
# SPDX-License-Identifier: MIT OR Apache-2.0
# SPDX-FileCopyrightText: Copyright (c) 2024 Flight Hub Team
#
# VID 0x2E8A confirmed: Raspberry Pi Foundation.
# PID 0x000A is the Raspberry Pi Foundation assignment for Pico SDK HID device
# firmware (TinyUSB HID-only, not composite). Distinct from PID 0x0005 which is
# the CDC+HID composite assignment (raspberry-pi-pico-hid.yaml).
# Used for DIY flight sim controllers built with the official Pico C/C++ SDK
# targeting a pure HID (non-composite) device configuration.

schema_version: "1"

device:
  name: "Raspberry Pi Pico SDK HID Joystick (RP2040)"
  vendor: "Raspberry Pi Foundation"
  usb:
    vendor_id: 0x2E8A    # Raspberry Pi Foundation (confirmed)
    product_id: 0x000A   # Pico SDK HID-only PID (community-reported; confirm with lsusb)
  hid:
    usage_page: 0x01     # Generic Desktop
    usage: 0x04          # Joystick

capabilities:
  axes:
    count: 8
    names: [x, y, z, rx, ry, rz, slider, dial]
    resolution_bits: 12
  buttons: 32
  hats: 2
  force_feedback: false

polling:
  expected_rate_hz: 1000
  max_jitter_ms: 1

quirks:
  - id: PID_FIRMWARE_DEPENDENT
    description: >
      PID 0x000A is a community-reported Raspberry Pi Foundation assignment
      for Pico SDK HID-only builds. The actual PID depends on the TinyUSB
      configuration in the firmware. Confirm with lsusb on the specific
      firmware flashed to the Pico. See also raspberry-pi-pico-hid.yaml
      (PID 0x0005) for the CDC+HID composite variant.
  - id: FIRMWARE_DEPENDENT_CAPABILITIES
    description: >
      Axis count, button count, and HID report layout depend on the firmware
      flashed to the RP2040. The values above represent a typical Pico SDK
      HID joystick configuration. Use the OpenFlight device inspector to
      enumerate the actual HID descriptor for any specific build.
  - id: DISTINCT_FROM_COMPOSITE
    description: >
      This manifest covers HID-only (non-composite) PID 0x000A builds.
      For CDC+HID composite firmware (PID 0x0005), see raspberry-pi-pico-hid.yaml.
      For the RP2040-Zero form factor, see waveshare-rp2040-zero-hid.yaml.

support:
  tier: 3
  test_coverage:
    simulated: false
    hil: false
  notes: >
    Raspberry Pi Pico (RP2040) HID-only firmware (Pico SDK, PID 0x000A).
    VID 0x2E8A confirmed (Raspberry Pi Foundation); PID 0x000A community-reported.
    Distinct from CDC+HID composite (PID 0x0005, raspberry-pi-pico-hid.yaml).
    Widely used in DIY flight sim button boxes. Last reviewed: 2026-06.
