#
# Wave-100 addition.
schema_version: "1"

device:
  name: "Magnetorheological FFB Joystick"
  vendor: "Generic"
  usb:
    vendor_id: 0xFF03       # Community estimate
    product_id: 0x000E      # Community estimate - verify with lsusb
  hid:
    usage_page: 0x01     # Generic Desktop
    usage: 0x4             # Joystick

capabilities:
  axes:
    count: 4
    names: [x, y, z, rz]
    resolution_bits: 14
  buttons: 16
  hats: 2
  force_feedback: true

polling:
  expected_rate_hz: 250
  max_jitter_ms: 2

quirks:
  - id: PID_UNCONFIRMED
    description: >
      VID 0xFF03 / PID 0x000E are placeholders for MR fluid FFB joysticks.

support:
  tier: 3
  test_coverage:
    simulated: false
    hil: false
  notes: >
    Magnetorheological FFB joystick - uses MR fluid for variable force feedback stiffness. Experimental high-bandwidth FFB.
    Wave-100 addition. Last reviewed: 2026-07.
