  test_coverage:
    simulated: false
    hil: false
  notes: >
    FrSky Taranis X9D Plus — 16-channel RC transmitter in USB joystick mode via OpenTX firmware. 8 primary axes mapped.
    Wave-97 addition. Last reviewed: 2026-07.
