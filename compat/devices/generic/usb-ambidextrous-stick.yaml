#
# Wave-96 addition.
schema_version: "1"

device:
  name: "Generic USB Ambidextrous Joystick"
  vendor: "Generic"
  usb:
    vendor_id: 0xFF00       # Community estimate
    product_id: 0x0097      # Community estimate - verify with lsusb
  hid:
    usage_page: 0x01     # Generic Desktop
    usage: 0x4             # Joystick

capabilities:
  axes:
    count: 4
    names: [x, y, z, rz]
    resolution_bits: 10
  buttons: 16
  hats: 1
  force_feedback: false

polling:
  expected_rate_hz: 125
  max_jitter_ms: 4

quirks:
  - id: PID_UNCONFIRMED
    description: >
      VID 0xFF00 / PID 0x0097 are placeholders for generic ambidextrous joysticks. Verify actual IDs with lsusb.

support:
  tier: 3
  test_coverage:
    simulated: false
    hil: false
  notes: >
    Generic USB ambidextrous joystick suitable for left or right-hand HOSAS configurations.
    Wave-96 addition. Last reviewed: 2026-07.
