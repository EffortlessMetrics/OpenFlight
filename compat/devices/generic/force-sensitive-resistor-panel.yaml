# Wave-100 addition.
schema_version: "1"

device:
  name: "Force-Sensitive Resistor Panel"
  vendor: "Generic"
  usb:
    vendor_id: 0xFF03       # Community estimate
    product_id: 0x000B      # Community estimate — verify with lsusb
  hid:
    usage_page: 0x01     # Generic Desktop
    usage: 0x4             # Joystick

capabilities:
  axes:
    count: 6
    names: [fsr1, fsr2, fsr3, fsr4, fsr5, fsr6]
    resolution_bits: 10
  buttons: 6
  hats: 0
  force_feedback: false

polling:
  expected_rate_hz: 125
  max_jitter_ms: 3

quirks:
  - id: PID_UNCONFIRMED
    description: >
      VID 0xFF03 / PID 0x000B are placeholders for FSR panel controllers.

support:
  tier: 3
  test_coverage:
    simulated: false
    hil: false
  notes: >
    Force-sensitive resistor panel — pressure-mapped input surface for throttle quadrant and mixture lever control.
    Wave-100 addition. Last reviewed: 2026-07.
