# Wave-97 addition.
schema_version: "1"

device:
  name: "ImmersionRC Ghost TX (USB HID)"
  vendor: "ImmersionRC"
  usb:
    vendor_id: 0x0483       # Confirmed
    product_id: 0x5744      # Community estimate — verify with lsusb
  hid:
    usage_page: 0x01     # Generic Desktop
    usage: 0x4             # Joystick

capabilities:
  axes:
    count: 4
    names: [x, y, z, rz]
    resolution_bits: 10
  buttons: 8
  hats: 0
  force_feedback: false

polling:
  expected_rate_hz: 50
  max_jitter_ms: 5

quirks:
  - id: PID_UNCONFIRMED
    description: >
      VID 0x0483 (STMicroelectronics — shared by many RC radios). PID 0x5744 estimated for Ghost TX. Verify with lsusb.

support:
  tier: 3
  test_coverage:
    simulated: false
    hil: false
  notes: >
    ImmersionRC Ghost TX — RC transmitter with USB joystick mode for sim use. Primarily an FPV racing controller.
    Wave-97 addition. Last reviewed: 2026-07.
