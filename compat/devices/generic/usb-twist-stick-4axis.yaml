# SPDX-FileCopyrightText: Copyright (c) 2024 Flight Hub Team
#
# Wave-96 addition.
schema_version: "1"

device:
  name: "Generic USB 4-Axis Twist Stick"
  vendor: "Generic"
  usb:
    vendor_id: 0xFF00       # Community estimate
    product_id: 0x0098      # Community estimate — verify with lsusb
  hid:
    usage_page: 0x01     # Generic Desktop
    usage: 0x4             # Joystick

capabilities:
  axes:
    count: 4
    names: [x, y, z, rz]
    resolution_bits: 10
  buttons: 8
  hats: 1
  force_feedback: false

polling:
  expected_rate_hz: 125
  max_jitter_ms: 4

quirks:
  - id: PID_UNCONFIRMED
    description: >
      VID 0xFF00 / PID 0x0098 are placeholders for generic twist-handle joysticks. Verify actual IDs with lsusb.

support:
  tier: 3
  test_coverage:
    simulated: false
    hil: false
  notes: >
    Generic USB 4-axis twist stick with rudder twist, suitable for entry-level space sim control.
    Wave-96 addition. Last reviewed: 2026-07.
