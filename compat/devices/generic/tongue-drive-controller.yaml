# Wave-98 addition.
schema_version: "1"

device:
  name: "Tongue Drive System Controller"
  vendor: "Generic"
  usb:
    vendor_id: 0xFF01       # Community estimate
    product_id: 0x000C      # Community estimate — verify with lsusb
  hid:
    usage_page: 0x01     # Generic Desktop
    usage: 0x4             # Joystick

capabilities:
  axes:
    count: 2
    names: [x, y]
    resolution_bits: 10
  buttons: 4
  hats: 0
  force_feedback: false

polling:
  expected_rate_hz: 125
  max_jitter_ms: 5

quirks:
  - id: PID_UNCONFIRMED
    description: >
      VID 0xFF01 / PID 0x000C are placeholders for tongue drive system controllers.

support:
  tier: 2
  test_coverage:
    simulated: false
    hil: false
  notes: >
    Tongue drive system — magnet-tracked tongue controller mapped to 2 axes and buttons for flight sim input.
    Wave-98 addition. Last reviewed: 2026-07.
