# SPDX-FileCopyrightText: Copyright (c) 2024 Flight Hub Team
#
# Wave-98 addition.
schema_version: "1"

device:
  name: "Sip-and-Puff HID Controller"
  vendor: "Generic"
  usb:
    vendor_id: 0xFF01       # Community estimate
    product_id: 0x0005      # Community estimate - verify with lsusb
  hid:
    usage_page: 0x01     # Generic Desktop
    usage: 0x4             # Joystick

capabilities:
  axes:
    count: 2
    names: [pressure_sip, pressure_puff]
    resolution_bits: 8
  buttons: 4
  hats: 0
  force_feedback: false

polling:
  expected_rate_hz: 125
  max_jitter_ms: 5

quirks:
  - id: PID_UNCONFIRMED
    description: >
      VID 0xFF01 / PID 0x0005 are placeholders for generic sip-and-puff controllers. Verify actual USB HID descriptor.

support:
  tier: 2
  test_coverage:
    simulated: false
    hil: false
  notes: >
    Generic sip-and-puff controller - breath-based input device. Sip/puff mapped to axes for throttle or elevator control.
    Wave-98 addition. Last reviewed: 2026-07.
