#
# Wave-96 addition.
schema_version: "1"

device:
  name: "Generic USB 6-DOF Space Controller"
  vendor: "Generic"
  usb:
    vendor_id: 0xFF00       # Community estimate
    product_id: 0x0096      # Community estimate — verify with lsusb
  hid:
    usage_page: 0x01     # Generic Desktop
    usage: 0x8             # Multi-axis Controller

capabilities:
  axes:
    count: 6
    names: [x, y, z, rx, ry, rz]
    resolution_bits: 10
  buttons: 12
  hats: 0
  force_feedback: false

polling:
  expected_rate_hz: 125
  max_jitter_ms: 4

quirks:
  - id: PID_UNCONFIRMED
    description: >
      VID 0xFF00 / PID 0x0096 are placeholders for generic 6-DOF space sim controllers. Verify actual IDs with lsusb.

support:
  tier: 3
  test_coverage:
    simulated: false
    hil: false
  notes: >
    Generic USB 6-DOF space sim controller. Full translation + rotation axes for spacecraft control.
    Wave-96 addition. Last reviewed: 2026-07.
