# Wave-100 addition.
schema_version: "1"

device:
  name: "Capacitive Touch Panel Controller"
  vendor: "Generic"
  usb:
    vendor_id: 0xFF03       # Community estimate
    product_id: 0x0005      # Community estimate — verify with lsusb
  hid:
    usage_page: 0x01     # Generic Desktop
    usage: 0x8             # Multi-axis Controller

capabilities:
  axes:
    count: 4
    names: [x, y, proximity, pressure]
    resolution_bits: 10
  buttons: 8
  hats: 0
  force_feedback: false

polling:
  expected_rate_hz: 125
  max_jitter_ms: 3

quirks:
  - id: PID_UNCONFIRMED
    description: >
      VID 0xFF03 / PID 0x0005 are placeholders for capacitive touch panel controllers.

support:
  tier: 3
  test_coverage:
    simulated: false
    hil: false
  notes: >
    Capacitive touch panel — proximity-aware touch surface for virtual cockpit panel interaction.
    Wave-100 addition. Last reviewed: 2026-07.
