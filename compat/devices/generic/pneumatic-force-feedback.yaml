# Wave-100 addition.
schema_version: "1"

device:
  name: "Pneumatic Force Feedback Controller"
  vendor: "Generic"
  usb:
    vendor_id: 0xFF03       # Community estimate
    product_id: 0x0009      # Community estimate — verify with lsusb
  hid:
    usage_page: 0x01     # Generic Desktop
    usage: 0x4             # Joystick

capabilities:
  axes:
    count: 4
    names: [x, y, z, rz]
    resolution_bits: 10
  buttons: 8
  hats: 1
  force_feedback: true

polling:
  expected_rate_hz: 125
  max_jitter_ms: 3

quirks:
  - id: PID_UNCONFIRMED
    description: >
      VID 0xFF03 / PID 0x0009 are placeholders for pneumatic force feedback controllers.

support:
  tier: 3
  test_coverage:
    simulated: false
    hil: false
  notes: >
    Pneumatic force feedback controller — air-pressure actuated FFB for realistic control loading. Experimental HID device.
    Wave-100 addition. Last reviewed: 2026-07.
