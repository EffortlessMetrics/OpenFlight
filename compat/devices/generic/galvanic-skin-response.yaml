# Wave-100 addition.
schema_version: "1"

device:
  name: "Galvanic Skin Response HID Adapter"
  vendor: "Generic"
  usb:
    vendor_id: 0xFF03       # Community estimate
    product_id: 0x0012      # Community estimate - verify with lsusb
  hid:
    usage_page: 0x01     # Generic Desktop
    usage: 0x8             # Multi-axis Controller

capabilities:
  axes:
    count: 2
    names: [gsr_left, gsr_right]
    resolution_bits: 10
  buttons: 2
  hats: 0
  force_feedback: false

polling:
  expected_rate_hz: 30
  max_jitter_ms: 10

quirks:
  - id: PID_UNCONFIRMED
    description: >
      VID 0xFF03 / PID 0x0012 are placeholders for GSR adapters.

support:
  tier: 3
  test_coverage:
    simulated: false
    hil: false
  notes: >
    Galvanic skin response HID adapter - biometric input mapping stress/arousal levels to sim difficulty parameters.
    Wave-100 addition. Last reviewed: 2026-07.
