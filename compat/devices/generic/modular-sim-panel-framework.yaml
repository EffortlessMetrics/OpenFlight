# Wave-100 addition.
schema_version: "1"

device:
  name: "Modular Sim Panel Framework Controller"
  vendor: "Generic"
  usb:
    vendor_id: 0xFF03       # Community estimate
    product_id: 0x0013      # Community estimate — verify with lsusb
  hid:
    usage_page: 0x01     # Generic Desktop
    usage: 0x4             # Joystick

capabilities:
  axes:
    count: 16
    names: [axis0, axis1, axis2, axis3, axis4, axis5, axis6, axis7, axis8, axis9, axis10, axis11, axis12, axis13, axis14, axis15]
    resolution_bits: 12
  buttons: 64
  hats: 4
  force_feedback: false

polling:
  expected_rate_hz: 125
  max_jitter_ms: 3

quirks:
  - id: PID_UNCONFIRMED
    description: >
      VID 0xFF03 / PID 0x0013 are placeholders for modular sim panel framework controllers.

support:
  tier: 3
  test_coverage:
    simulated: false
    hil: false
  notes: >
    Modular sim panel framework — expandable USB-C daisy-chain controller system with configurable axes and buttons.
    Wave-100 addition. Last reviewed: 2026-07.
