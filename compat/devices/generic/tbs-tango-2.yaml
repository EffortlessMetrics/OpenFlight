schema_version: "1"

device:
  name: "TBS Tango 2 (USB HID)"
  vendor: "TBS"
  usb:
    vendor_id: 0x0483       # Confirmed
    product_id: 0x5741      # Community estimate - verify with lsusb
  hid:
    usage_page: 0x01     # Generic Desktop
    usage: 0x4             # Joystick

capabilities:
  axes:
    count: 4
    names: [x, y, z, rz]
    resolution_bits: 10
  buttons: 8
  hats: 0
  force_feedback: false

polling:
  expected_rate_hz: 50
  max_jitter_ms: 5

quirks:
  - id: PID_UNCONFIRMED
    description: >
      VID 0x0483 (STMicroelectronics - used by EdgeTX). PID 0x5741 estimated for TBS Tango 2. Verify with lsusb.

support:
  tier: 3
  test_coverage:
    simulated: false
    hil: false
  notes: >
    TBS Tango 2 - compact FPV RC transmitter running EdgeTX. Hall-effect gimbals, USB joystick mode for sim use.
    Wave-97 addition. Last reviewed: 2026-07.
