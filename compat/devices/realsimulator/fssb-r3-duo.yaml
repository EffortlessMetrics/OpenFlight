#
# Dual stick configuration for HOSAS (Hands On Stick And Stick) setups.

schema_version: "1"

device:
  name: "Real Simulator FSSB R3 Duo"
  vendor: "Real Simulator"
  usb:
    vendor_id: 0x04F3
    product_id: 0x0175
  hid:
    usage_page: 0x01
    usage: 0x04

capabilities:
  axes:
    count: 6
    names: [left_x, left_y, left_z, right_x, right_y, right_z]
    resolution_bits: 16
  buttons: 8
  hats: 0
  force_feedback: false

polling:
  expected_rate_hz: 500
  max_jitter_ms: 1

quirks:
  - id: DUAL_STICK
    description: "Presents two force sensing axes sets for HOSAS configurations."
  - id: PID_UNCONFIRMED
    description: "VID/PID community estimates. Verify with lsusb on hardware."

support:
  tier: 3
  test_coverage:
    simulated: false
    hil: false
  notes: >
    Real Simulator FSSB R3 Duo for HOSAS setups. Dual force sensing. VID/PID unconfirmed.
    Last reviewed: 2026-07.
