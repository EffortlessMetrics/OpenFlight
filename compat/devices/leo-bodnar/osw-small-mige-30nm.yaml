# OSW Small MIGE 30Nm Direct Drive Base
# SPDX-License-Identifier: MIT OR Apache-2.0
# SPDX-FileCopyrightText: Copyright (c) 2024 Flight Hub Team
#
# VID 0x1DD2 confirmed: Leo Bodnar Ltd. (shared across all OSW/SimSteering
# hardware that uses the Bodnar BBI/IONI controller electronics).
# PID 0x1002 is a community estimate for the OSW Small MIGE 30Nm variant.
# The OSW (Open Sim Wheel) project uses Bodnar electronics with MIGE servo
# motors. The 30Nm variant uses a larger MIGE frame than the 15Nm variant.
# Confirm PID with lsusb capture from real hardware.
schema_version: "1"

device:
  name: "OSW Small MIGE 30Nm Direct Drive Base"
  vendor: "OSW / SimSteering (Bodnar-based)"
  usb:
    vendor_id: 0x1DD2       # Leo Bodnar Ltd. — confirmed for all OSW/Bodnar hardware
    product_id: 0x1002      # Community estimate — 30Nm MIGE variant; confirm with lsusb
  hid:
    usage_page: 0x01        # Generic Desktop
    usage: 0x04             # Joystick

capabilities:
  axes:
    count: 1
    names: [x]
    resolution_bits: 24
  buttons: 0
  hats: 0
  force_feedback: true
  ffb:
    effects: [torque]
    max_update_rate_hz: 1000
    torque_limit_nm: 30.0   # Peak torque of the Small MIGE 110ST-M06030 servo

polling:
  expected_rate_hz: 1000
  max_jitter_ms: 1

quirks:
  - id: PID_UNCONFIRMED
    description: >
      PID 0x1002 is a community estimate. Confirm from lsusb or Granite Devices
      Granity / IONI software USB descriptor capture. See osw-small-mige-15nm.yaml
      (PID 0x1003) for the lower-torque 15Nm variant.
  - id: TORQUE_ONLY
    description: >
      The OSW/IONI controller accepts raw torque commands via the Bodnar
      vendor HID protocol. Standard DirectInput effect types are not
      natively supported; the host must translate to torque commands.
  - id: GRIP_ADAPTER_REQUIRED
    description: >
      The OSW base exposes only the rotation axis. A flight grip adapter is
      required to expose additional buttons and enumerates as a separate HID device.
  - id: IONI_DRIVE_REQUIRED
    description: >
      Requires Granite Devices IONI Pro or IONI Pro HC servo drive for
      motor commutation. The IONI drive enumerates via the Leo Bodnar USB
      interface board. Granity software required for initial drive configuration.

support:
  tier: 3
  test_coverage:
    simulated: false
    hil: false
  notes: >
    OSW Small MIGE 30Nm direct drive base. VID 0x1DD2 (Leo Bodnar) confirmed;
    PID 0x1002 community estimate. Uses MIGE 110ST-M06030 servo motor with
    Granite Devices IONI controller. Wave-49 addition. Last reviewed: 2026-07.

tested_games:
  - game: "DCS World"
    integration: direct_input
    notes: "Primary use case; used with flight grip adapter for combat aircraft."
  - game: "MSFS 2020"
    integration: direct_input
    notes: "Single rotation axis; grip adapter required for button inputs."
