# Leo Bodnar BBI-32 USB Button Box Interface
# SPDX-License-Identifier: MIT OR Apache-2.0
# SPDX-FileCopyrightText: Copyright (c) 2024 Flight Hub Team
#
# VID 0x1DD2 (Leo Bodnar Ltd), PID 0x000E — USB ID database / devicehunt.com
# 32-button USB HID interface board. Compact variant of the BBI-64 for smaller
# cockpit panels, switch boxes, and button boards.
schema_version: "1"

device:
  name: "Leo Bodnar BBI-32 USB Button Box Interface"
  vendor: "Leo Bodnar"
  usb:
    vendor_id: 0x1DD2       # Leo Bodnar Ltd
    product_id: 0x000E      # BBI-32 — USB ID database
  hid:
    usage_page: 0x01        # Generic Desktop
    usage: 0x05             # Game Pad

capabilities:
  axes:
    count: 0
    names: []
    resolution_bits: 0
  buttons: 32
  hats: 0
  force_feedback: false

polling:
  expected_rate_hz: 1000
  max_jitter_ms: 1

quirks:
  - id: BUTTON_ONLY_NO_AXES
    description: >
      Pure button interface with no analogue axes. All 32 inputs are discrete
      digital on/off signals.
  - id: OPEN_COLLECTOR_INPUTS
    description: >
      Inputs are active-low open-collector compatible. External switches connect
      between input pins and ground; the board provides internal pull-ups.
  - id: HIGH_POLL_RATE
    description: >
      Reports at 1000 Hz USB poll rate, giving sub-millisecond button latency.

support:
  tier: 2
  test_coverage:
    simulated: false
    hil: false
  notes: >
    VID 0x1DD2 / PID 0x000E confirmed via USB ID database (Leo Bodnar BBI-32).
    Compact 32-button sibling of the BBI-64 (PID 0x000F).
    Commonly used in GA cockpit overhead panel and pedestal builds.
    Last reviewed: 2026-02.
