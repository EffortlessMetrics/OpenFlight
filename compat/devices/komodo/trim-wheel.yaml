# Komodo Sim Trim Wheel
# SPDX-License-Identifier: MIT OR Apache-2.0
# SPDX-FileCopyrightText: Copyright (c) 2024 Flight Hub Team
#
# Komodo Sim (UK) dedicated trim wheel peripheral.
# VID 0x04D8 (Microchip Technology shared VID).
# PID 0xEF81 is a community estimate.
schema_version: "1"

device:
  name: "Komodo Sim Trim Wheel"
  vendor: "Komodo Sim"
  usb:
    vendor_id: 0x04D8       # Microchip Technology shared VID (community estimate)
    product_id: 0xEF81      # Community estimate — PID_UNCONFIRMED
  hid:
    usage_page: 0x01
    usage: 0x04

capabilities:
  axes:
    count: 1
    names: [trim]
    resolution_bits: 12
  buttons: 0
  hats: 0
  force_feedback: false

polling:
  expected_rate_hz: 60
  max_jitter_ms: 8

quirks:
  - id: PID_UNCONFIRMED
    description: >
      PID 0xEF81 is a community estimate adjacent to the Komodo Full Size Yoke
      (0xEF80). Verify with lsusb on real hardware.
  - id: SINGLE_AXIS_ONLY
    description: >
      The trim wheel exposes a single rotary encoder axis (trim). It may
      enumerate as a generic HID dial or slider depending on firmware.

support:
  tier: 3
  test_coverage:
    simulated: false
    hil: false
  notes: >
    Komodo Sim Trim Wheel — single-axis trim wheel peripheral.
    PID 0xEF81 community estimate. Last reviewed: 2026-06.
