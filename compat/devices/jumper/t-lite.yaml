schema_version: "1"

device:
  name: "Jumper T-Lite (USB HID)"
  vendor: "Jumper"
  usb:
    vendor_id: 0x16C0       # Confirmed
    product_id: 0x0484      # Community estimate — verify with lsusb
  hid:
    usage_page: 0x01     # Generic Desktop
    usage: 0x4             # Joystick

capabilities:
  axes:
    count: 4
    names: [x, y, z, rz]
    resolution_bits: 10
  buttons: 6
  hats: 0
  force_feedback: false

polling:
  expected_rate_hz: 50
  max_jitter_ms: 5

quirks:
  - id: PID_UNCONFIRMED
    description: >
      VID 0x16C0 (PJRC/community). PID 0x0484 estimated for T-Lite with EdgeTX. Verify with lsusb.

support:
  tier: 3
  test_coverage:
    simulated: false
    hil: false
  notes: >
    Jumper T-Lite — compact gamepad-style RC transmitter with EdgeTX USB joystick mode.
    Wave-97 addition. Last reviewed: 2026-07.
