    "crates/flight-ac7-telemetry",
    "crates/flight-ac7-input",
    "crates/flight-warthunder",
    "crates/flight-wingman",
    "crates/flight-elite",
    "crates/flight-ksp",
    "crates/flight-panels",
    "crates/flight-panels-core",
    "crates/flight-panels-saitek",
    "crates/flight-hotas-saitek",
    "crates/flight-hotas-ch",
    "crates/flight-hotas-vkb",
    "crates/flight-hotas-thrustmaster",
    "crates/flight-panels-cougar",
    "crates/flight-streamdeck",
    "crates/flight-tactile",
    "crates/flight-writers",
    "crates/flight-replay",
    "crates/flight-tracing",
    "crates/flight-service",
    "crates/flight-cli",
    "crates/flight-ui",
    "crates/flight-updater",
    "crates/flight-units",
    "crates/flight-rules",
