    "crates/flight-hid-types",
    "crates/flight-headless",
    "crates/flight-metrics",
    "crates/flight-metrics-http",
    "crates/flight-bus",
    "crates/flight-simconnect-sys",
    "crates/flight-simconnect",
    "crates/flight-xplane",
