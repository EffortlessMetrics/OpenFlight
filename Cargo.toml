[workspace]
resolver = "2"
members = [
    "crates/flight-core",
    "crates/flight-ipc", 
    "crates/flight-axis",
    "crates/flight-scheduler",
    "crates/flight-virtual",
    "crates/flight-ffb",
    "crates/flight-hid",
    "crates/flight-bus",
    "crates/flight-simconnect",
    "crates/flight-xplane",
    "crates/flight-dcs-export",
    "crates/flight-panels",
    "crates/flight-streamdeck",
    "crates/flight-service",
    "crates/flight-cli",
    "crates/flight-ui"
]

[workspace.package]
version = "0.1.0"
edition = "2021"
rust-version = "1.75.0"
authors = ["Flight Hub Team"]
license = "MIT OR Apache-2.0"
repository = "https://github.com/flight-hub/flight-hub"
homepage = "https://flight-hub.dev"

[workspace.dependencies]
# Core dependencies
tokio = { version = "1.35", features = ["full"] }
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
anyhow = "1.0"
thiserror = "1.0"
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }

# IPC and serialization
prost = "0.12"
tonic = "0.10"
protobuf-codegen = "3.4"

# Real-time and performance
crossbeam = "0.8"
parking_lot = "0.12"
once_cell = "1.19"

# Platform-specific dependencies (defined in individual crates)
windows = { version = "0.52", features = [
    "Win32_System_Threading",
    "Win32_System_Performance", 
    "Win32_Devices_HumanInterfaceDevice",
    "Win32_Storage_FileSystem"
] }
libc = "0.2"
nix = "0.27"

# Additional dependencies
criterion = "0.5"
proptest = "1.4"
tempfile = "3.8"
clap = { version = "4.4", features = ["derive"] }
tonic-build = "0.10"



[profile.release]
lto = true
codegen-units = 1
panic = "abort"

[profile.dev]
panic = "abort"

# Real-time optimized profile
[profile.rt]
inherits = "release"
debug = true
overflow-checks = false