    "crates/flight-session",
    "crates/flight-motion",
    "crates/flight-cloud-profiles",
    "crates/flight-vr",
    "crates/flight-vr-overlay",
    "crates/flight-ffb-vpforce",
    "crates/flight-hotas-winwing",
    "crates/flight-hotas-honeycomb",
    "crates/flight-hotas-logitech",
    "crates/flight-hotas-logitech-wheel",
    "crates/flight-hotas-virpil",
    "crates/flight-hotas-brunner",
    "crates/flight-hotas-vpforce",
    "crates/flight-hotas-microsoft",
    "crates/flight-hotas-sony",
    "crates/flight-integration-tests",
    "crates/flight-ffb-moza",
    "crates/flight-trackir",
    "crates/flight-hotas-simucube",
    "crates/flight-hotas-turtlebeach",
