# Spec Ledger
# Machine-readable mapping of requirements to acceptance criteria and tests
# This file is validated against schemas/spec_ledger.schema.json

requirements:
  # ============================================================================
  # PRODUCT REQUIREMENTS (REQ-*)
  # ============================================================================

  # Product Requirement: Real-Time Axis Processing
  - id: REQ-1
    name: Real-Time Axis Processing
    kind: product
    status: implemented
    ac:
      - id: AC-1.1
        description: "Processing latency SHALL be ≤ 5ms p99"
        tests:
          - flight-axis::tests::performance_validation::test_rt_performance_requirements
      - id: AC-1.2
        description: "Jitter SHALL be ≤ 0.5ms p99 at 250Hz"
        tests:
          - flight-axis::tests::performance_validation::test_jitter_requirements

  # Product Requirement: Multi-Simulator Support
  - id: REQ-2
    name: Multi-Simulator Support
    kind: product
    status: implemented
    ac:
      - id: AC-2.1
        description: "WHEN connecting to MSFS THEN the system SHALL establish SimConnect communication"
        tests:
          - flight-simconnect::tests::integration_tests::test_adapter_creation_and_basic_functionality
      - id: AC-2.2
        description: "WHEN connecting to DCS THEN the system SHALL establish export script communication"
        tests:
          - flight-dcs-export::tests::adapter_tests::test_json_parsing_and_field_mapping
      - id: AC-2.3
        description: "WHEN connecting to X-Plane THEN the system SHALL establish UDP communication"
        tests:
          - flight-xplane::src::adapter::tests::test_adapter_creation

  # Product Requirement: Force Feedback Safety
  - id: REQ-3
    name: Force Feedback Safety Systems
    kind: product
    status: implemented
    ac:
      - id: AC-3.1
        description: "WHEN FFB device is initialized THEN safety interlocks SHALL be engaged"
        tests:
          - flight-ffb::src::safety::tests::test_safety_state_manager
          - flight-ffb::src::safety::tests::test_safety_state_transitions
      - id: AC-3.2
        description: "WHEN unsafe condition is detected THEN FFB SHALL be disabled immediately"
        tests:
          - flight-ffb::src::safety::tests::test_enter_faulted_convenience
      - id: AC-3.3
        description: "WHEN device is disconnected THEN FFB SHALL gracefully shut down"
        tests:
          - flight-ffb::src::safety::tests::test_fault_reason_properties

  # Product Requirement: Profile Management
  - id: REQ-4
    name: Profile Management and Auto-Switching
    kind: product
    status: implemented
    ac:
      - id: AC-4.1
        description: "WHEN aircraft changes THEN the system SHALL automatically switch profiles"
        tests:
          - cmd:cargo test -p flight-core
          - cmd:cargo test -p flight-service
      - id: AC-4.2
        description: "WHEN profile is loaded THEN all axis mappings SHALL be applied"
        tests:
          - cmd:cargo test -p flight-core
      - id: AC-4.3
        description: "WHEN profile is invalid THEN the system SHALL report errors and use safe defaults"
        tests:
          - cmd:cargo test -p flight-core

  # Product Requirement: Panel Integration
  - id: REQ-5
    name: Panel and StreamDeck Integration
    kind: product
    status: implemented
    ac:
      - id: AC-5.1
        description: "WHEN panel is connected THEN the system SHALL detect and initialize it"
        tests:
          - cmd:cargo test -p flight-panels
      - id: AC-5.2
        description: "WHEN LED rules are defined THEN the system SHALL update panel LEDs accordingly"
        tests:
          - cmd:cargo test -p flight-panels
      - id: AC-5.3
        description: "WHEN StreamDeck is connected THEN the system SHALL provide API integration"
        tests:
          - cmd:cargo test -p flight-streamdeck

  # Product Requirement: IPC Communication
  - id: REQ-6
    name: Inter-Process Communication
    kind: product
    status: implemented
    ac:
      - id: AC-6.1
        description: "WHEN client connects THEN the system SHALL establish gRPC connection"
        tests:
          - cmd:cargo test -p flight-ipc
      - id: AC-6.2
        description: "WHEN messages are sent THEN they SHALL use Protobuf serialization"
        tests:
          - cmd:cargo test -p flight-ipc
      - id: AC-6.3
        description: "WHEN connection is lost THEN the system SHALL handle reconnection gracefully"
        tests:
          - cmd:cargo test -p flight-ipc

  # Product Requirement: Real-Time Scheduling
  - id: REQ-7
    name: Real-Time Scheduling
    kind: product
    status: implemented
    ac:
      - id: AC-7.1
        description: "WHEN scheduler starts THEN it SHALL maintain 250Hz timing"
        tests:
          - cmd:cargo test -p flight-scheduler
      - id: AC-7.2
        description: "WHEN running on Windows THEN it SHALL use high-resolution timers"
        tests:
          - cmd:cargo test -p flight-scheduler
      - id: AC-7.3
        description: "WHEN running on Linux THEN it SHALL use POSIX real-time scheduling"
        tests:
          - cmd:cargo test -p flight-scheduler

  # Product Requirement: HID Device Support
  - id: REQ-8
    name: HID Device Support
    kind: product
    status: implemented
    ac:
      - id: AC-8.1
        description: "WHEN HID device is connected THEN the system SHALL enumerate it"
        tests:
          - cmd:cargo test -p flight-hid
      - id: AC-8.2
        description: "WHEN reading HID reports THEN the system SHALL parse them correctly"
        tests:
          - cmd:cargo test -p flight-hid
      - id: AC-8.3
        description: "WHEN file descriptors are managed THEN they SHALL be properly closed"
        tests:
          - cmd:cargo test -p flight-hid

  # Product Requirement: Diagnostics and Blackbox
  - id: REQ-9
    name: Diagnostics and Blackbox Recording
    kind: product
    status: implemented
    ac:
      - id: AC-9.1
        description: "WHEN system runs THEN it SHALL record telemetry to blackbox"
        tests:
          - cmd:cargo test -p flight-core
          - cmd:cargo test -p flight-axis
      - id: AC-9.2
        description: "WHEN events occur THEN they SHALL be logged with tracing"
        tests:
          - cmd:cargo test -p flight-tracing
      - id: AC-9.3
        description: "WHEN performance counters are enabled THEN they SHALL track metrics"
        tests:
          - cmd:cargo test -p flight-tracing

  # Product Requirement: Configuration Management
  - id: REQ-10
    name: Configuration Management (Writers as Data)
    kind: product
    status: implemented
    ac:
      - id: AC-10.1
        description: "WHEN configuration is loaded THEN it SHALL be validated against schema"
        tests:
          - cmd:cargo test -p flight-writers
      - id: AC-10.2
        description: "WHEN configuration changes THEN the system SHALL detect differences"
        tests:
          - cmd:cargo test -p flight-writers
      - id: AC-10.3
        description: "WHEN configuration is invalid THEN the system SHALL provide repair suggestions"
        tests:
          - cmd:cargo test -p flight-writers

  # Product Requirement: Update System
  - id: REQ-11
    name: Update and Rollback System
    kind: product
    status: implemented
    ac:
      - id: AC-11.1
        description: "WHEN update is available THEN the system SHALL verify signatures"
        tests:
          - cmd:cargo test -p flight-updater
      - id: AC-11.2
        description: "WHEN applying update THEN the system SHALL use delta patches"
        tests:
          - cmd:cargo test -p flight-updater
      - id: AC-11.3
        description: "WHEN update fails THEN the system SHALL rollback to previous version"
        tests:
          - cmd:cargo test -p flight-updater

  # Product Requirement: Virtual Device Support
  - id: REQ-12
    name: Virtual Device Support
    kind: product
    status: implemented
    ac:
      - id: AC-12.1
        description: "WHEN virtual device is created THEN it SHALL emulate OFP1 protocol"
        tests:
          - cmd:cargo test -p flight-virtual
      - id: AC-12.2
        description: "WHEN loopback mode is enabled THEN the system SHALL route data internally"
        tests:
          - cmd:cargo test -p flight-virtual
      - id: AC-12.3
        description: "WHEN performance is measured THEN it SHALL meet requirements"
        tests:
          - cmd:cargo test -p flight-virtual

  # Product Requirement: Replay System
  - id: REQ-13
    name: Replay and Validation System
    kind: product
    status: implemented
    ac:
      - id: AC-13.1
        description: "WHEN replay is started THEN it SHALL process recorded data"
        tests:
          - cmd:cargo test -p flight-replay
      - id: AC-13.2
        description: "WHEN comparing replays THEN it SHALL detect differences"
        tests:
          - cmd:cargo test -p flight-replay
      - id: AC-13.3
        description: "WHEN validating behavior THEN it SHALL check acceptance criteria"
        tests:
          - cmd:cargo test -p flight-replay

  # Product Requirement: CLI Interface
  - id: REQ-14
    name: Command-Line Interface
    kind: product
    status: implemented
    ac:
      - id: AC-14.1
        description: "WHEN CLI is invoked THEN it SHALL connect to service via IPC"
        tests:
          - cmd:cargo test -p flight-cli
      - id: AC-14.2
        description: "WHEN commands are executed THEN they SHALL provide formatted output"
        tests:
          - cmd:cargo test -p flight-cli
      - id: AC-14.3
        description: "WHEN service is unavailable THEN CLI SHALL report clear error"
        tests:
          - cmd:cargo test -p flight-cli

  # Product Requirement: Thrustmaster T.Flight HOTAS 4 Support
  - id: REQ-15
    name: Thrustmaster T.Flight HOTAS 4 Support
    kind: product
    status: implemented
    ac:
      - id: AC-15.1
        description: "WHEN enumerating HID devices THEN HOTAS 4 SHALL be identified by VID 0x044F and PID 0xB67B (primary) or 0xB67A (legacy), with legacy flag set only for B67A"
        tests:
          - flight-hid-support::device_support::tests::test_hotas4_primary_and_legacy_pid_detection

      - id: AC-15.2
        description: "WHEN parsing merged-mode (8-byte) reports THEN axes/buttons/hat SHALL be decoded and rocker SHALL be absent"
        tests:
          - flight-hotas-thrustmaster::input::tests::test_parse_merged_report

      - id: AC-15.3
        description: "WHEN parsing separate-mode (9-byte) reports THEN rocker SHALL be present and axes/buttons/hat SHALL be decoded"
        tests:
          - flight-hotas-thrustmaster::input::tests::test_parse_separate_report

      - id: AC-15.4
        description: "WHEN report layout changes mid-session THEN effective axis mode SHALL update without restart"
        tests:
          - flight-hotas-thrustmaster::input::tests::test_runtime_mode_switch

      - id: AC-15.5
        description: "WHEN yaw policy is Auto/Twist/Aux THEN logical yaw SHALL resolve to the expected source"
        tests:
          - flight-hotas-thrustmaster::input::tests::test_yaw_policy_resolution

      - id: AC-15.6
        description: "WHEN documentation references HOTAS 4 THEN it SHALL include primary and legacy PIDs, mode semantics, and REQ-15 link"
        tests:
          - cmd:cargo xtask validate

  # Product Requirement: T.Flight HOTAS 4 Runtime Auto-Mode and Report-ID Handling
  - id: REQ-16
    name: T.Flight HOTAS 4 Runtime Auto-Mode and Report-ID Handling
    kind: product
    status: implemented
    ac:
      - id: AC-16.1
        description: "WHEN the T.Flight runtime registers a new device THEN the input handler SHALL be initialised with AxisMode::Unknown so each report is auto-detected independently"
        tests:
          - flight-service::input_runtime::tests::test_runtime_auto_detects_axis_mode_merged
          - flight-service::input_runtime::tests::test_mode_change_emits_health_event

      - id: AC-16.2
        description: "WHEN a T.Flight report is prepended with a Report ID byte THEN the handler SHALL strip the prefix and parse the remaining payload correctly for both merged and separate modes"
        tests:
          - flight-hotas-thrustmaster::input::tests::test_report_id_stripped_merged
          - flight-hotas-thrustmaster::input::tests::test_report_id_stripped_separate

      - id: AC-16.3
        description: "WHEN a T.Flight HAT switch reports a value outside the valid range 0..=8 THEN the runtime SHALL clamp it to 0 (center) to prevent phantom hat events"
        tests:
          - flight-hotas-thrustmaster::input::tests::test_hat_out_of_range_clamped_to_center
          - flight-hotas-thrustmaster::input::tests::test_hat_max_valid_value_preserved

      - id: AC-16.4
        description: "WHEN `TFlightRuntimeConfig::throttle_inversion` is true THEN the runtime SHALL invert the throttle axis (1.0 − value) and the service config field `tflight_throttle_inversion` SHALL wire through to the runtime"
        tests:
          - flight-service::input_runtime::tests::test_runtime_throttle_inversion_applied

  # Product Requirement: Ace Combat 7 Experimental Bridge Integration
  - id: REQ-17
    name: Ace Combat 7 Experimental Bridge Integration
    kind: product
    status: implemented
    ac:
      - id: AC-17.1
        description: "WHEN AC7 bridge telemetry JSON is received THEN the protocol layer SHALL validate schema and numeric bounds"
        tests:
          - flight-ac7-protocol::tests::parses_valid_packet
          - flight-ac7-protocol::tests::rejects_out_of_range_control_value

      - id: AC-17.2
        description: "WHEN AC7 UDP packets arrive THEN telemetry adapter SHALL convert them into BusSnapshot with SimId::AceCombat7"
        tests:
          - flight-ac7-telemetry::tests::udp_poll_receives_packet
          - flight-ac7-telemetry::tests::converts_packet_to_snapshot

      - id: AC-17.3
        description: "WHEN installing AC7 mappings THEN the input crate SHALL patch Input.ini using a managed block and optional backup"
        tests:
          - flight-ac7-input::tests::installs_with_backup
          - flight-ac7-input::tests::applies_profile_replaces_existing_managed_block

      - id: AC-17.4
        description: "WHEN AC7 telemetry JSON contains an unsupported schema or malformed JSON THEN the protocol SHALL return a typed error"
        tests:
          - flight-ac7-protocol::tests::rejects_wrong_schema
          - flight-ac7-protocol::tests::rejects_invalid_json
          - flight-ac7-protocol::tests::rejects_out_of_range_altitude
          - flight-ac7-protocol::tests::rejects_negative_speed

      - id: AC-17.5
        description: "WHEN a complete AC7 telemetry packet is serialized and deserialized THEN all fields SHALL be preserved (JSON round-trip)"
        tests:
          - flight-ac7-protocol::tests::json_round_trip
          - flight-ac7-protocol::tests::aircraft_label_trims_whitespace
          - flight-ac7-protocol::tests::defaults_schema_and_label

      - id: AC-17.6
        description: "WHEN AC7 control fields are within valid ranges THEN property-based validation SHALL accept all bounded values"
        tests:
          - flight-ac7-protocol::tests::property_all_bounded_controls_valid
          - flight-ac7-protocol::tests::property_bounded_altitude_valid
          - flight-ac7-protocol::tests::property_pitch_control_is_bounded

      - id: AC-17.7
        description: "WHEN AC7 telemetry adapter starts and stops THEN state transitions SHALL follow Connected to Active to Disconnected lifecycle"
        tests:
          - flight-ac7-telemetry::tests::start_stop_cycle
          - flight-ac7-telemetry::tests::adapter_initial_state_is_disconnected
          - flight-ac7-telemetry::tests::poll_updates_source_addr

      - id: AC-17.8
        description: "WHEN converting packets to BusSnapshot THEN validity flags SHALL be set correctly based on available fields"
        tests:
          - flight-ac7-telemetry::tests::snapshot_validity_flags_set_from_full_packet
          - flight-ac7-telemetry::tests::snapshot_validity_partial_packet
          - flight-ac7-telemetry::tests::snapshot_has_correct_sim_id
          - flight-ac7-telemetry::tests::snapshot_control_inputs_mapped

      - id: AC-17.9
        description: "WHEN an AC7 input profile has invalid fields THEN validation SHALL reject out-of-range scale, deadzone, and exponent values"
        tests:
          - flight-ac7-input::tests::validates_empty_profile_name
          - flight-ac7-input::tests::validates_out_of_range_scale
          - flight-ac7-input::tests::validates_out_of_range_deadzone
          - flight-ac7-input::tests::validates_out_of_range_exponent

      - id: AC-17.10
        description: "WHEN rendering AC7 input blocks THEN all RC modes SHALL be rendered and managed blocks SHALL be idempotent"
        tests:
          - flight-ac7-input::tests::renders_all_rc_modes
          - flight-ac7-input::tests::managed_block_is_idempotent
          - flight-ac7-input::tests::rc_mode_index_values
          - flight-ac7-input::tests::install_creates_dir_and_file

      - id: AC-17.11
        description: "WHEN AC7 input profile fields are within valid ranges THEN property-based validation SHALL accept all valid values"
        tests:
          - flight-ac7-input::tests::property_valid_scale_range_accepted
          - flight-ac7-input::tests::property_valid_deadzone_range_accepted
          - flight-ac7-input::tests::property_valid_exponent_range_accepted

  - id: REQ-35
    name: Blackbox Recording System
    kind: infra
    status: implemented
    ac:
      - id: AC-35.1
        description: "WHEN blackbox config is created THEN default values SHALL be applied and queue capacity SHALL clamp to defined min/max bounds"
        tests:
          - flight-blackbox::tests::blackbox_config_defaults
          - flight-blackbox::tests::record_queue_capacity_clamps_to_min
          - flight-blackbox::tests::record_queue_capacity_clamps_to_max

      - id: AC-35.2
        description: "WHEN a BlackboxWriter is created THEN it SHALL start in a non-running state and starting it twice SHALL return an error"
        tests:
          - flight-blackbox::tests::blackbox_writer_starts_not_running
          - flight-blackbox::tests::double_start_returns_error

      - id: AC-35.3
        description: "WHEN records are written to blackbox THEN they SHALL be read back in the correct order (round-trip)"
        tests:
          - flight-blackbox::tests::blackbox_write_read_roundtrip

      - id: AC-35.4
        description: "WHEN blackbox stream types are indexed THEN stream_type_to_index SHALL return a stable monotonic value"
        tests:
          - flight-blackbox::tests::stream_type_to_index

      - id: AC-35.5
        description: "WHEN blackbox header and footer structures are serialized THEN property-based round-trips SHALL preserve all fields"
        tests:
          - flight-blackbox::tests::prop_blackbox_header_roundtrip
          - flight-blackbox::tests::prop_blackbox_footer_roundtrip
          - flight-blackbox::tests::prop_index_entry_roundtrip

  - id: REQ-36
    name: HID Device Info Types
    kind: infra
    status: implemented
    ac:
      - id: AC-36.1
        description: "WHEN HidDeviceInfo is constructed THEN required fields SHALL be set and optional fields SHALL default to None"
        tests:
          - flight-hid-types::tests::hid_device_info_clone
          - flight-hid-types::tests::hid_device_info_optional_fields
          - flight-hid-types::tests::hid_device_info_with_descriptor

  - id: REQ-37
    name: VKB Gladiator NXT EVO Input Parsing
    kind: product
    status: implemented
    ac:
      - id: AC-37.1
        description: "WHEN a Gladiator HID report is parsed THEN all six axes SHALL decode to normalized values and button bitmask SHALL be applied"
        tests:
          - flight-hotas-vkb::input::tests::test_parse_interface_report_with_axes_and_buttons
          - flight-hotas-vkb::input::tests::test_parse_interface_report_with_report_id
      - id: AC-37.2
        description: "WHEN bidirectional axis raw value is 0x0000 THEN normalized value SHALL be -1.0; 0x8000 SHALL be 0.0; 0xFFFF SHALL be +1.0"
        tests:
          - flight-hotas-vkb::input::tests::test_parse_interface_report_with_axes_and_buttons
      - id: AC-37.3
        description: "WHEN a report shorter than 12 bytes is presented THEN a ReportTooShort error SHALL be returned"
        tests:
          - flight-hotas-vkb::input::tests::test_report_too_short
      - id: AC-37.4
        description: "WHEN bit 32 is set in the second button word THEN button index 33 SHALL be reported as pressed"
        tests:
          - flight-hotas-vkb::input::tests::test_parse_interface_report_with_axes_and_buttons
      - id: AC-37.5
        description: "WHEN pressed_buttons is called THEN it SHALL return 1-based indices of all active buttons"
        tests:
          - flight-hotas-vkb::input::tests::test_parse_interface_report_with_axes_and_buttons

  - id: REQ-38
    name: War Thunder HTTP Telemetry Adapter
    kind: product
    status: implemented
    ac:
      - id: AC-38.1
        description: "WHEN /indicators returns valid JSON THEN the adapter SHALL emit a BusSnapshot with sim WarThunder and converted unit values"
        tests:
          - flight-warthunder::tests::converts_indicators_to_snapshot
      - id: AC-38.2
        description: "WHEN optional fields are absent THEN the adapter SHALL set partial validity flags without panicking"
        tests:
          - flight-warthunder::tests::missing_fields_produce_invalid_flags
      - id: AC-38.3
        description: "WHEN WtIndicators is deserialised THEN renamed JSON fields SHALL map to struct fields correctly"
        tests:
          - flight-warthunder::protocol::tests::deserialises_from_json
          - flight-warthunder::protocol::tests::handles_missing_optional_fields
      - id: AC-38.4
        description: "WHEN adapter lifecycle is exercised THEN start SHALL set Connected and stop SHALL set Disconnected"
        tests:
          - flight-warthunder::tests::start_transitions_to_connected
          - flight-warthunder::tests::adapter_initial_state_is_disconnected

  - id: REQ-39
    name: Elite Dangerous Status File Adapter
    kind: product
    status: implemented
    ac:
      - id: AC-39.1
        description: "WHEN Status.json exists with GEAR_DOWN set THEN adapter SHALL emit BusSnapshot with config.gear all-down"
        tests:
          - flight-elite::tests::poll_reads_status_file
          - flight-elite::tests::converts_gear_down_flag
          - flight-elite::tests::converts_gear_up_flag
      - id: AC-39.2
        description: "WHEN Status.json flags are unchanged between polls THEN poll_once SHALL return None (change detection)"
        tests:
          - flight-elite::tests::poll_returns_none_when_no_change
          - flight-elite::tests::poll_returns_none_when_file_absent
      - id: AC-39.3
        description: "WHEN LIGHTS_ON flag is set THEN nav and landing lights SHALL be true; fuel quantities SHALL populate config.fuel"
        tests:
          - flight-elite::tests::converts_lights_on
          - flight-elite::tests::converts_fuel
      - id: AC-39.4
        description: "WHEN DOCKED flag is set THEN validity.position_valid SHALL be false and safe_for_ffb SHALL be false"
        tests:
          - flight-elite::tests::docked_ship_not_valid_for_ffb
      - id: AC-39.5
        description: "WHEN Status.json is parsed THEN flags bitmask and fuel fields SHALL be populated correctly"
        tests:
          - flight-elite::protocol::tests::parses_status_json
          - flight-elite::protocol::tests::elite_flags_gear_down
          - flight-elite::protocol::tests::parses_load_game_event
      - id: AC-39.6
        description: "WHEN adapter lifecycle is exercised THEN start SHALL set Connected and stop SHALL set Disconnected"
        tests:
          - flight-elite::tests::sim_id_is_elite_dangerous
      - id: AC-39.7
        description: "WHEN journal directory is present THEN JournalReader SHALL find the latest log file and tail new events"
        tests:
          - flight-elite::journal::tests::find_latest_journal_returns_most_recent
          - flight-elite::journal::tests::reads_new_events_from_journal
          - flight-elite::journal::tests::second_call_returns_only_new_events
          - flight-elite::journal::tests::empty_dir_returns_empty_vec
      - id: AC-39.8
        description: "WHEN journal events are applied THEN adapter state (current_system, docked_station, current_ship) SHALL reflect the events"
        tests:
          - flight-elite::tests::apply_fsd_jump_updates_current_system
          - flight-elite::tests::apply_location_updates_current_system
          - flight-elite::tests::apply_docked_sets_station_and_system
          - flight-elite::tests::apply_undocked_clears_station
          - flight-elite::tests::current_system_appears_in_snapshot_waypoint

  - id: REQ-40
    name: MSFS 2024 SimConnect Adapter
    kind: product
    status: implemented
    ac:
      - id: AC-40.1
        description: "WHEN connected event carries dwApplicationVersionMajor < 13 THEN sim_id SHALL be Msfs"
        tests:
          - flight-simconnect::tests::sim_id_defaults_to_msfs
      - id: AC-40.2
        description: "WHEN connected event carries dwApplicationVersionMajor >= 13 THEN sim_id SHALL be Msfs2024"
        tests:
          - flight-simconnect::tests::sim_id_is_msfs2024_after_connected_v13
      - id: AC-40.3
        description: "Kinematics definition SHALL use PLANE PITCH/BANK DEGREES and PLANE HEADING DEGREES MAGNETIC (not ATTITUDE *)"
        tests:
          - flight-simconnect::mapping::tests::kinematics_uses_plane_pitch_degrees
          - flight-simconnect::mapping::tests::kinematics_uses_plane_bank_degrees
          - flight-simconnect::mapping::tests::kinematics_uses_plane_heading_degrees_magnetic
      - id: AC-40.4
        description: "ACCELERATION BODY X/Z SHALL be requested in ft/s² and divided by 32.174 to yield G units"
        tests:
          - flight-simconnect::mapping::tests::lateral_g_converted_from_acceleration_body_x
          - flight-simconnect::mapping::tests::longitudinal_g_converted_from_acceleration_body_z
      - id: AC-40.5
        description: "ProcessDetectionConfig SHALL contain a Msfs2024 definition with process FlightSimulator2024.exe"
        tests:
          - flight-process-detection::tests::msfs2024_definition_present

  - id: REQ-41
    name: Kerbal Space Program kRPC Adapter
    kind: product
    status: implemented
    ac:
      - id: AC-41.1
        description: "KspAdapter::sim_id() SHALL return SimId::Ksp and initial state SHALL be Disconnected"
        tests:
          - flight-ksp::adapter::tests::test_adapter_creation
          - flight-ksp::adapter::tests::test_adapter_stop_without_start
      - id: AC-41.2
