        description: "WHEN CurveNode expo is 0.0 THEN output SHALL equal input within floating-point tolerance for all inputs in [-1.0, 1.0]"
        tests:
          - flight_axis::proptest_tests::curve_identity_at_zero_expo
      - id: AC-100.3
        description: "WHEN two inputs a ≤ b are processed by CurveNode THEN curve(a) SHALL be ≤ curve(b) for any expo in [-1.0, 1.0]"
        tests:
          - flight_axis::proptest_tests::curve_is_monotone
      - id: AC-100.4
        description: "WHEN any input is processed by the axis pipeline THEN output SHALL be clamped to [-1.0, 1.0]"
        tests:
          - flight_axis::proptest_tests::curve_output_in_range
          - flight_axis::proptest_tests::deadzone_output_in_range
          - flight_axis::engine::tests::test_output_clamping
      - id: AC-100.5
        description: "WHEN a SlewNode is compiled from a valid slew configuration THEN it SHALL be bound to the pipeline and converge output toward input at the configured rate"
        tests:
          - flight_axis::compiler::tests::test_slew_config_binding
          - cmd:cargo test -p flight-axis slew

