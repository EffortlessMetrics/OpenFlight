          - cmd:cargo test -p flight-updater update_simulator::test_rollback_error_handling

  # Product Requirement: RT Axis Processing Pipeline Invariants
  - id: REQ-100
    name: RT Axis Processing Pipeline Invariants
    kind: product
    status: implemented
    ac:
      - id: AC-100.1
        description: "WHEN input is within the deadzone threshold THEN output SHALL be exactly 0.0"
        tests:
          - flight_axis::proptest_tests::deadzone_zeroes_within_threshold
          - flight_axis::proptest_tests::deadzone_output_in_range
