      - id: AC-99.4
        description: "WHEN an update fails mid-installation THEN the running version SHALL remain unchanged; WHEN automatic rollback executes after a startup crash THEN the installed version SHALL revert to the pre-update version and the failed version SHALL be recorded"
        tests:
