schema_version = "1.0"

[[allow]]
glob = ".github/workflows/*.yml"
kind = "ci_declarative"
owner = "release/ci"
reason = "GitHub Actions workflow definitions are platform-required YAML."
surface = "ci"
classification = "config"
covered_by = ["cargo xtask check-lint-policy"]

[[allow]]
glob = "docs/**"
kind = "documentation"
owner = "docs"
reason = "Project documentation is intentionally authored in Markdown."
surface = "docs"
classification = "documentation"
covered_by = ["cargo xtask check-lint-policy"]

[[allow]]
glob = "policy/*.toml"
kind = "policy_data"
owner = "quality"
reason = "Machine-readable policy ledgers are TOML by convention."
surface = "policy"
classification = "config"
covered_by = ["cargo xtask check-lint-policy"]
