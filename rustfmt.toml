# Rust formatting configuration (stable-compatible)
edition = "2024"
max_width = 100
hard_tabs = false
tab_spaces = 4
newline_style = "Unix"
use_small_heuristics = "Default"
reorder_imports = true
reorder_modules = true
remove_nested_parens = true
merge_derives = true
use_try_shorthand = false
use_field_init_shorthand = false
force_explicit_abi = true

# Nightly-only options removed (see rustfmt.nightly.toml for these):
# - empty_item_single_line
# - struct_lit_single_line
# - fn_single_line
# - where_single_line
# - imports_layout
# - group_imports
