# Flight Hub Security Policy Configuration
# This file configures cargo-deny for supply chain security

[graph]
# Ensure we have a complete dependency graph
all-features = true
exclude-dev = true

[licenses]
# Only allow licenses that are compatible with our MIT/Apache-2.0 dual license
allow = [
    "MIT",
    "MIT-0",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "OpenSSL",
    "Zlib",
    "BlueOak-1.0.0",
    "CDLA-Permissive-2.0",
    "Unicode-DFS-2016",
    "Unicode-3.0",
    "MPL-2.0",
    "CC0-1.0",
]

# Confidence threshold for license detection
confidence-threshold = 0.8

# Warn about unused allowed licenses
unused-allowed-license = "warn"

# Allow specific exceptions (if needed)
exceptions = [
    # unicode-ident has compound license expressions that need special handling
    { allow = ["MIT", "Apache-2.0", "Unicode-3.0"], name = "unicode-ident" },
]

# Private workspace crates without a license field
[[licenses.clarify]]
name = "xtask"
expression = "MIT OR Apache-2.0"
license-files = []

[bans]
# Deny specific crates that have known security issues or are unmaintained
deny = [
    # Unmaintained or problematic crates
    { name = "net2" },
    { name = "tempdir" },

    # Crates that could compromise real-time performance
    # lazy_static: prefer once_cell or std::sync::LazyLock for new code,
    # but allow transitive usage via fraction (jsonschema) and sharded-slab (tracing-subscriber)
    { name = "lazy_static", wrappers = ["fraction", "sharded-slab"] },
    { name = "failure" }, # Prefer anyhow or thiserror

    # HTTP stack unification - ban conflicting dependencies
    { name = "hyper", version = "<1.0.0" },
    { name = "native-tls" },
    { name = "hyper-tls" },
    { name = "openssl" },
]

# Multiple version policy - be strict about these
multiple-versions = "deny"

# Workspace crates use path dependencies via { workspace = true } which
# resolve as wildcard versions — this is expected and correct
wildcards = "allow"

# Allow multiple versions for these specific crates if needed
multiple-versions-include-dev = false

# Skip certain crates from duplicate version checking
skip = [
    # Windows platform crates: multiple versions co-exist due to different
    # upstream consumers (windows-sys 0.42/0.52/0.53) — cannot be unified
    { name = "windows-sys" },
    { name = "windows-targets" },
    { name = "windows_aarch64_gnullvm" },
    { name = "windows_aarch64_msvc" },
    { name = "windows_i686_gnu" },
    { name = "windows_i686_gnullvm" },
    { name = "windows_i686_msvc" },
    { name = "windows_x86_64_gnu" },
    { name = "windows_x86_64_gnullvm" },
    { name = "windows_x86_64_msvc" },

    # Ecosystem crates in transition between major versions —
    # transitive deps pull both old and new; revisit when upstreams converge
    { name = "foldhash" },
    { name = "getrandom" },
    { name = "hashbrown" },
    { name = "rand_core" },
    { name = "thiserror" },
    { name = "thiserror-impl" },
]

# Skip tree checking for certain crates
skip-tree = [
    # Skip checking dependencies of build tools
    { name = "cc" },
    { name = "pkg-config" },
]

[advisories]
# Configuration for security advisory checking
db-path = "~/.cargo/advisory-db"
db-urls = ["https://github.com/rustsec/advisory-db"]

# Ignore specific advisories (use sparingly and with justification)
ignore = [
    # atomic-polyfill is unmaintained (archived by embassy-rs).
    # Pulled transitively; no updated upstream version available yet.
    # Revisit when the parent crate drops this dependency.
    "RUSTSEC-2023-0089",
]

[sources]
# Only allow crates from trusted sources
unknown-registry = "deny"
unknown-git = "deny"

# Allow specific git sources if needed
allow-git = [
    # Example: "https://github.com/trusted-org/trusted-repo"
]

# Allow registries
allow-registry = [
    "https://github.com/rust-lang/crates.io-index"
]