# Flight Hub Security Policy Configuration
# This file configures cargo-deny for supply chain security

[graph]
# Ensure we have a complete dependency graph
all-features = true
exclude-dev = false

[licenses]
# Only allow licenses that are compatible with our MIT/Apache-2.0 dual license
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-DFS-2016",
    "CC0-1.0",
]

# Deny copyleft licenses that could affect our licensing
deny = [
    "GPL-2.0",
    "GPL-3.0", 
    "LGPL-2.1",
    "LGPL-3.0",
    "AGPL-3.0",
]

# Confidence threshold for license detection
confidence-threshold = 0.8

# Allow specific exceptions (if needed)
exceptions = [
    # Example: { allow = ["GPL-3.0"], name = "some-crate", version = "1.0" }
]

[bans]
# Deny specific crates that have known security issues or are unmaintained
deny = [
    # Crates with known security vulnerabilities
    { name = "openssl", version = "<0.10.55" },
    { name = "hyper", version = "<0.14.18" },
    { name = "tokio", version = "<1.20.0" },
    
    # Unmaintained or problematic crates
    { name = "net2" },
    { name = "tempdir" },
    { name = "rand", version = "<0.8.0" },
]

# Skip certain crates from duplicate version checking
skip = [
    # Allow multiple versions of these crates if needed
    { name = "windows-sys" },
    { name = "windows" },
]

# Skip tree checking for certain crates
skip-tree = [
    # Skip checking dependencies of build tools
    { name = "cc" },
    { name = "pkg-config" },
]

[advisories]
# Configuration for security advisory checking
db-path = "~/.cargo/advisory-db"
db-urls = ["https://github.com/rustsec/advisory-db"]

# Vulnerability severity levels to deny
vulnerability = "deny"
unmaintained = "warn"
yanked = "deny"
notice = "warn"

# Ignore specific advisories (use sparingly and with justification)
ignore = [
    # Example: "RUSTSEC-2020-0001", # Justification for ignoring
]

[sources]
# Only allow crates from trusted sources
unknown-registry = "deny"
unknown-git = "deny"

# Allow specific git sources if needed
allow-git = [
    # Example: "https://github.com/trusted-org/trusted-repo"
]

# Allow registries
allow-registry = [
    "https://github.com/rust-lang/crates.io-index"
]