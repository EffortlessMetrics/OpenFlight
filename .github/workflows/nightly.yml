name: Nightly
on:
  schedule:
    - cron: '0 3 * * *'  # 3 AM UTC daily
  workflow_dispatch:

jobs:
  fuzz-smoke:
    name: Fuzz Smoke (${{ matrix.target }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        target:
          - flight-profile
          - flight-rules
          - flight-dcs-export
          - flight-xplane
          - flight-hid
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@nightly
      - run: cargo install cargo-fuzz
      - name: Install Linux HID build deps
        run: sudo apt-get update && sudo apt-get install -y libudev-dev
      - name: Run fuzz targets (5 min each)
        run: |
          cd crates/${{ matrix.target }}/fuzz
          for target in $(cargo fuzz list 2>/dev/null || echo ""); do
            if [ -n "$target" ]; then
              echo "Fuzzing: $target"
              timeout 300 cargo fuzz run "$target" -- -max_total_time=300 || true
            fi
          done
      - name: Upload corpus
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: fuzz-corpus-${{ matrix.target }}
          path: crates/${{ matrix.target }}/fuzz/corpus/
          retention-days: 30

  mutation-test:
    name: Mutation Testing (${{ matrix.crate }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        crate:
          - flight-core
          - flight-axis
          - flight-bus
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo install cargo-mutants
      - name: Install Linux HID build deps
        run: sudo apt-get update && sudo apt-get install -y libudev-dev
      - name: Run mutation tests (30 min timeout)
        run: |
          timeout 1800 cargo mutants -p ${{ matrix.crate }} --timeout=120 -- --test-threads=2 || true
      - name: Upload mutation results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: mutants-${{ matrix.crate }}
          path: mutants.out/
          retention-days: 30

  sanitizer-check:
    name: Address Sanitizer
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@nightly
        with:
          components: rust-src
      - name: Install Linux HID build deps
        run: sudo apt-get update && sudo apt-get install -y libudev-dev
      - name: Run tests with AddressSanitizer
        env:
          RUSTFLAGS: -Zsanitizer=address
          RUSTDOCFLAGS: -Zsanitizer=address
        run: |
          cargo test -Zbuild-std --target x86_64-unknown-linux-gnu \
            -p flight-core -p flight-axis -p flight-bus -- --test-threads=1
