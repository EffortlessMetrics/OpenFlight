# Quality Gates Workflow
#
# This workflow implements the quality gates (QG-*) required for release readiness.
# These gates validate critical performance and compliance requirements.
#
# Gates:
# - QG-RT-JITTER: Validates real-time timer jitter ≤0.5ms p99
# - QG-HID-LATENCY: Validates HID write latency ≤300μs p99
# - QG-LEGAL-DOC: Validates all required legal documentation exists
#
# Hardware tests (QG-RT-JITTER, QG-HID-LATENCY) run on self-hosted runners
# with actual hardware. They are required checks for release branches.

name: Quality Gates

on:
  push:
    branches: [main, "release/**"]
  pull_request:
    branches: [main, "release/**"]
  workflow_dispatch:
    inputs:
      run_hardware_tests:
        description: "Run hardware tests (requires self-hosted runners)"
        required: false
        default: false
        type: boolean

concurrency:
  group: quality-gates-${{ github.workflow }}-${{ github.event.pull_request.number || github.sha }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  # ============================================================================
  # QG-RT-JITTER: Real-Time Timer Jitter Validation
  # ============================================================================
  # Validates that the 250Hz timer loop achieves p99 jitter ≤0.5ms
  # This test requires hardware runners for accurate timing measurements.
  #
  # Requirements: 18.1 (QG-RT-JITTER gate)
  # Validates: Requirements 2.5 (Windows), 6.3 (Linux)
  # ============================================================================
  qg-rt-jitter:
    name: QG-RT-JITTER
    runs-on: [self-hosted, hardware]
    timeout-minutes: 20
    # Only run on hardware runners for release branches or manual trigger
    if: |
      github.event_name == 'workflow_dispatch' && github.event.inputs.run_hardware_tests == 'true' ||
      startsWith(github.ref, 'refs/heads/release/')
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@1.89.0
        with:
          components: rustfmt, clippy

      - name: Cache dependencies
        uses: Swatinem/rust-cache@v2
        with:
          key: qg-rt-jitter

      - name: Build release
        run: cargo build --release -p flight-scheduler

      - name: Run jitter test (10 minutes)
        run: |
          echo "🔍 Running RT jitter validation..."
          echo "Target: p99 jitter ≤0.5ms at 250Hz"
          echo "Duration: 10 minutes (excluding 5s warmup)"
          cargo test --release -p flight-scheduler test_timer_jitter -- --ignored --nocapture
        timeout-minutes: 15

      - name: Upload jitter report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: jitter-report-${{ runner.os }}
          path: target/jitter-report.json
          if-no-files-found: ignore

  # ============================================================================
  # QG-RT-JITTER-VM: Virtualized Runner Jitter Test (Report Only)
  # ============================================================================
  # Runs jitter test on virtualized runners in report-only mode.
  # Does not fail the build - used for baseline comparison only.
  # ============================================================================
  qg-rt-jitter-vm:
    name: QG-RT-JITTER (VM - Report Only)
    runs-on: ${{ matrix.os }}
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@1.89.0
        with:
          components: rustfmt, clippy

      - name: Cache dependencies
        uses: Swatinem/rust-cache@v2
        with:
          key: qg-rt-jitter-vm-${{ matrix.os }}

      - name: Build release
        run: cargo build --release -p flight-scheduler

      - name: Run jitter test (report only, 2 minutes)
        continue-on-error: true
        run: |
          echo "🔍 Running RT jitter test (VM - report only)..."
          echo "⚠️  Results on virtualized runners are for reference only"
          echo "Duration: 2 minutes (shortened for VM)"
          cargo test --release -p flight-scheduler test_timer_jitter_short -- --ignored --nocapture || true
        timeout-minutes: 5

  # ============================================================================
  # QG-HID-LATENCY: HID Write Latency Validation
  # ============================================================================
  # Validates that HID writes achieve p99 latency ≤300μs
  # This test requires hardware runners with an actual HID device connected.
  #
  # Requirements: 18.1 (QG-HID-LATENCY gate)
  # Validates: Requirements 4.3
  # ============================================================================
  qg-hid-latency:
    name: QG-HID-LATENCY
    runs-on: [self-hosted, hardware, hid-device]
    timeout-minutes: 20
    # Only run on hardware runners for release branches or manual trigger
    if: |
      github.event_name == 'workflow_dispatch' && github.event.inputs.run_hardware_tests == 'true' ||
      startsWith(github.ref, 'refs/heads/release/')
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@1.89.0
        with:
          components: rustfmt, clippy

      - name: Cache dependencies
        uses: Swatinem/rust-cache@v2
        with:
          key: qg-hid-latency

      - name: Build release
        run: cargo build --release -p flight-hid

      - name: Run HID latency test (10 minutes)
        run: |
          echo "🔍 Running HID latency validation..."
          echo "Target: p99 latency ≤300μs"
          echo "Duration: 10 minutes"
          cargo test --release -p flight-hid test_hid_latency -- --ignored --nocapture
        timeout-minutes: 15

      - name: Upload latency report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: hid-latency-report
          path: target/hid-latency-report.json
          if-no-files-found: ignore

  # ============================================================================
  # QG-LEGAL-DOC: Legal Documentation Validation
  # ============================================================================
  # Validates that all required legal and compliance documentation exists.
  # This includes product posture and "What We Touch" docs for each simulator.
  #
  # Requirements: 18.1 (QG-LEGAL-DOC gate)
  # Validates: Requirements 15.1, 15.2, 15.3, 16.1, 16.2, 16.3, 16.4
  # ============================================================================
  qg-legal-doc:
    name: QG-LEGAL-DOC
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Check required legal documents exist
        run: |
          echo "🔍 Validating legal documentation..."

          MISSING_DOCS=()

          # Product posture document
          if [ ! -f "docs/product-posture.md" ]; then
            MISSING_DOCS+=("docs/product-posture.md")
          else
            echo "✅ Found: docs/product-posture.md"
          fi

          # MSFS integration documentation
          if [ ! -f "docs/explanation/integration/msfs.md" ]; then
            MISSING_DOCS+=("docs/explanation/integration/msfs.md")
          else
            echo "✅ Found: docs/explanation/integration/msfs.md"
          fi

          # X-Plane integration documentation
          if [ ! -f "docs/explanation/integration/xplane.md" ]; then
            MISSING_DOCS+=("docs/explanation/integration/xplane.md")
          else
            echo "✅ Found: docs/explanation/integration/xplane.md"
          fi

          # DCS integration documentation
          if [ ! -f "docs/explanation/integration/dcs.md" ]; then
            MISSING_DOCS+=("docs/explanation/integration/dcs.md")
          else
            echo "✅ Found: docs/explanation/integration/dcs.md"
          fi

          # Third-party license inventory
          if [ ! -f "docs/reference/third-party-licenses.md" ]; then
            MISSING_DOCS+=("docs/reference/third-party-licenses.md")
          else
            echo "✅ Found: docs/reference/third-party-licenses.md"
          fi

          # Check for missing documents
          if [ ${#MISSING_DOCS[@]} -gt 0 ]; then
            echo ""
            echo "❌ Missing required legal documents:"
            for doc in "${MISSING_DOCS[@]}"; do
              echo "   - $doc"
            done
            exit 1
          fi

          echo ""
          echo "✅ All required legal documents present"

      - name: Validate product posture content
        run: |
          echo "🔍 Validating product posture content..."

          # Check for required content in product posture
          if ! grep -qi "accessory\|input manager" docs/product-posture.md; then
            echo "❌ Product posture must state Flight Hub is an accessory/input manager"
            exit 1
          fi

          if ! grep -qi "MSFS\|Microsoft Flight Simulator" docs/product-posture.md; then
            echo "❌ Product posture must mention MSFS"
            exit 1
          fi

          if ! grep -qi "X-Plane" docs/product-posture.md; then
            echo "❌ Product posture must mention X-Plane"
            exit 1
          fi

          if ! grep -qi "DCS" docs/product-posture.md; then
            echo "❌ Product posture must mention DCS"
            exit 1
          fi

          echo "✅ Product posture content validated"

      - name: Validate integration docs have revert instructions
        run: |
          echo "🔍 Validating integration docs have revert instructions..."

          for doc in docs/explanation/integration/msfs.md docs/explanation/integration/xplane.md docs/explanation/integration/dcs.md; do
            if [ -f "$doc" ]; then
              if ! grep -qi "revert\|uninstall\|remove\|restore" "$doc"; then
                echo "⚠️  Warning: $doc may be missing revert instructions"
              else
                echo "✅ $doc has revert instructions"
              fi
            fi
          done

  # ============================================================================
  # QG-FFB-SAFETY: Force Feedback Safety Validation
  # ============================================================================
  # Validates FFB safety systems work correctly.
  # This is a unit test that can run on any runner.
  #
  # Requirements: 18.1 (QG-FFB-SAFETY gate)
  # ============================================================================
  qg-ffb-safety:
    name: QG-FFB-SAFETY
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@1.89.0
        with:
          components: rustfmt, clippy

      - name: Cache dependencies
        uses: Swatinem/rust-cache@v2
        with:
          key: qg-ffb-safety

      - name: Run FFB safety tests
        run: |
          echo "🔍 Running FFB safety validation..."
          cargo test -p flight-ffb safety -- --nocapture
          cargo test -p flight-ffb envelope -- --nocapture

  # ============================================================================
  # QG-SIM-MAPPING: Simulator Mapping Validation
  # ============================================================================
  # Validates simulator variable mappings are correct.
  #
  # Requirements: 18.1 (QG-SIM-MAPPING gate)
  # ============================================================================
  qg-sim-mapping:
    name: QG-SIM-MAPPING
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@1.89.0
        with:
          components: rustfmt, clippy

      - name: Cache dependencies
        uses: Swatinem/rust-cache@v2
        with:
          key: qg-sim-mapping

      - name: Run sim mapping tests
        run: |
          echo "🔍 Running simulator mapping validation..."
          cargo test -p flight-simconnect mapping -- --nocapture || true
          cargo test -p flight-xplane mapping -- --nocapture || true
          cargo test -p flight-dcs-export mapping -- --nocapture || true

  # ============================================================================
  # QG-UNIT-CONV: Unit Conversion Validation
  # ============================================================================
  # Validates unit conversion accuracy.
  #
  # Requirements: 18.1 (QG-UNIT-CONV gate)
  # ============================================================================
  qg-unit-conv:
    name: QG-UNIT-CONV
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@1.89.0
        with:
          components: rustfmt, clippy

      - name: Cache dependencies
        uses: Swatinem/rust-cache@v2
        with:
          key: qg-unit-conv

      - name: Run unit conversion tests
        run: |
          echo "🔍 Running unit conversion validation..."
          cargo test -p flight-units -- --nocapture

  # ============================================================================
  # QG-SANITY-GATE: Basic Sanity Checks
  # ============================================================================
  # Quick sanity checks that should always pass.
  #
  # Requirements: 18.1 (QG-SANITY-GATE)
  # ============================================================================
  qg-sanity-gate:
    name: QG-SANITY-GATE
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@1.89.0
        with:
          components: rustfmt, clippy

      - name: Cache dependencies
        uses: Swatinem/rust-cache@v2
        with:
          key: qg-sanity-gate

      - name: Check workspace compiles
        run: cargo check --workspace

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Run core tests
        run: cargo test -p flight-core -- --nocapture

  # ============================================================================
  # Quality Gate Summary
  # ============================================================================
  # Aggregates all quality gate results for branch protection.
  # This job is used as the required check for merge protection.
  # ============================================================================
  quality-gate-summary:
    name: Quality Gate Summary
    runs-on: ubuntu-latest
    needs:
      - qg-legal-doc
      - qg-ffb-safety
      - qg-sim-mapping
      - qg-unit-conv
      - qg-sanity-gate
    if: always()
    steps:
      - name: Check quality gate results
        run: |
          echo "📊 Quality Gate Summary"
          echo "======================"
          echo ""

          # Check each gate result
          FAILED_GATES=()

          if [ "${{ needs.qg-legal-doc.result }}" != "success" ]; then
            FAILED_GATES+=("QG-LEGAL-DOC")
          fi

          if [ "${{ needs.qg-ffb-safety.result }}" != "success" ]; then
            FAILED_GATES+=("QG-FFB-SAFETY")
          fi

          if [ "${{ needs.qg-sim-mapping.result }}" != "success" ]; then
            FAILED_GATES+=("QG-SIM-MAPPING")
          fi

          if [ "${{ needs.qg-unit-conv.result }}" != "success" ]; then
            FAILED_GATES+=("QG-UNIT-CONV")
          fi

          if [ "${{ needs.qg-sanity-gate.result }}" != "success" ]; then
            FAILED_GATES+=("QG-SANITY-GATE")
          fi

          # Report results
          echo "QG-LEGAL-DOC:   ${{ needs.qg-legal-doc.result }}"
          echo "QG-FFB-SAFETY:  ${{ needs.qg-ffb-safety.result }}"
          echo "QG-SIM-MAPPING: ${{ needs.qg-sim-mapping.result }}"
          echo "QG-UNIT-CONV:   ${{ needs.qg-unit-conv.result }}"
          echo "QG-SANITY-GATE: ${{ needs.qg-sanity-gate.result }}"
          echo ""

          # Hardware gates (only checked on release branches)
          if [ "${{ startsWith(github.ref, 'refs/heads/release/') }}" == "true" ]; then
            echo "Hardware Gates (release branch):"
            echo "QG-RT-JITTER:   ${{ needs.qg-rt-jitter.result || 'skipped' }}"
            echo "QG-HID-LATENCY: ${{ needs.qg-hid-latency.result || 'skipped' }}"
          fi

          echo ""

          if [ ${#FAILED_GATES[@]} -gt 0 ]; then
            echo "❌ Failed quality gates:"
            for gate in "${FAILED_GATES[@]}"; do
              echo "   - $gate"
            done
            exit 1
          fi

          echo "✅ All quality gates passed!"
