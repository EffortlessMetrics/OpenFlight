name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  test:
    name: Test Suite
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]
        rust: [stable, 1.89.0]
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Install Rust toolchain
      uses: dtolnay/rust-toolchain@master
      with:
        toolchain: ${{ matrix.rust }}
        components: rustfmt, clippy
        
    - name: Cache dependencies
      uses: Swatinem/rust-cache@v2
      with:
        key: ${{ matrix.os }}-${{ matrix.rust }}
        
    - name: Check formatting
      run: cargo fmt --all -- --check
      
    - name: Run clippy
      run: cargo clippy --all-targets --all-features -- -D warnings
      
    - name: Run tests
      run: cargo test --all-features --workspace
      
    - name: Run doc tests
      run: cargo test --doc --workspace
      
    - name: Validate ADR links
      run: |
        echo "🔍 Validating ADR files exist..."
        for adr in docs/adr/001-rt-spine-architecture.md docs/adr/002-writers-as-data.md docs/adr/003-plugin-classes.md docs/adr/004-zero-allocation-constraint.md docs/adr/005-pll-timing-discipline.md; do
          if [ ! -f "$adr" ]; then
            echo "❌ Missing ADR: $adr"
            exit 1
          else
            echo "✅ Found: $adr"
          fi
        done
        echo "✅ All referenced ADRs exist"

  security:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Install Rust toolchain
      uses: dtolnay/rust-toolchain@stable
      
    - name: Cache dependencies
      uses: Swatinem/rust-cache@v2
      
    - name: Install cargo-audit
      run: cargo install cargo-audit
      
    - name: Install cargo-deny
      run: cargo install cargo-deny
      
    - name: Run security audit
      run: cargo audit --deny warnings
      
    - name: Run cargo-deny
      run: cargo deny check --hide-inclusion-graph

  build:
    name: Build Release
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]
        
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Install Rust toolchain
      uses: dtolnay/rust-toolchain@stable
      
    - name: Cache dependencies
      uses: Swatinem/rust-cache@v2
      with:
        key: release-${{ matrix.os }}
        
    - name: Build release
      run: cargo build --release --workspace
      
    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: flight-hub-${{ matrix.os }}
        path: |
          target/release/flightd*
          target/release/flightctl*

  performance:
    name: Performance Tests
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Install Rust toolchain
      uses: dtolnay/rust-toolchain@stable
      
    - name: Cache dependencies
      uses: Swatinem/rust-cache@v2
      
    - name: Run benchmarks
      run: cargo bench --workspace
      
    - name: Performance regression check
      run: |
        # TODO: Implement performance regression detection
        echo "Performance tests passed"