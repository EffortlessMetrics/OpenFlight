name: Coverage

on:
  push:
    branches: [main]
    paths:
      - "Cargo.toml"
      - "Cargo.lock"
      - "crates/**"
      - "specs/**"
      - ".github/workflows/coverage.yml"
      - "codecov.yml"
  pull_request:
    types: [opened, synchronize, reopened, labeled]
    branches: [main]
    paths:
      - "Cargo.toml"
      - "Cargo.lock"
      - "crates/**"
      - "specs/**"
      - ".github/workflows/coverage.yml"
      - "codecov.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: coverage-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: "0"
  RUSTFLAGS: "-C debuginfo=0"

jobs:
  coverage:
    name: Codecov Coverage
    runs-on: ubuntu-latest
    timeout-minutes: 45

    if: >-
      github.event_name == 'push' ||
      github.event_name == 'workflow_dispatch' ||
      contains(github.event.pull_request.labels.*.name, 'coverage') ||
      contains(github.event.pull_request.labels.*.name, 'full-ci') ||
      contains(github.event.pull_request.labels.*.name, 'ci:full')

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.92.0"
          components: llvm-tools-preview

      - name: Install Linux HID build deps
        run: |
          sudo apt-get update
          sudo apt-get install -y libudev-dev

      - name: Use larger target dir
        run: echo "CARGO_TARGET_DIR=${RUNNER_TEMP}/target" >> "$GITHUB_ENV"

      - uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true
          cache-directories: ${{ runner.temp }}/target
          shared-key: coverage-1.92
          save-if: ${{ github.ref == 'refs/heads/main' }}

      - name: Install coverage tools
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-llvm-cov,cargo-nextest

      - name: Generate coverage
        env:
          CI: true
          PROPTEST_CASES: "64"
          INSTA_UPDATE: "no"
        run: |
          set -euo pipefail
          cargo llvm-cov clean --workspace

          cargo llvm-cov nextest \
            --locked \
            --no-report \
            -p flight-core \
            -p flight-axis \
            -p flight-bus \
            -p flight-scheduler \
            -p flight-rules \
            -p flight-profile \
            -p flight-units \
            -p flight-session \
            -p flight-metrics \
            -p flight-device-common \
            -p flight-hid-types \
            -p flight-adapter-common \
            -p flight-test-helpers \
            -p flight-workspace-meta

          cargo llvm-cov report --json --output-path coverage.json
          cargo llvm-cov report --lcov --output-path lcov.info
          cargo llvm-cov report --text | tee coverage.txt

      - name: Validate coverage output
        run: |
          set -euo pipefail
          test -s coverage.json
          test -s coverage.txt
          test -s lcov.info

      - name: Detect Codecov token
        id: codecov-token
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
        run: |
          if [ -n "${CODECOV_TOKEN:-}" ]; then
            echo "present=true" >> "$GITHUB_OUTPUT"
          else
            echo "present=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Upload coverage to Codecov (main)
        if: ${{ always() && github.event_name == 'push' && hashFiles('lcov.info') != '' && steps.codecov-token.outputs.present == 'true' }}
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: lcov.info
          flags: rust-core
          name: openflight-rust-core
          fail_ci_if_error: true

      - name: Upload coverage to Codecov (advisory)
        if: ${{ always() && github.event_name != 'push' && hashFiles('lcov.info') != '' && steps.codecov-token.outputs.present == 'true' }}
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: lcov.info
          flags: rust-core
          name: openflight-rust-core
          fail_ci_if_error: false

      - name: Upload coverage artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: |
            coverage.json
            coverage.txt
            lcov.info
          retention-days: 14
