# Flight Hub Release Workflow
# 
# This workflow builds, signs, and publishes release artifacts.
# Requirements: 10.1, 10.2 (Code signing)
#
# Triggers:
# - Manual dispatch with version input
# - Tag push matching v*.*.*

name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g., 1.0.0)'
        required: true
        type: string
      channel:
        description: 'Release channel'
        required: true
        type: choice
        options:
          - stable
          - beta
          - canary
        default: stable
  push:
    tags:
      - 'v*.*.*'

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  # Build Windows artifacts
  build-windows:
    name: Build Windows
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Rust
        uses: dtolnay/rust-action@stable
        with:
          toolchain: 1.89.0
      
      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-release-${{ hashFiles('**/Cargo.lock') }}
      
      - name: Build release binaries
        run: cargo build --release --workspace
      
      - name: Upload unsigned binaries
        uses: actions/upload-artifact@v4
        with:
          name: windows-binaries-unsigned
          path: |
            target/release/flightd.exe
            target/release/flightctl.exe
          retention-days: 1

  # Sign Windows artifacts
  sign-windows:
    name: Sign Windows Artifacts
    needs: build-windows
    runs-on: windows-latest
    # Only run on self-hosted runners with signing certificate
    # For public repos, this would use Azure SignTool or similar
    steps:
      - uses: actions/checkout@v4
      
      - name: Download unsigned binaries
        uses: actions/download-artifact@v4
        with:
          name: windows-binaries-unsigned
          path: binaries
      
      # Sign EXE files using signtool
      # Requirement 10.1: Sign all EXE, DLL, MSI artifacts
      - name: Sign executables
        if: ${{ vars.CODE_SIGNING_ENABLED == 'true' }}
        shell: pwsh
        run: |
          # Import certificate from secrets
          $certBytes = [Convert]::FromBase64String("${{ secrets.CODE_SIGNING_CERT }}")
          $certPath = Join-Path $env:TEMP "codesign.pfx"
          [IO.File]::WriteAllBytes($certPath, $certBytes)
          
          # Find signtool
          $signtool = Get-ChildItem -Path "C:\Program Files (x86)\Windows Kits\10\bin" -Recurse -Filter "signtool.exe" | 
                      Sort-Object { $_.Directory.Name } -Descending | 
                      Select-Object -First 1
          
          if (-not $signtool) {
            Write-Error "signtool.exe not found"
            exit 1
          }
          
          # Sign each executable
          $exeFiles = Get-ChildItem -Path "binaries" -Filter "*.exe" -Recurse
          foreach ($exe in $exeFiles) {
            Write-Host "Signing $($exe.FullName)"
            & $signtool.FullName sign /f $certPath /p "${{ secrets.CODE_SIGNING_PASSWORD }}" /tr http://timestamp.digicert.com /td sha256 /fd sha256 $exe.FullName
            if ($LASTEXITCODE -ne 0) {
              Write-Error "Failed to sign $($exe.Name)"
              exit 1
            }
          }
          
          # Clean up certificate
          Remove-Item $certPath -Force
      
      # Verify signatures
      - name: Verify signatures
        if: ${{ vars.CODE_SIGNING_ENABLED == 'true' }}
        shell: pwsh
        run: |
          $signtool = Get-ChildItem -Path "C:\Program Files (x86)\Windows Kits\10\bin" -Recurse -Filter "signtool.exe" | 
                      Sort-Object { $_.Directory.Name } -Descending | 
                      Select-Object -First 1
          
          $exeFiles = Get-ChildItem -Path "binaries" -Filter "*.exe" -Recurse
          foreach ($exe in $exeFiles) {
            Write-Host "Verifying $($exe.FullName)"
            & $signtool.FullName verify /pa $exe.FullName
            if ($LASTEXITCODE -ne 0) {
              Write-Error "Signature verification failed for $($exe.Name)"
              exit 1
            }
          }
      
      - name: Upload signed binaries
        uses: actions/upload-artifact@v4
        with:
          name: windows-binaries-signed
          path: binaries/
          retention-days: 7

  # Build Windows MSI installer
  build-msi:
    name: Build MSI Installer
    needs: sign-windows
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Download signed binaries
        uses: actions/download-artifact@v4
        with:
          name: windows-binaries-signed
          path: installer/wix/binaries
      
      - name: Install WiX Toolset
        shell: pwsh
        run: |
          dotnet tool install --global wix --version 5.0.0
      
      - name: Build MSI
        shell: pwsh
        working-directory: installer/wix
        run: |
          # Set version from tag or input
          $version = "${{ github.event.inputs.version || github.ref_name }}"
          $version = $version -replace '^v', ''
          
          # Build MSI
          wix build -o FlightHub-$version.msi Product.wxs Components.wxs -ext WixToolset.UI.wixext
      
      # Sign MSI
      - name: Sign MSI
        if: ${{ vars.CODE_SIGNING_ENABLED == 'true' }}
        shell: pwsh
        run: |
          $certBytes = [Convert]::FromBase64String("${{ secrets.CODE_SIGNING_CERT }}")
          $certPath = Join-Path $env:TEMP "codesign.pfx"
          [IO.File]::WriteAllBytes($certPath, $certBytes)
          
          $signtool = Get-ChildItem -Path "C:\Program Files (x86)\Windows Kits\10\bin" -Recurse -Filter "signtool.exe" | 
                      Sort-Object { $_.Directory.Name } -Descending | 
                      Select-Object -First 1
          
          $msiFiles = Get-ChildItem -Path "installer/wix" -Filter "*.msi"
          foreach ($msi in $msiFiles) {
            Write-Host "Signing $($msi.FullName)"
            & $signtool.FullName sign /f $certPath /p "${{ secrets.CODE_SIGNING_PASSWORD }}" /tr http://timestamp.digicert.com /td sha256 /fd sha256 $msi.FullName
          }
          
          Remove-Item $certPath -Force
      
      - name: Upload MSI
        uses: actions/upload-artifact@v4
        with:
          name: windows-msi
          path: installer/wix/*.msi
          retention-days: 30

  # Build Linux artifacts
  build-linux:
    name: Build Linux
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Rust
        uses: dtolnay/rust-action@stable
        with:
          toolchain: 1.89.0
      
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libudev-dev libdbus-1-dev
      
      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-release-${{ hashFiles('**/Cargo.lock') }}
      
      - name: Build release binaries
        run: cargo build --release --workspace
      
      - name: Upload binaries
        uses: actions/upload-artifact@v4
        with:
          name: linux-binaries
          path: |
            target/release/flightd
            target/release/flightctl
          retention-days: 7

  # Build Linux .deb package
  build-deb:
    name: Build Debian Package
    needs: build-linux
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Download binaries
        uses: actions/download-artifact@v4
        with:
          name: linux-binaries
          path: binaries
      
      - name: Set version
        id: version
        run: |
          VERSION="${{ github.event.inputs.version || github.ref_name }}"
          VERSION="${VERSION#v}"
          echo "version=$VERSION" >> $GITHUB_OUTPUT
      
      - name: Create debian package structure
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          PKG_DIR="flight-hub_${VERSION}_amd64"
          
          mkdir -p "$PKG_DIR/DEBIAN"
          mkdir -p "$PKG_DIR/usr/bin"
          mkdir -p "$PKG_DIR/etc/udev/rules.d"
          mkdir -p "$PKG_DIR/usr/share/flight-hub"
          mkdir -p "$PKG_DIR/usr/share/doc/flight-hub"
          
          # Copy binaries
          cp binaries/flightd "$PKG_DIR/usr/bin/"
          cp binaries/flightctl "$PKG_DIR/usr/bin/"
          chmod +x "$PKG_DIR/usr/bin/"*
          
          # Create control file
          cat > "$PKG_DIR/DEBIAN/control" << EOF
          Package: flight-hub
          Version: $VERSION
          Section: games
          Priority: optional
          Architecture: amd64
          Depends: libc6 (>= 2.31), libdbus-1-3
          Recommends: rtkit
          Maintainer: OpenFlight Project <contact@openflight.dev>
          Description: Flight simulation input management system
           Flight Hub provides unified control for flight controls, panels,
           and force feedback devices across MSFS, X-Plane, and DCS simulators.
          EOF
          
          # Create udev rules
          cat > "$PKG_DIR/etc/udev/rules.d/99-flight-hub.rules" << 'EOF'
          # Flight Hub udev rules
          # Allow users in 'input' group to access HID devices
          SUBSYSTEM=="hidraw", MODE="0660", GROUP="input"
          EOF
          
          # Create postinst script
          cat > "$PKG_DIR/DEBIAN/postinst" << 'EOF'
          #!/bin/bash
          set -e
          
          # Add user to input group for HID access
          if [ -n "$SUDO_USER" ]; then
              usermod -a -G input "$SUDO_USER" || true
          fi
          
          # Reload udev rules
          udevadm control --reload-rules || true
          udevadm trigger || true
          
          echo "Flight Hub installed. Please log out and back in for group changes to take effect."
          EOF
          chmod +x "$PKG_DIR/DEBIAN/postinst"
          
          # Create postrm script
          cat > "$PKG_DIR/DEBIAN/postrm" << 'EOF'
          #!/bin/bash
          set -e
          
          if [ "$1" = "purge" ]; then
              rm -f /etc/udev/rules.d/99-flight-hub.rules
              udevadm control --reload-rules || true
          fi
          EOF
          chmod +x "$PKG_DIR/DEBIAN/postrm"
          
          # Build package
          dpkg-deb --build "$PKG_DIR"
      
      - name: Upload deb package
        uses: actions/upload-artifact@v4
        with:
          name: linux-deb
          path: "*.deb"
          retention-days: 30

  # Create GitHub release
  create-release:
    name: Create Release
    needs: [build-msi, build-deb]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/') || github.event_name == 'workflow_dispatch'
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
      
      - name: Set version
        id: version
        run: |
          VERSION="${{ github.event.inputs.version || github.ref_name }}"
          VERSION="${VERSION#v}"
          echo "version=$VERSION" >> $GITHUB_OUTPUT
      
      - name: Generate release notes
        id: notes
        run: |
          # Extract changelog for this version
          VERSION="${{ steps.version.outputs.version }}"
          
          # Simple changelog extraction (improve as needed)
          if [ -f CHANGELOG.md ]; then
            # Extract section for this version
            sed -n "/## \[$VERSION\]/,/## \[/p" CHANGELOG.md | head -n -1 > release_notes.md
          else
            echo "Release $VERSION" > release_notes.md
          fi
      
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: Flight Hub v${{ steps.version.outputs.version }}
          body_path: release_notes.md
          draft: true
          prerelease: ${{ github.event.inputs.channel != 'stable' }}
          files: |
            artifacts/windows-msi/*.msi
            artifacts/linux-deb/*.deb
            artifacts/windows-binaries-signed/*.exe
            artifacts/linux-binaries/*

  # Requirement 10.2: Fail release builds if unsigned
  verify-signatures:
    name: Verify All Signatures
    needs: [build-msi, build-deb]
    runs-on: windows-latest
    if: ${{ vars.CODE_SIGNING_ENABLED == 'true' }}
    steps:
      - name: Download MSI
        uses: actions/download-artifact@v4
        with:
          name: windows-msi
          path: msi
      
      - name: Download signed binaries
        uses: actions/download-artifact@v4
        with:
          name: windows-binaries-signed
          path: binaries
      
      - name: Verify all signatures
        shell: pwsh
        run: |
          $signtool = Get-ChildItem -Path "C:\Program Files (x86)\Windows Kits\10\bin" -Recurse -Filter "signtool.exe" | 
                      Sort-Object { $_.Directory.Name } -Descending | 
                      Select-Object -First 1
          
          $allFiles = @()
          $allFiles += Get-ChildItem -Path "msi" -Filter "*.msi" -Recurse
          $allFiles += Get-ChildItem -Path "binaries" -Filter "*.exe" -Recurse
          
          $failed = $false
          foreach ($file in $allFiles) {
            Write-Host "Verifying $($file.FullName)"
            & $signtool.FullName verify /pa $file.FullName
            if ($LASTEXITCODE -ne 0) {
              Write-Error "UNSIGNED: $($file.Name)"
              $failed = $true
            }
          }
          
          if ($failed) {
            Write-Error "Release build failed: unsigned artifacts detected"
            exit 1
          }
          
          Write-Host "All artifacts are properly signed"
