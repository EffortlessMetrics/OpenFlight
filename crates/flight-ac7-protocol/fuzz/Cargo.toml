[package]
name = "flight-ac7-protocol-fuzz"
version = "0.0.0"
publish = false
edition = "2024"

[workspace]

[package.metadata]
cargo-fuzz = true

[dependencies]
libfuzzer-sys = "0.4"
flight-ac7-protocol = { path = ".." }

[[bin]]
name = "fuzz_telemetry_packet"
