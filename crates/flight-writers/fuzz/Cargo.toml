[package]
name = "flight-writers-fuzz"
version = "0.0.0"
publish = false
edition = "2021"

[workspace]

[package.metadata]
cargo-fuzz = true

[dependencies]
libfuzzer-sys = "0.4"
serde_json = "1"

[dependencies.flight-writers]
path = ".."

[profile.release]
debug = 1

[[bin]]
name = "fuzz_json_patch"
path = "fuzz_targets/fuzz_json_patch.rs"
test = false
doc = false

[[bin]]
name = "fuzz_diff_apply"
path = "fuzz_targets/fuzz_diff_apply.rs"
test = false
doc = false
