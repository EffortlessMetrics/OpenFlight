[package]
name = "flight-elite-fuzz"
version = "0.0.0"
publish = false
edition = "2021"

[workspace]

[package.metadata]
cargo-fuzz = true

[dependencies]
libfuzzer-sys = "0.4"
serde_json = "1"

[dependencies.flight-elite]
path = ".."

[profile.release]
debug = 1

[[bin]]
name = "fuzz_elite_journal"
path = "fuzz_targets/fuzz_elite_journal.rs"
test = false
doc = false
