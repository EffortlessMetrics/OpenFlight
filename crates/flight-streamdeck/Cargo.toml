[package]
homepage.workspace = true
name = "flight-streamdeck"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
authors.workspace = true
license.workspace = true
repository.workspace = true
description = "StreamDeck integration with local Web API and profiles."
readme = "README.md"
categories.workspace = true
keywords = ["flight-sim", "openflight", "streamdeck", "api"]
# SPDX License Identifier
# SPDX-License-Identifier: MIT OR Apache-2.0
# SPDX-FileCopyrightText: Copyright (c) 2024 Flight Hub Team

[dependencies]
flight-core = { path = "../flight-core" }
flight-bus = { path = "../flight-bus" }
flight-ipc = { path = "../flight-ipc" }
flight-panels = { path = "../flight-panels" }

# Web API dependencies
tokio = { workspace = true, features = ["net", "rt-multi-thread", "macros"] }
axum.workspace = true
tower.workspace = true
tower-http.workspace = true
hyper.workspace = true

# Serialization
serde = { workspace = true }
serde_json = { workspace = true }

# Error handling and logging
anyhow = { workspace = true }
thiserror = { workspace = true }
tracing = { workspace = true }

# Version handling
semver.workspace = true

# Async utilities
futures = { workspace = true }
tokio-util = { workspace = true }

# UUID generation
uuid.workspace = true

# Random number generation
fastrand.workspace = true

[dev-dependencies]
tempfile = { workspace = true }
criterion = { workspace = true }
proptest = { workspace = true }
tokio-test.workspace = true
axum-test.workspace = true
