[package]
name = "flight-warthunder-fuzz"
version = "0.0.0"
publish = false
edition = "2021"

[workspace]

[package.metadata]
cargo-fuzz = true

[dependencies]
libfuzzer-sys = "0.4"
serde_json = "1"

[dependencies.flight-warthunder]
path = ".."

[profile.release]
debug = 1

[[bin]]
name = "fuzz_wt_telemetry"
path = "fuzz_targets/fuzz_wt_telemetry.rs"
test = false
doc = false

[[bin]]
name = "fuzz_wt_convert"
path = "fuzz_targets/fuzz_wt_convert.rs"
test = false
doc = false
