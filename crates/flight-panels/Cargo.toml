[package]
homepage.workspace = true
name = "flight-panels"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
authors.workspace = true
license.workspace = true
repository.workspace = true
description = "High-level panel integration and LED control orchestration."
readme = "README.md"
categories.workspace = true
keywords = ["flight-sim", "openflight", "panels", "led"]
# SPDX License Identifier
# SPDX-License-Identifier: MIT OR Apache-2.0
# SPDX-FileCopyrightText: Copyright (c) 2024 Flight Hub Team

[features]
default = []
test-helpers = ["flight-panels-core/test-helpers"]
tests-optin = ["test-helpers"]

[dependencies]
flight-core = { path = "../flight-core" }
flight-hid = { path = "../flight-hid" }
flight-panels-core = { path = "../flight-panels-core" }
flight-panels-saitek = { path = "../flight-panels-saitek" }
flight-panels-cougar = { path = "../flight-panels-cougar" }

[dev-dependencies]
flight-panels-core = { path = "../flight-panels-core", features = ["test-helpers"] }
flight-watchdog = { path = "../flight-watchdog" }
proptest.workspace = true
tempfile.workspace = true

[[test]]
name = "cougar_integration"
required-features = ["tests-optin"]

[[test]]
name = "dsl_test"
required-features = ["tests-optin"]

[[test]]
name = "minimal_dsl_test"
required-features = ["tests-optin"]

[[test]]
name = "simple_dsl_test"
required-features = ["tests-optin"]
