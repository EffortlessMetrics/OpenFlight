[package]
name = "flight-profile-fuzz"
version = "0.0.0"
publish = false
edition = "2021"

[workspace]

[package.metadata]
cargo-fuzz = true

[dependencies]
libfuzzer-sys = "0.4"
serde_json = "1"
serde_yaml = { package = "serde_yaml_ng", version = "0.10.0" }

[dependencies.flight-profile]
path = ".."

[profile.release]
debug = 1

[[bin]]
name = "fuzz_profile_parse"
path = "fuzz_targets/fuzz_profile_parse.rs"
test = false
doc = false

[[bin]]
name = "fuzz_profile_merge"
path = "fuzz_targets/fuzz_profile_merge.rs"
test = false
doc = false

[[bin]]
name = "fuzz_profile_yaml"
path = "fuzz_targets/fuzz_profile_yaml.rs"
test = false
doc = false
