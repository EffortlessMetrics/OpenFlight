[package]
name = "flight-xplane-fuzz"
version = "0.0.0"
publish = false
edition = "2024"

[workspace]

[package.metadata]
cargo-fuzz = true

[dependencies]
libfuzzer-sys = "0.4"
serde_json = "1"

[dependencies.flight-xplane]
path = ".."

[profile.release]
debug = 1

[[bin]]
name = "fuzz_xplane_plugin_msg"
path = "fuzz_targets/fuzz_xplane_plugin_msg.rs"
test = false
doc = false

[[bin]]
name = "fuzz_xplane_dataref"
path = "fuzz_targets/fuzz_xplane_dataref.rs"
test = false
doc = false

[[bin]]
name = "fuzz_udp"
path = "fuzz_targets/fuzz_udp.rs"
test = false
doc = false

[[bin]]
name = "fuzz_data_packet"
path = "fuzz_targets/fuzz_data_packet.rs"
test = false
doc = false

[[bin]]
name = "fuzz_rref_response"
path = "fuzz_targets/fuzz_rref_response.rs"
test = false
doc = false

[[bin]]
name = "fuzz_plugin_protocol"
path = "fuzz_targets/fuzz_plugin_protocol.rs"
test = false
doc = false
