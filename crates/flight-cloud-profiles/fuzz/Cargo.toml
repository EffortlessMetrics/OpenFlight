[package]
name = "flight-cloud-profiles-fuzz"
version = "0.0.0"
publish = false
edition = "2021"

[workspace]

[package.metadata]
cargo-fuzz = true

[dependencies]
libfuzzer-sys = "0.4"
serde_json = "1"
chrono = "0.4"

[dependencies.flight-cloud-profiles]
path = ".."

[profile.release]
debug = 1

[[bin]]
name = "fuzz_cloud_profiles"
path = "fuzz_targets/fuzz_cloud_profiles.rs"
test = false
doc = false

[[bin]]
name = "fuzz_cloud_profile_parse"
path = "fuzz_targets/fuzz_cloud_profile_parse.rs"
test = false
doc = false
