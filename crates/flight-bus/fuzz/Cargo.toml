[package]
name = "flight-bus-fuzz"
version = "0.0.0"
publish = false
edition = "2021"

[workspace]

[package.metadata]
cargo-fuzz = true

[dependencies]
libfuzzer-sys = "0.4"
serde_json = "1"

[dependencies.flight-bus]
path = ".."

# Cargo automatically adds this profile for fuzz targets
[profile.release]
debug = 1

[[bin]]
name = "fuzz_bus_snapshot"
path = "fuzz_targets/fuzz_bus_snapshot.rs"
test = false
doc = false

[[bin]]
name = "fuzz_bus_event"
path = "fuzz_targets/fuzz_bus_event.rs"
test = false
doc = false
