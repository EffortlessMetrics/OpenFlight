[package]
name = "flight-core-fuzz"
version = "0.0.0"
publish = false
edition = "2021"

[workspace]

[package.metadata]
cargo-fuzz = true

[dependencies]
libfuzzer-sys = "0.4"
serde_json = "1"

[dependencies.flight-core]
path = ".."

# Cargo automatically adds this profile for fuzz targets
[profile.release]
debug = 1

[[bin]]
name = "fuzz_aircraft_type"
path = "fuzz_targets/fuzz_aircraft_type.rs"
test = false
doc = false

[[bin]]
name = "fuzz_profile_deser"
path = "fuzz_targets/fuzz_profile_deser.rs"
test = false
doc = false
