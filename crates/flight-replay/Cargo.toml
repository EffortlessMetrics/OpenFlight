[package]
name = "flight-replay"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
authors.workspace = true
license.workspace = true
repository.workspace = true
description = "Offline replay harness for recorded OpenFlight runs."
readme = "README.md"
keywords = ["flight-sim", "openflight", "replay", "testing"]
# SPDX License Identifier
# SPDX-License-Identifier: MIT OR Apache-2.0
# SPDX-FileCopyrightText: Copyright (c) 2024 Flight Hub Team

[dependencies]
flight-core = { path = "../flight-core" }
flight-axis = { path = "../flight-axis", features = ["serde"] }
flight-ffb = { path = "../flight-ffb" }
flight-bus = { path = "../flight-bus" }
serde = { workspace = true, features = ["derive"] }
serde_json.workspace = true
anyhow.workspace = true
thiserror.workspace = true
tracing.workspace = true
tokio = { workspace = true, features = ["time"] }
postcard.workspace = true

[dev-dependencies]
tempfile.workspace = true
criterion.workspace = true
proptest.workspace = true
tracing-subscriber.workspace = true

[[bench]]
name = "replay_performance"
harness = false
required-features = ["benches-optin"]

[features]
default = []
validation-suite = []  # Enable comprehensive validation features
benches-optin = []
