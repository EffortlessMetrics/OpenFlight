[package]
name = "flight-panels-goflight-fuzz"
version = "0.0.0"
publish = false
edition = "2021"

[workspace]

[package.metadata]
cargo-fuzz = true

[dependencies]
libfuzzer-sys = "0.4"

[dependencies.flight-panels-goflight]
path = ".."

# Cargo automatically adds this profile for fuzz targets
[profile.release]
debug = 1

[[bin]]
name = "fuzz_goflight_report"
path = "fuzz_targets/fuzz_goflight_report.rs"
test = false
doc = false
