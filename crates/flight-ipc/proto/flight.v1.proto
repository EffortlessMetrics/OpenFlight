syntax = "proto3";

package flight.v1;

// Core flight service
service FlightService {
  // Feature negotiation - must be called first
  rpc NegotiateFeatures(NegotiateFeaturesRequest) returns (NegotiateFeaturesResponse);
  
  // Device management
  rpc ListDevices(ListDevicesRequest) returns (ListDevicesResponse);
  
  // Health monitoring
  rpc HealthSubscribe(HealthSubscribeRequest) returns (stream HealthEvent);
  
  // Profile management
  rpc ApplyProfile(ApplyProfileRequest) returns (ApplyProfileResponse);
  
  // Curve conflict detection and resolution
  rpc DetectCurveConflicts(DetectCurveConflictsRequest) returns (DetectCurveConflictsResponse);
  rpc ResolveCurveConflict(ResolveCurveConflictRequest) returns (ResolveCurveConflictResponse);
  rpc OneClickResolve(OneClickResolveRequest) returns (OneClickResolveResponse);
  
  // Capability management
  rpc SetCapabilityMode(SetCapabilityModeRequest) returns (SetCapabilityModeResponse);
  rpc GetCapabilityMode(GetCapabilityModeRequest) returns (GetCapabilityModeResponse);
  
  // Service health
  rpc GetServiceInfo(GetServiceInfoRequest) returns (GetServiceInfoResponse);
  
  // Profile listing and activation
  rpc ListProfiles(ListProfilesRequest) returns (ListProfilesResponse);
  rpc GetActiveProfile(GetActiveProfileRequest) returns (GetActiveProfileResponse);

  // Simulator adapter management
  rpc ListAdapters(ListAdaptersRequest) returns (ListAdaptersResponse);
  rpc EnableAdapter(EnableAdapterRequest) returns (EnableAdapterResponse);
  rpc DisableAdapter(DisableAdapterRequest) returns (DisableAdapterResponse);

  // Streaming subscriptions
  rpc SubscribeDeviceEvents(SubscribeDeviceEventsRequest) returns (stream DeviceEvent);
  rpc SubscribeTelemetry(SubscribeTelemetryRequest) returns (stream TelemetryEvent);

  // Security and privacy
  rpc GetSecurityStatus(GetSecurityStatusRequest) returns (GetSecurityStatusResponse);
  rpc ConfigureTelemetry(ConfigureTelemetryRequest) returns (ConfigureTelemetryResponse);
  rpc GetSupportBundle(GetSupportBundleRequest) returns (GetSupportBundleResponse);
}

// Feature negotiation
message NegotiateFeaturesRequest {
  string client_version = 1;
  repeated string supported_features = 2;
  TransportType preferred_transport = 3;
}

message NegotiateFeaturesResponse {
  bool success = 1;
  string server_version = 2;
  repeated string enabled_features = 3;
  TransportType negotiated_transport = 4;
  string error_message = 5;
}

enum TransportType {
  TRANSPORT_TYPE_UNSPECIFIED = 0;
  TRANSPORT_TYPE_NAMED_PIPES = 1;  // Windows
  TRANSPORT_TYPE_UNIX_SOCKETS = 2; // Linux/macOS
}

// Service information
message GetServiceInfoRequest {}

message GetServiceInfoResponse {
  string version = 1;
  int64 uptime_seconds = 2;
  ServiceStatus status = 3;
  map<string, string> capabilities = 4;
}

enum ServiceStatus {
  SERVICE_STATUS_UNSPECIFIED = 0;
  SERVICE_STATUS_STARTING = 1;
  SERVICE_STATUS_RUNNING = 2;
  SERVICE_STATUS_DEGRADED = 3;
  SERVICE_STATUS_STOPPING = 4;
}

// Device management
message ListDevicesRequest {
  bool include_disconnected = 1;
  repeated DeviceType filter_types = 2;
}

message ListDevicesResponse {
  repeated Device devices = 1;
  int32 total_count = 2;
}

message Device {
  string id = 1;
  string name = 2;
  DeviceType type = 3;
  DeviceStatus status = 4;
  DeviceCapabilities capabilities = 5;
  DeviceHealth health = 6;
  map<string, string> metadata = 7;
}

message DeviceCapabilities {
  bool supports_force_feedback = 1;
  bool supports_raw_torque = 2;
  uint32 max_torque_nm = 3;
  uint32 min_period_us = 4;
  bool has_health_stream = 5;
  repeated string supported_protocols = 6;
}

message DeviceHealth {
  float temperature_celsius = 1;
  float current_amperes = 2;
  uint32 packet_loss_count = 3;
  int64 last_seen_timestamp = 4;
  repeated string active_faults = 5;
}

enum DeviceType {
  DEVICE_TYPE_UNSPECIFIED = 0;
  DEVICE_TYPE_JOYSTICK = 1;
  DEVICE_TYPE_THROTTLE = 2;
  DEVICE_TYPE_RUDDER = 3;
  DEVICE_TYPE_PANEL = 4;
  DEVICE_TYPE_FORCE_FEEDBACK = 5;
  DEVICE_TYPE_STREAMDECK = 6;
}

enum DeviceStatus {
  DEVICE_STATUS_UNSPECIFIED = 0;
  DEVICE_STATUS_CONNECTED = 1;
  DEVICE_STATUS_DISCONNECTED = 2;
  DEVICE_STATUS_ERROR = 3;
  DEVICE_STATUS_FAULTED = 4;
}

// Health monitoring
message HealthSubscribeRequest {
  repeated HealthEventType filter_types = 1;
  repeated string device_ids = 2; // Empty = all devices
  bool include_performance_metrics = 3;
}

message HealthEvent {
  int64 timestamp = 1;
  HealthEventType type = 2;
  string message = 3;
  string device_id = 4;
  string error_code = 5; // Stable error codes for KB lookup
  map<string, string> metadata = 6;
  PerformanceMetrics performance = 7;
}

message PerformanceMetrics {
  float jitter_p99_ms = 1;
  float hid_latency_p99_us = 2;
  uint32 missed_ticks = 3;
  uint32 dropped_frames = 4;
  float cpu_usage_percent = 5;
  uint64 memory_usage_bytes = 6;
}

enum HealthEventType {
  HEALTH_EVENT_TYPE_UNSPECIFIED = 0;
  HEALTH_EVENT_TYPE_INFO = 1;
  HEALTH_EVENT_TYPE_WARNING = 2;
  HEALTH_EVENT_TYPE_ERROR = 3;
  HEALTH_EVENT_TYPE_FAULT = 4;
  HEALTH_EVENT_TYPE_PERFORMANCE = 5;
  HEALTH_EVENT_TYPE_CURVE_CONFLICT = 6;
  HEALTH_EVENT_TYPE_CURVE_RESOLUTION = 7;
}

// Profile management
message ApplyProfileRequest {
  string profile_json = 1;
  bool validate_only = 2;
  bool force_apply = 3; // Skip safety checks (for testing)
}

message ApplyProfileResponse {
  bool success = 1;
  string error_message = 2;
  repeated ValidationError validation_errors = 3;
  string effective_profile_hash = 4;
  int64 compile_time_ms = 5;
}

message ValidationError {
  string field_path = 1;
  uint32 line_number = 2;
  uint32 column_number = 3;
  string error_message = 4;
  ValidationErrorType error_type = 5;
}

enum ValidationErrorType {
  VALIDATION_ERROR_TYPE_UNSPECIFIED = 0;
  VALIDATION_ERROR_TYPE_SCHEMA = 1;
  VALIDATION_ERROR_TYPE_MONOTONIC = 2;
  VALIDATION_ERROR_TYPE_RANGE = 3;
  VALIDATION_ERROR_TYPE_CONFLICT = 4;
}

// Curve conflict detection and resolution
message DetectCurveConflictsRequest {
  repeated string axis_names = 1; // Empty = all axes
  string sim_id = 2; // Current simulator
  string aircraft_id = 3; // Current aircraft
}

message DetectCurveConflictsResponse {
  bool success = 1;
  repeated CurveConflict conflicts = 2;
  string error_message = 3;
}

message CurveConflict {
  string axis_name = 1;
  ConflictType conflict_type = 2;
  ConflictSeverity severity = 3;
  string description = 4;
  repeated ConflictResolution suggested_resolutions = 5;
  ConflictMetadata metadata = 6;
}

message ConflictMetadata {
  float sim_curve_strength = 1; // 0.0-1.0, detected non-linearity
  float profile_curve_strength = 2; // 0.0-1.0, profile curve strength
  float combined_nonlinearity = 3; // 0.0-1.0, total system non-linearity
  repeated float test_inputs = 4; // Input values used for detection
  repeated float expected_outputs = 5; // Expected linear outputs
  repeated float actual_outputs = 6; // Actual measured outputs
  int64 detection_timestamp = 7;
}

enum ConflictType {
  CONFLICT_TYPE_UNSPECIFIED = 0;
  CONFLICT_TYPE_DOUBLE_CURVE = 1; // Both sim and profile have curves
  CONFLICT_TYPE_EXCESSIVE_NONLINEARITY = 2; // Combined effect too strong
  CONFLICT_TYPE_OPPOSING_CURVES = 3; // Curves work against each other
}

enum ConflictSeverity {
  CONFLICT_SEVERITY_UNSPECIFIED = 0;
  CONFLICT_SEVERITY_LOW = 1; // Detectable but minor impact
  CONFLICT_SEVERITY_MEDIUM = 2; // Noticeable impact on control
  CONFLICT_SEVERITY_HIGH = 3; // Significant control issues
  CONFLICT_SEVERITY_CRITICAL = 4; // Unusable control response
}

message ConflictResolution {
  ResolutionType resolution_type = 1;
  string description = 2;
  ResolutionAction action = 3;
  float estimated_improvement = 4; // 0.0-1.0, expected improvement
  bool requires_sim_restart = 5;
}

enum ResolutionType {
  RESOLUTION_TYPE_UNSPECIFIED = 0;
  RESOLUTION_TYPE_DISABLE_SIM_CURVE = 1;
  RESOLUTION_TYPE_DISABLE_PROFILE_CURVE = 2;
  RESOLUTION_TYPE_APPLY_GAIN_COMPENSATION = 3;
  RESOLUTION_TYPE_REDUCE_CURVE_STRENGTH = 4;
}

message ResolutionAction {
  ResolutionType type = 1;
  map<string, string> parameters = 2; // Type-specific parameters
  repeated string affected_files = 3; // Files that will be modified
  string backup_info = 4; // Backup/rollback information
}

message ResolveCurveConflictRequest {
  string axis_name = 1;
  ResolutionAction resolution = 2;
  bool apply_immediately = 3;
  bool create_backup = 4;
}

message ResolveCurveConflictResponse {
  bool success = 1;
  string error_message = 2;
  ResolutionResult result = 3;
}

message ResolutionResult {
  ResolutionType applied_resolution = 1;
  repeated string modified_files = 2;
  string backup_path = 3;
  ConflictMetadata before_metrics = 4;
  ConflictMetadata after_metrics = 5;
  bool verification_passed = 6;
  string verification_details = 7;
}

// One-click resolution
message OneClickResolveRequest {
  string axis_name = 1;
  bool create_backup = 2; // Optional: override default backup behavior
  bool verify_resolution = 3; // Optional: override default verification behavior
}

message OneClickResolveResponse {
  bool success = 1;
  string error_message = 2;
  OneClickResult result = 3;
}

message OneClickResult {
  ResolutionType resolution_type = 1;
  repeated string modified_files = 2;
  BackupInfo backup_info = 3;
  VerificationOutcome verification = 4;
  ResolutionMetrics metrics = 5;
  repeated ResolutionStep steps_performed = 6;
}

message BackupInfo {
  uint64 timestamp = 1;
  string description = 2;
  repeated string affected_files = 3;
  string backup_dir = 4;
  string writer_config = 5;
}

message VerificationOutcome {
  bool passed = 1;
  string details = 2;
  uint64 duration_ms = 3;
  bool conflict_resolved = 4;
}

message ResolutionMetrics {
  ConflictMetrics before = 1;
  ConflictMetrics after = 2;
  float improvement = 3; // 0.0-1.0, percentage improvement
}

message ConflictMetrics {
  float nonlinearity = 1; // 0.0-1.0
  float sim_curve_strength = 2; // 0.0-1.0
  float profile_curve_strength = 3; // 0.0-1.0
  int64 timestamp = 4;
}

message ResolutionStep {
  string name = 1;
  string description = 2;
  bool success = 3;
  uint64 duration_ms = 4;
  string error = 5; // Optional error message
}

// Capability management
message SetCapabilityModeRequest {
  CapabilityMode mode = 1;
  repeated string axis_names = 2; // Empty = all axes
  bool audit_enabled = 3; // Enable audit logging for clamped outputs
}

message SetCapabilityModeResponse {
  bool success = 1;
  string error_message = 2;
  repeated string affected_axes = 3;
  CapabilityLimits applied_limits = 4;
}

message GetCapabilityModeRequest {
  repeated string axis_names = 1; // Empty = all axes
}

message GetCapabilityModeResponse {
  bool success = 1;
  string error_message = 2;
  repeated AxisCapabilityStatus axis_status = 3;
}

message AxisCapabilityStatus {
  string axis_name = 1;
  CapabilityMode mode = 2;
  CapabilityLimits limits = 3;
  bool audit_enabled = 4;
  uint64 clamp_events_count = 5; // Number of times output was clamped
  int64 last_clamp_timestamp = 6; // Last time output was clamped
}

enum CapabilityMode {
  CAPABILITY_MODE_UNSPECIFIED = 0;
  CAPABILITY_MODE_FULL = 1;        // Full capabilities - no restrictions
  CAPABILITY_MODE_DEMO = 2;        // Demo mode - reduced limits for safety
  CAPABILITY_MODE_KID = 3;         // Kid mode - heavily restricted for safety
}

message CapabilityLimits {
  float max_axis_output = 1;       // Maximum axis output magnitude (0.0-1.0)
  float max_ffb_torque = 2;        // Maximum force feedback torque (Nm)
  float max_slew_rate = 3;         // Maximum slew rate (units/second)
  float max_curve_expo = 4;        // Maximum curve expo magnitude
  bool allow_high_torque = 5;      // Whether high torque mode is allowed
  bool allow_custom_curves = 6;    // Whether custom curves are allowed
}

// Security and privacy management
message GetSecurityStatusRequest {}

message GetSecurityStatusResponse {
  bool success = 1;
  string error_message = 2;
  repeated PluginInfo plugins = 3;
  bool telemetry_enabled = 4;
  repeated string telemetry_data_types = 5;
}

message PluginInfo {
  string name = 1;
  string version = 2;
  PluginType plugin_type = 3;
  string signature_status = 4; // Human-readable signature status
  repeated string capabilities = 5;
}

enum PluginType {
  PLUGIN_TYPE_UNSPECIFIED = 0;
  PLUGIN_TYPE_WASM = 1;
  PLUGIN_TYPE_NATIVE = 2;
}

message ConfigureTelemetryRequest {
  bool enabled = 1;
  repeated string data_types = 2; // Performance, Errors, Usage, DeviceEvents, ProfileEvents
}

message ConfigureTelemetryResponse {
  bool success = 1;
  string error_message = 2;
}

message GetSupportBundleRequest {}

message GetSupportBundleResponse {
  bool success = 1;
  string error_message = 2;
  string redacted_data = 3; // JSON string with redacted support data
  uint64 bundle_size_bytes = 4;
}

// Profile listing
message ListProfilesRequest {
  bool include_inactive = 1;
}

message ListProfilesResponse {
  bool success = 1;
  repeated ProfileSummary profiles = 2;
  string error_message = 3;
}

message ProfileSummary {
  string name = 1;
  bool active = 2;
  string aircraft = 3; // Empty if not bound to an aircraft
  string path = 4;     // File path on disk
}

message GetActiveProfileRequest {}

message GetActiveProfileResponse {
  bool success = 1;
  string profile_name = 2; // Empty if no profile is active
  string error_message = 3;
}

// Adapter management
message ListAdaptersRequest {}

message ListAdaptersResponse {
  bool success = 1;
  repeated AdapterInfo adapters = 2;
  string error_message = 3;
}

message AdapterInfo {
  string sim_id = 1;
  string display_name = 2;
  bool enabled = 3;
  AdapterState state = 4;
  string version = 5;       // Detected sim version, if connected
  string error_message = 6; // Last error, if any
}

enum AdapterState {
  ADAPTER_STATE_UNSPECIFIED = 0;
  ADAPTER_STATE_DISCONNECTED = 1;
  ADAPTER_STATE_CONNECTING = 2;
  ADAPTER_STATE_CONNECTED = 3;
  ADAPTER_STATE_ERROR = 4;
}

message EnableAdapterRequest {
  string sim_id = 1;
}

message EnableAdapterResponse {
  bool success = 1;
  string error_message = 2;
}

message DisableAdapterRequest {
  string sim_id = 1;
}

message DisableAdapterResponse {
  bool success = 1;
  string error_message = 2;
}

// Device event streaming
message SubscribeDeviceEventsRequest {
  repeated string device_ids = 1;     // Empty = all devices
  repeated DeviceEventType filter = 2; // Empty = all event types
}

message DeviceEvent {
  int64 timestamp = 1;
  string device_id = 2;
  DeviceEventType event_type = 3;
  string message = 4;
  map<string, string> metadata = 5;
}

enum DeviceEventType {
  DEVICE_EVENT_TYPE_UNSPECIFIED = 0;
  DEVICE_EVENT_TYPE_CONNECTED = 1;
  DEVICE_EVENT_TYPE_DISCONNECTED = 2;
  DEVICE_EVENT_TYPE_INPUT = 3;
  DEVICE_EVENT_TYPE_ERROR = 4;
  DEVICE_EVENT_TYPE_CALIBRATION = 5;
}

// Telemetry streaming
message SubscribeTelemetryRequest {
  uint32 min_interval_ms = 1; // Minimum interval between updates (0 = every tick)
  repeated string fields = 2; // Empty = all fields
}

message TelemetryEvent {
  int64 timestamp = 1;
  string sim_id = 2;
  double altitude_ft = 3;
  double airspeed_kts = 4;
  double heading_deg = 5;
  double vertical_speed_fpm = 6;
  map<string, double> custom_fields = 7;
}