[package]
homepage.workspace = true
name = "flight-ipc"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
authors.workspace = true
license.workspace = true
repository.workspace = true
description = "Cross-platform gRPC IPC layer for OpenFlight components."
readme = "README.md"
categories.workspace = true
keywords = ["flight-sim", "openflight", "ipc", "grpc"]
# SPDX License Identifier
# SPDX-License-Identifier: MIT OR Apache-2.0
# SPDX-FileCopyrightText: Copyright (c) 2024 Flight Hub Team

[features]
default = []
# Platform-specific transport layers
named-pipes = ["tokio/net"]  # Windows named pipe transport
unix-sockets = ["tokio/net"]  # Unix domain socket transport
# Component features
client = []  # Enable client-side functionality
server = []  # Enable server-side functionality
# Development-only features (not for production use)
ipc-bench = []  # Enable IPC benchmarks for performance testing
ipc-bench-serde = []  # Enable JSON roundtrip benchmarks (requires ipc-bench; serde_json already available)
ipc-examples = []  # Enable example programs
ipc-tests = []  # Enable integration tests

[dependencies]
prost.workspace = true
tonic.workspace = true
tokio = { workspace = true, features = ["net", "rt-multi-thread", "macros"] }
anyhow.workspace = true
thiserror.workspace = true
serde = { workspace = true, features = ["derive"] }
serde_json.workspace = true  # Required by library error types
tracing.workspace = true
tokio-stream = { workspace = true, features = ["sync"] }
futures-core = { workspace = true }
flight-core = { path = "../flight-core" }
flight-hid = { path = "../flight-hid" }

# Platform-specific dependencies
[target.'cfg(windows)'.dependencies]
windows = { workspace = true, features = [
    "Win32_System_Pipes",
    "Win32_Storage_FileSystem",
    "Win32_Foundation"
] }

[target.'cfg(unix)'.dependencies]
nix.workspace = true
libc.workspace = true

[build-dependencies]
tonic-build.workspace = true
prost-build.workspace = true

[dev-dependencies]
tokio-test.workspace = true
tempfile.workspace = true
criterion.workspace = true
chrono.workspace = true
tokio-stream = { workspace = true, features = ["sync"] }
tracing-subscriber.workspace = true
proptest.workspace = true

[[bench]]
name = "ipc_benchmarks"
harness = false
required-features = ["ipc-bench"]

[[example]]
name = "list_devices"
required-features = ["ipc-examples"]

[[example]]
name = "health_subscribe"
required-features = ["ipc-examples"]

[[test]]
name = "integration_tests"
required-features = ["ipc-tests"]
