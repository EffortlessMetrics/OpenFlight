[package]
name = "flight-ipc"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
authors.workspace = true
license.workspace = true
repository.workspace = true

# SPDX License Identifier
# SPDX-License-Identifier: MIT OR Apache-2.0
# SPDX-FileCopyrightText: Copyright (c) 2024 Flight Hub Team

[features]
default = ["named-pipes", "unix-sockets"]
named-pipes = ["tokio/net"]
unix-sockets = ["tokio/net"]
client = []
server = []
ipc-bench = []
ipc-bench-serde = []  # Enable JSON benchmarks with serde
ipc-examples = []
ipc-tests = []

[dependencies]
prost.workspace = true
tonic.workspace = true
tokio = { workspace = true, features = ["net", "rt-multi-thread", "macros"] }
anyhow.workspace = true
thiserror.workspace = true
serde = { workspace = true, features = ["derive"] }
serde_json.workspace = true
tracing.workspace = true
tokio-stream = { workspace = true, features = ["sync"] }
futures-core = { workspace = true }
flight-core = { path = "../flight-core" }

# Platform-specific dependencies
[target.'cfg(windows)'.dependencies]
windows = { workspace = true, features = [
    "Win32_System_Pipes",
    "Win32_Storage_FileSystem",
    "Win32_Foundation"
] }

[target.'cfg(unix)'.dependencies]
nix.workspace = true
libc.workspace = true

[build-dependencies]
tonic-build.workspace = true
prost-build.workspace = true

[dev-dependencies]
tokio-test = "0.4"
tempfile.workspace = true
criterion.workspace = true
chrono = "0.4"
tokio-stream = { workspace = true, features = ["sync"] }
tracing-subscriber.workspace = true

[[bench]]
name = "ipc_benchmarks"
harness = false
required-features = ["ipc-bench"]

[[example]]
name = "list_devices"
required-features = ["ipc-examples"]

[[example]]
name = "health_subscribe"
required-features = ["ipc-examples"]

[[test]]
name = "integration_tests"
required-features = ["ipc-tests"]
