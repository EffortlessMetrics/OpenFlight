[package]
name = "flight-ipc-fuzz"
version = "0.0.0"
publish = false
edition = "2024"

[workspace]

[package.metadata]
cargo-fuzz = true

[dependencies]
libfuzzer-sys = "0.4"
flight-ipc = { path = ".." }
prost = "0.14"

[[bin]]
name = "fuzz_ipc_packet"
path = "fuzz_targets/fuzz_ipc_packet.rs"
test = false
doc = false

[[bin]]
name = "fuzz_ipc_message"
path = "fuzz_targets/fuzz_ipc_message.rs"
test = false
doc = false

[[bin]]
name = "fuzz_version_parse"
path = "fuzz_targets/fuzz_version_parse.rs"
test = false
doc = false

[[bin]]
name = "fuzz_message_decode"
path = "fuzz_targets/fuzz_message_decode.rs"
test = false
doc = false
