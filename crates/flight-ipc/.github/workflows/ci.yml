name: Flight IPC CI

on:
  push:
    branches: [ main, develop ]
    paths:
      - 'crates/flight-ipc/**'
      - '.github/workflows/flight-ipc-ci.yml'
  pull_request:
    branches: [ main ]
    paths:
      - 'crates/flight-ipc/**'

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    name: Test Suite
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]
        rust: [stable, beta]
        
    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0  # Need full history for breaking change detection
        
    - name: Install Rust
      uses: dtolnay/rust-toolchain@master
      with:
        toolchain: ${{ matrix.rust }}
        components: rustfmt, clippy
        
    - name: Cache dependencies
      uses: actions/cache@v3
      with:
        path: |
          ~/.cargo/registry
          ~/.cargo/git
          target
        key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
        
    - name: Check formatting
      run: cargo fmt --all -- --check
      working-directory: crates/flight-ipc
      
    - name: Run clippy
      run: cargo clippy --all-targets --all-features -- -D warnings
      working-directory: crates/flight-ipc
      
    - name: Run tests
      run: cargo test --all-features
      working-directory: crates/flight-ipc
      
    - name: Run integration tests
      run: cargo test --test integration_tests
      working-directory: crates/flight-ipc
      
    - name: Build examples
      run: |
        cargo build --example list_devices
        cargo build --example health_subscribe
      working-directory: crates/flight-ipc

  breaking-changes:
    name: Check Breaking Changes
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    
    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0
        
    - name: Install Rust
      uses: dtolnay/rust-toolchain@nightly
      
    - name: Get base proto file
      run: |
        git show origin/main:crates/flight-ipc/proto/flight.v1.proto > /tmp/old-proto.proto || echo "No base proto file found"
        
    - name: Check for breaking changes
      run: |
        if [ -f /tmp/old-proto.proto ]; then
          cargo +nightly -Zscript crates/flight-ipc/scripts/check-breaking-changes.rs /tmp/old-proto.proto crates/flight-ipc/proto/flight.v1.proto
        else
          echo "No base proto file to compare against - skipping breaking change check"
        fi

  feature-matrix:
    name: Feature Matrix Test
    runs-on: ubuntu-latest
    
    strategy:
      matrix:
        features:
          - "default"
          - "named-pipes"
          - "unix-sockets"
          - "client"
          - "server"
          - "client,server"
          
    steps:
    - uses: actions/checkout@v4
      
    - name: Install Rust
      uses: dtolnay/rust-toolchain@stable
      
    - name: Test feature combination
      run: |
        if [ "${{ matrix.features }}" = "default" ]; then
          cargo test --no-default-features
        else
          cargo test --no-default-features --features "${{ matrix.features }}"
        fi
      working-directory: crates/flight-ipc

  docs:
    name: Documentation
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
      
    - name: Install Rust
      uses: dtolnay/rust-toolchain@stable
      
    - name: Build documentation
      run: cargo doc --all-features --no-deps
      working-directory: crates/flight-ipc
      
    - name: Check documentation links
      run: cargo doc --all-features --no-deps --document-private-items
      working-directory: crates/flight-ipc

  security:
    name: Security Audit
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
      
    - name: Install cargo-audit
      run: cargo install cargo-audit
      
    - name: Run security audit
      run: cargo audit
      working-directory: crates/flight-ipc

  performance:
    name: Performance Benchmarks
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
      
    - name: Install Rust
      uses: dtolnay/rust-toolchain@stable
      
    - name: Run benchmarks
      run: cargo bench --all-features
      working-directory: crates/flight-ipc
      
    - name: Store benchmark results
      uses: benchmark-action/github-action-benchmark@v1
      if: github.ref == 'refs/heads/main'
      with:
        tool: 'cargo'
        output-file-path: crates/flight-ipc/target/criterion/report/index.html
        github-token: ${{ secrets.GITHUB_TOKEN }}
        auto-push: true