[package]
homepage.workspace = true
name = "flight-updater"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
authors.workspace = true
license.workspace = true
repository.workspace = true
description = "Signed update system with channels, deltas, and rollback."
readme = "README.md"
categories.workspace = true
keywords = ["flight-sim", "openflight", "updater", "rollback"]
# SPDX License Identifier
# SPDX-License-Identifier: MIT OR Apache-2.0
# SPDX-FileCopyrightText: Copyright (c) 2024 Flight Hub Team

[features]
default = []
docs-validator = ["dep:clap"]

[[bin]]
name = "docs-validator"
path = "src/bin/docs-validator.rs"
required-features = ["docs-validator"]

[dependencies]
# Core dependencies
tokio = { workspace = true, features = ["fs", "process", "time"] }
serde = { workspace = true }
serde_json = { workspace = true }
anyhow = { workspace = true }
thiserror = { workspace = true }
tracing = { workspace = true }

# Crypto and signatures
ed25519-dalek.workspace = true
rand_core.workspace = true
sha2.workspace = true
hex.workspace = true

# HTTP client for updates
reqwest = { workspace = true }

# File system operations
tempfile = { workspace = true }
dirs.workspace = true

# Compression for delta updates
flate2.workspace = true
tar.workspace = true

# CLI for docs-validator binary (optional)
clap = { workspace = true, optional = true }

# Platform-specific dependencies
[target.'cfg(windows)'.dependencies]
windows = { workspace = true, features = [
    "Win32_System_Registry",
    "Win32_System_Services",
    "Win32_Foundation"
] }

[target.'cfg(unix)'.dependencies]
nix = { workspace = true }

[dev-dependencies]
criterion = { workspace = true }
proptest = { workspace = true }
tempfile = { workspace = true }

[[bench]]
name = "delta_apply"
harness = false
