[package]
homepage.workspace = true
name = "flight-hid"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
authors.workspace = true
license.workspace = true
repository.workspace = true
description = "HID device management and OFP-1 protocol support for OpenFlight."
readme = "README.md"
categories.workspace = true
keywords = ["flight-sim", "openflight", "hid", "hardware"]
# SPDX License Identifier
# SPDX-License-Identifier: MIT OR Apache-2.0
# SPDX-FileCopyrightText: Copyright (c) 2024 Flight Hub Team

[features]
default = []
# Development-only features (not for production use)
ofp1-tests = [] # Enable Clone/Copy derives for external integration tests

[dependencies]
flight-core = { path = "../flight-core" }
flight-watchdog = { path = "../flight-watchdog" }
flight-metrics = { path = "../flight-metrics" }
flight-hid-support = { path = "../flight-hid-support" }
tracing.workspace = true
serde.workspace = true
thiserror.workspace = true
hidapi.workspace = true

[target.'cfg(windows)'.dependencies]
windows = { workspace = true, features = [
    "Win32_Foundation",
    "Win32_Security",
    "Win32_Storage_FileSystem",
    "Win32_System_IO",
    "Win32_System_Performance",
] }

[dev-dependencies]
flight-watchdog = { path = "../flight-watchdog" }
tokio = { workspace = true, features = ["test-util"] }
proptest.workspace = true
