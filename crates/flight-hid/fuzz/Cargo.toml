[package]
name = "flight-hid-fuzz"
version = "0.0.0"
edition = "2024"
publish = false

[workspace]

[package.metadata]
cargo-fuzz = true

[dependencies]
libfuzzer-sys = "0.4"

[dependencies.flight-hid]
path = ".."

[profile.release]
debug = 1

[[bin]]
name = "fuzz_hid_descriptor"
path = "fuzz_targets/fuzz_hid_descriptor.rs"
test = false
doc = false

[[bin]]
name = "fuzz_descriptor"
path = "fuzz_targets/fuzz_descriptor.rs"
test = false
doc = false
