[package]
name = "flight-simconnect"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
authors.workspace = true
license.workspace = true
repository.workspace = true

# SPDX License Identifier
# SPDX-License-Identifier: MIT OR Apache-2.0
# SPDX-FileCopyrightText: Copyright (c) 2024 Flight Hub Team

[dependencies]
flight-core = { path = "../flight-core" }
flight-bus = { path = "../flight-bus" }
flight-adapter-common = { path = "../flight-adapter-common" }
flight-simconnect-sys = { path = "../flight-simconnect-sys" }
tokio = { workspace = true }
serde = { workspace = true, optional = true }
serde_json = { workspace = true }
anyhow = { workspace = true }
thiserror = { workspace = true }
tracing = { workspace = true }
crossbeam = { workspace = true }
regex = "1.12.2"
futures = { workspace = true }

[target.'cfg(windows)'.dependencies]
windows = { version = "0.62.2", features = [
    "Win32_System_Threading",
    "Win32_Foundation", 
    "Win32_System_Diagnostics_ToolHelp",
    "Win32_System_ProcessStatus"
] }

[features]
default = []
serde = ["dep:serde"]
fixtures-tests = []
integration-tests = []

[dev-dependencies]
tempfile = { workspace = true }
proptest = { workspace = true }

[[test]]
name = "integration_tests"
required-features = ["integration-tests", "serde"]
