[package]
name = "flight-simconnect-fuzz"
version = "0.0.0"
publish = false
edition = "2024"

[workspace]

[package.metadata]
cargo-fuzz = true

[dependencies]
libfuzzer-sys = "0.4"
serde_json = "1"

[dependencies.flight-simconnect]
path = ".."
features = ["serde"]

[profile.release]
debug = 1

[[bin]]
name = "fuzz_simconnect_fixture"
path = "fuzz_targets/fuzz_simconnect_fixture.rs"
test = false
doc = false

[[bin]]
name = "fuzz_weather_simvars"
path = "fuzz_targets/fuzz_weather_simvars.rs"
test = false
doc = false

[[bin]]
name = "fuzz_engine_params"
path = "fuzz_targets/fuzz_engine_params.rs"
test = false
doc = false
