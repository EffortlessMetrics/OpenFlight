[package]
homepage.workspace = true
name = "flight-service"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
authors.workspace = true
license.workspace = true
repository.workspace = true
description = "Main OpenFlight service library and daemon entry point."
readme = "README.md"
categories.workspace = true
keywords = ["flight-sim", "openflight", "service", "daemon"]
# SPDX License Identifier
# SPDX-License-Identifier: MIT OR Apache-2.0
# SPDX-FileCopyrightText: Copyright (c) 2024 Flight Hub Team

[[bin]]
name = "flightd"
path = "src/main.rs"

[features]
default = []
# Enables a real HID-backed T.Flight report source.
# Requires a connected T.Flight HOTAS 4 (or compatible) device.
# CI builds should NOT enable this feature — use the default simulated source.
tflight-hidapi = ["dep:hidapi"]
# Enables a real HID-backed VKB STECS report source.
# Requires a connected VKB STECS device.
# CI builds should NOT enable this feature — use the default simulated source.
stecs-hidapi = ["dep:hidapi"]

[dependencies]
flight-core = { path = "../flight-core" }
flight-ipc = { path = "../flight-ipc" }
flight-axis = { path = "../flight-axis" }
flight-scheduler = { path = "../flight-scheduler" }
flight-bus = { path = "../flight-bus" }
flight-xplane = { path = "../flight-xplane" }
flight-dcs-export = { path = "../flight-dcs-export" }
flight-ac7-telemetry = { path = "../flight-ac7-telemetry" }
flight-hotas-thrustmaster = { path = "../flight-hotas-thrustmaster" }
flight-hotas-vkb = { path = "../flight-hotas-vkb" }
flight-hid-support = { path = "../flight-hid-support" }
hidapi = { workspace = true, optional = true }
tokio.workspace = true
tracing.workspace = true
tracing-subscriber.workspace = true
anyhow.workspace = true
parking_lot.workspace = true
serde.workspace = true
serde_json.workspace = true
clap.workspace = true

[target.'cfg(windows)'.dependencies]
flight-simconnect = { path = "../flight-simconnect" }

[target.'cfg(target_os = "linux")'.dependencies]
libc = { workspace = true }

[dev-dependencies]
tempfile.workspace = true
tokio-test.workspace = true
flight-bus = { path = "../flight-bus" }
