[package]
name = "flight-opentrack-fuzz"
version = "0.0.0"
publish = false
edition = "2021"

[package.metadata]
cargo-fuzz = true

[dependencies]
libfuzzer-sys = "0.4"
flight-opentrack = { path = ".." }

[workspace]

