[package]
homepage.workspace = true
name = "flight-vr-overlay"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
authors.workspace = true
license.workspace = true
repository.workspace = true
description = "VR overlay for in-cockpit Flight Hub notifications, profile status, and axis monitoring."
readme = "README.md"
keywords = ["flight-sim", "openflight", "vr", "overlay", "notification"]
categories.workspace = true
