[package]
name = "flight-hotas-honeycomb-fuzz"
version = "0.0.0"
publish = false
edition = "2021"

[workspace]

[package.metadata]
cargo-fuzz = true

[dependencies]
libfuzzer-sys = "0.4"

[dependencies.flight-hotas-honeycomb]
path = ".."

# Cargo automatically adds this profile for fuzz targets
[profile.release]
debug = 1

[[bin]]
name = "fuzz_honeycomb_parsers"
path = "fuzz_targets/fuzz_honeycomb_parsers.rs"
test = false
doc = false
