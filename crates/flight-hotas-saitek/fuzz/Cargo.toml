[package]
name = "flight-hotas-saitek-fuzz"
version = "0.0.0"
publish = false
edition = "2021"

[workspace]

[package.metadata]
cargo-fuzz = true

[dependencies]
libfuzzer-sys = "0.4"

[dependencies.flight-hotas-saitek]
path = ".."

[dependencies.flight-hid-support]
path = "../../flight-hid-support"

# Cargo automatically adds this profile for fuzz targets
[profile.release]
debug = 1

[[bin]]
name = "fuzz_saitek_input_report"
path = "fuzz_targets/fuzz_saitek_input_report.rs"
test = false
doc = false
