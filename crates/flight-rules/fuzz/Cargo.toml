[package]
name = "flight-rules-fuzz"
version = "0.0.0"
publish = false
edition = "2021"

[workspace]

[package.metadata]
cargo-fuzz = true

[dependencies]
libfuzzer-sys = "0.4"
serde_json = "1.0"

[dependencies.flight-rules]
path = ".."

# Cargo automatically adds this profile for fuzz targets
[profile.release]
debug = 1

[[bin]]
name = "fuzz_rules_parser"
path = "fuzz_targets/fuzz_rules_parser.rs"
test = false
doc = false

[[bin]]
name = "fuzz_condition"
path = "fuzz_targets/fuzz_condition.rs"
test = false
doc = false

[[bin]]
name = "fuzz_action"
path = "fuzz_targets/fuzz_action.rs"
test = false
doc = false

[[bin]]
name = "fuzz_rule_schema"
path = "fuzz_targets/fuzz_rule_schema.rs"
test = false
doc = false

[[bin]]
name = "fuzz_bytecode_decoder"
path = "fuzz_targets/fuzz_bytecode_decoder.rs"
test = false
doc = false
