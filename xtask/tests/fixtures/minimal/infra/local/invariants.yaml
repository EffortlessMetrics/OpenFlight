environment: local-development
rust_version: "1.92.0"
rust_edition: "2024"

ports:
  flight-service: 8080
  metrics: 9090

env_vars:
  RUST_LOG:
    required: false
    default: "info"
    description: "Logging level for tracing"
  FLIGHT_CONFIG_PATH:
    required: true
    description: "Path to flight configuration directory"

resources:
  cpu_limit: "2"
  memory_limit: "2Gi"
